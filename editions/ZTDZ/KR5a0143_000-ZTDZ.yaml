front:
  text: 悟眞篇記律一張平叔先生者天台人少業進士坐累謫嶺南兵籍治平中先大父龍圖公詵帥桂林取置帳下典機事公移他鎮皆以自隨最後公薨於成都平叔轉徙秦隴乆之事扶風馬默處厚於河東處厚被召臨行平叔以此書授之曰平生所學盡在是矣願公流布當有因書而會意者默爲司農少卿南陽張公履坦夫爲寺主簿坦夫曰吾龍圖公之子壻也默意坦夫能知其術遂以書傳之坦夫坦夫復以傳先考寳文公余時童丱在傍竊取而讀之不能通也先公帥秦陽平王箴衮臣在幕府因言其兄冲熙先生學道遇劉海蟾得金丹之術冲熙謂舉世道人無能達此者獨張平叔知之成道之難非巨有力者不能也冲熙入洛謁冨韓公賴其力而後就余時年少氣鋭雖聞其說不甚介意亦不省所謂平叔者爲何人邇來年運曰往志氣日衰稍以黄老方士之術自治有以金丹之術見授者曰神者生之體形者神之舍道以全神術以固形神全而形固則其去留得以自如矣因卜吉戒誓傳法既竟再謂余曰九轉金液大還丹上聖祕重不可輕易泄漏也異日各見所授先依盟誓又須自修功成方可審擇而付之蓋欲親歷其事然後開諭後學俾抽添運用之時得免危殆則形神俱妙之道由是著矣古今相傳皆有斯約違者必有天譴豈不知平叔傳非其人三遭禍患者乎子當勉之宜無忽焉復序其所從來得之成都異人者豈非海蟾耶且冲熙成丹之難及於世之所謂道人者無所許可唯平叔一人而已其言與予昔者所聞於衮臣者皆合因取此書讀之始悟其說又考世之所傳吕公沁園春及海蟾詩詞無一語不相契者是以知淵源所來蓋有自矣今好事者多收此篇而文理頗有不同疑其初成未經裁益時已有傳之者爾亦嘗參較其舛誤二十餘處而尤甚者如詩所謂纔見芽生須急採若逢望遠不堪嘗此本乃改云鉛見癸生須急採金逢望後不堪嘗蓋補完丹訣於其間顯見世之所傳辭㫖有所未善也其别本復有了悟眞如一絶此乃以歐冶鑄劍之事易去之縁平叔自爲悟眞篇後序曰此悟眞篇中所歌詠大丹藥物火候細微之訣無不備悉觀之可以尋文解義苟無是詩則變鍊金木之妙何從而得之其文簡而理隱故出此篇以繼成其事然後金木還返之㫖焕然可推大丹既成而聖胎可結也學者當知此書傳之寖廣獨吾家之本爲眞蓋平叔之所親授者也余雖得之願力不足當求同志者共成之因此托其自
