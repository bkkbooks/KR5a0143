body:
  text: 陰道厭九一濁亂弄元胞諸術甚衆多千條有萬餘彭眞人云世人不違大道之宗元而無非傍門曲徑此屬多般皆爲左道乖訛天理悖亂至眞明違黃帝之言全失老君之㫖本期永壽反爾傷生鍾離翁云生我之門死我户之意大哉上賢說到下稍無人承當何哉只爲世人執己而修則千條百徑無非傍門者矣仙翁垂憫直言窮取生身處豈不忒露天機縁爲世人因業識中來却又因業識中而去一陽奔失形雖男子而身中皆陰若執一己而修豈能還其元而返其本哉既不能還元返本又將何以迴陽换骨也是以大修行人求先天眞鉛必從一初受氣生身之處求之方可得先天眞一之氣以還其元而返其本也此謂男女修行如此女人修仙則以乳房爲生氣之所其法尤簡是以男子修仙曰煉氣女人修仙曰煉形女人修煉先積氣於乳房然後安鼎立爐行太陰煉形之法其道最易成道也良有妙㫖昔宣和中洞賓遊吴興見一娼妓張珍奴色華容美性好淡素雖落風塵每夕沐浴更衣炷香告天求解脱去甚切洞賓作一士訪之珍奴見之風神異殊心甚敬之盡歡士飄然而去明日又至亦如之往往月餘終不及亂張珍奴曰荷君眷顧甚乆獨不留一宿罄枕席之娱豈妾猥漏不足奉君子耶士曰不然人貴心相知何必如此哉且汝每夜告天實何所求珍奴曰失身於此又將何爲但自念奴入是門中妄施粉黛以假爲眞歌謳艷曲以悲爲樂本是一團臭膿皮袋借僞飾以惑人每每悔嘆世之愚夫不自尊貴過我門者睹我如花情牽意惹迷戀不捨非但喪財多致身殞妾雖假容交歡覺罪甚重惟朝夕告天早脱此門士曰汝志如何何不學道珍奴曰陷于此地何從得師士曰吾爲汝師乎珍奴即拜扣士曰再來乃可遂去珍奴日夜望不至深自懊恨因書曰逢師許多時不說些兒箇安得仍前相對坐懊恨韶光空自過直到如今悶損我筆未竟士忽來見所書續其韻道無巧妙與你方兒一箇子後午前定息坐夾脊雙關崑崙過恁時得氣力思量我珍奴大喜士乃以太陰煉形太丹法與之珍奴自是神氣裕然若大開悟不知密有所傳尤多珍奴亦不告人臨别作步蟾宫云坎離坤兊分子午須認自家宗祖地雷震動山頭雨要洗濯黄芽岀土捉得金精牢閉固辯甲庚要生龍虎待他問汝甚人傳但說先生姓吕珍奴方悟是吕先審是修行然後付焉金玉堆裏不可與焉父子至親亦勿與焉蓋輕泄妄漏身則受殃禍連九祖門户有災子孫不祥豈止如是又將受種種惡報或沉九地永不受生切戒毋忽乾道五年乙丑歲中秋日孫薛式謹書陸子野註悟眞篇序正人行邪法邪法悉歸正邪人行正法正法悉歸邪噫金丹之道大槩如此苟差之毫釐則失之千里是道者一陰一陽之道也得其道則我命在我身外有身與天齊年享其永壽百姓日用而不知之皆流於情僞愛悐之歸矣夫物不得陰陽則不生何哉畢竟陰陽合而然也但有生人生仙之間爾仙師所謂逆爲丹母順爲人者此也其法至簡至易凡夫俗子信而行之神仙可致況上士乎丹經垂救後世多以譬喻爲辭不截然而直指者非祕吝也蓋患世人信不能及反爲毁謗故爾此道鑿鑿可以岀生死且如龍虎上經云磁石吸鐵隔礙潜通何況萬物配合而生參同契云物無陰陽違天背元牝鷄自卵其雛不全學者須要察認仙師此意還且說箇甚麽僕自幼潜心此道亦有年矣道不負人天其憐我獲遇聖師一語方知妙在目前參諸丹經洞然明白審一身之中所産者無非汞爾蓋於六慾七情之場醉生夢死之境易於走失猶汞之性難制伏也若非得眞鉛以制之使其交媾結成聖胎將見春而秋朝而暮日復一日斫喪殆盡至於四大不起可不痛歟是篇詩云休施巧僞爲功力認取他家不死方壺内旋添延命酒鼎中收取返魂漿又曰須知死户爲生户莫執生門號死門若會殺機明反覆始知害裏却生恩作丹之要於此二詩可見其底藴八九矣賢哉紫陽眞人之用心也惜乎世人宜假而不宜眞當面蹉過而誰肯認悲夫僕既得師一訣而粗知緒餘更無别道以加此矣而所難者力薄志劣則不能行嘗觀古人抱朴子得此道二十年家無儋石之蓄不得爲之徒有長嘆三復此語實可悲哉此道正是知行兩途不可同日而語昔杏林眞人授道光禪師且囑之曰可疾往通邑大都依有力者方可圖之後道光禪師領㫖如教棄僧伽黎幅巾縫掖復俗以了其事詳而質之可無疑矣僕不自愧僣以愚得於此書下一註脚語雖草率而㫖意甚親萬一賢明同志者見而豁然默悟了此妙道何異如僕之得也苟有識見卑污根器凉薄素溺於名相之人妄意竊謗爲三峰採戰之術者是所謂孔子不得不哭麟卞和不得不泣玉嗚呼惟祖師神明鑒之上陽子註悟眞篇序形以道全命以術延此語盡備金丹之說南華老仙云魚相忘於江湖人相忘於道術老子曰上德無爲而無以爲下德爲之而有以爲上德者内丹之不虧故以道全其形下德者外丹之作用故以術延其命若求天仙須兼内外而修何謂道亦如治國也天下太平國家無事此聖人上德之道行無爲之化雖有智士良將無所用之何謂術若天下擾攘兵役疊起苟無智士良將豈庸人所能制治哉即如人身初生神氣渾全復以道而養之則籛鏗之壽信未爲多此人之上德也倘年壯氣盛與嗜慾俱若非外丹之術曷延其命深斯道者則道爲體術爲用假術以成其道者猶借良智以安其國然吾所謂術者則非小伎也乃天地陰陽造化生生之道也如順則生物生人者是後天地之道也逆則成仙成佛者是先天地金丹之道也此所謂術者也故列聖相傳必師其術以禆其道伏羲周孔之易術也故曰一陰一陽之謂道孔子曰慎斯術也以往其無所失矣釋云佛法者法即術也是以華嚴合論云一切巧術智增悲妙道曰黄老之術蓋言黃帝老子皆以此而成道也三教一家實無二道天台紫陽眞人悟眞篇詩詞歌章明示金丹之術以全乆視之道故眞人自序云黄老悲其貪着乃以修生之術順其所欲漸次導之子野序亦云正人行邪法邪法悉歸正者此皆深得其㫖其用則精氣神其名則云金丹吐露泄盡世無知音者況道光禪師及陸眞人解註極爲明白而一切人不參其陰陽造化有必不可也外道乃指爲傍門甚而云三峰採戰之說者豈不惜哉道之不行也有三焉上根法器者不遇眞師遂入空寂狂蕩一也中庸之士愚執無師謬妄猜臆二也下士愚人逐波隨流不信有道三也如葉文叔袁公輔輩臆度妄註却引仙經古語證之竟至玉石不分果有何益致虚首聞趙老師之㫖未敢自足後遇青城老仙之祕方知陰陽造化順則人逆則仙之理無復更議至如象月出庚陽生火候之奥青城之訓爲最的而易行今不敢祕乃悟眞篇每章之下出數語者則薛陸所藏餘藴更爲申之使後來人不迷於疑網噫世之信道而行者鮮而復鮮金丹之道未有若此悟眞篇之親且切矣上有純陽海蟾之面授也我重陽丹陽諸老仙之語亦與是合況杏林道光泥丸紫清代相授受皆以是而證仙道世因稔聞而厭聽此雖三尺童孩亦知世有神仙之術時人乃多訕謗者抑不思之甚也且青城翁授僕眞訣既而囑曰後必有王侯大人求師于子夫道不可禁祕又不可妄泄孰能審之吾有一驗法頗得其情實今以授子可沙裏淘金去也僕承師授寢食若驚首授田侯至陽子遍遊夜郎卭水沅芷辰陽荆南二鄂長沙盧阜江之東西凡授百餘人皆只以道全形之㫖至於以術延命之祕可語者百無二三非僕所敢靳也彼器有利鈍爾因書于此使聞道者各宜勉旃妙矣哉雖有拱壁以先駟馬不如坐進此道也紫陽眞人悟眞篇笙蹄學仙之至要雖世之愚人得其妙訣亦躋聖位何也爲堅信不疑而勇於行耳學者未得眞師口訣望洋而退否則猜量臆說說性說命說禪說宗以逞乾慧孰知是書故一絶云饒君了悟眞如性未免抛身却入身何似更兼修大藥頓超無漏作眞人是以三教殊途同歸皆先了性然後修命未有知修命而不知了性者蓋大藥從性而入方是金丹也獨知性者又烏知玄牝生丹之妙世多有悟性而不知修命者故詩謂名爲四果徒之句此乃明空性而不得達磨上乘之教後之愚人反謂修命之後方求了性誑惑至此復奈之何兼以近世有輩妄人僞作歌頌記于此書之後以瞽性命之學如讀祖英集讀參同契等禪宗歌頌四十餘篇措辭殊甚鄙陋似此何能明性此乃初學無知連床上習爲此等不可捉摸底話以愚惑世人今皆削去毋玷玄文此輩不究紫陽眞人之書言參妙道語漏化工其意甚殊其言大切如先把乾坤爲鼎器次搏烏兔藥來烹又如鉛遇癸生二物會時之句其高製妙語豈識見卑污所能思議故眞人自序云教雖分三道乃歸一奈何後世黃緇之流各自專門互相非是致使三家宗要迷没邪歧不能混一而同歸矣予項在中書有志于此每疑仙與佛爲各道性與命爲兩途後蒙師授方得指歸始知天下無二道之理倘非師㫖皆是誑談歷閲群書遍加詢究此悟眞篇前後註釋可見三十餘家於中有力行而深知有洞達而未行有及門而無火候有略曉而無下手有不得明師妄自箋註大失其㫖眞人所謂學者隨量會解自然成三乘之差今集薛陸陳三家所註壽梓以行其意合而㫖同實後學之梯級書之來歷且有數說是亦後人各述得書之由所不足信或云垣中三星潜耀降世又云燒其蜕得舍利子千百此皆杜撰有所不取明達之士或是斯言遵而行之仙佛可證工部尚書張士弘書悟眞篇序嗟夫人身難得光陰易遷罔測短脩安逃業報不自及早省悟惟只甘分待終若臨期一念有差墮三塗惡趣則動經塵劫無有出期當此之時雖悔何及故老釋以性命學開方便門教人修種以逃生死釋氏以空寂爲宗若頓悟圓通則直超彼岸如有習漏未盡則尚徇於有生老氏以煉養爲眞若得其要樞則立躋聖位如其未明本性則猶滯於幻形其次周易有窮理盡性至命之辭魯語有毋意必固我之說此仲尼極臻乎性命之奥也然其言之常略而不至於詳者何也蓋欲序正人倫施仁義禮樂之教故於無爲之道未嘗顯言但以命術寓諸易象以性法混諸微言耳至於莊子推窮物累逍遥之性孟子善養浩然之氣皆切幾之迨夫漢魏伯陽引易道陰陽交姤之體作參同契以明大丹之作用唐忠國師於語録首序老莊言以顯至道之本末如此豈非教雖分三道乃歸一奈何後世黄緇之流各自專門互相非是致使三家宗要迷没邪歧不能混一而同歸矣且今人以道門尚於修命而不知修命之法理出兩端有易遇而難成者有難遇而易成者如鍊五芽之氣服七耀之光注想按摩納清吐濁念經持咒噀水叱符叩齒集神休妻絶粒存神閉息運眉間之思補腦還精習房中之術以至服鍊金石草木之類皆易遇而難成者已上諸法於修身之道率皆滅裂故施功雖多而求效莫驗若勤心苦志日夕修持止可以辟病免其非横一旦不行則前功漸棄此乃遷延歲月必難成功欲望一得永得還嬰返老變化飛昇不亦難乎深可痛傷蓋近世修行之徒妄有執著不悟妙法之眞却怨神仙謾語殊不知成道者皆因煉金丹而得恐泄天機遂託數事爲名其中間惟閉息一法如能忘機絶慮即與二乘坐禪頗同若勤而行之可以入定出神柰何精神屬陰宅舍難固不免長用遷徙之法既未得金汞還返之道又豈能迴陽换骨白日而升天哉夫煉金液還丹者則難遇而易成要須洞曉陰陽深達造化方能追二氣於黄道會三性於元宫攢簇五行合和四象龍吟虎嘯夫唱婦隨玉鼎湯煎金爐火熾始得玄珠成象太一歸眞都來片餉工夫永保無窮逸樂至若防危慮險慎於運用抽添養正持盈要在守雌抱一自然復陽生之氣剥陰殺之形節氣既周脱胎神化名題仙籍位號眞人此乃大丈夫功成名遂之時也今之學者有取鉛汞爲二氣指臟腑爲五行分心腎爲坎離以肝肺爲龍虎用神氣爲子母執津液爲鉛汞不識浮沉寧分主客何異認他財爲己物呼别姓於親兒又豈知金木相剋之幽微陰陽互用之要妙是皆日月失道鉛汞異爐欲望結成還丹不亦遠乎僕幼親善道涉獵三教經書以致刑法書筭醫卜戰陣天文地理吉凶死生之術靡不留心詳究惟金丹一法閲盡群經及諸家歌詩契論皆云日魂月魄庚虎甲龍水銀朱砂白金黑錫坎男離女能成金液還丹終不言眞鉛眞汞是何物也不說火候法度温養指歸加以後世迷徒恣其臆說將先聖典教妄行箋註乖訛萬狀不唯紊亂仙經抑亦惑誤後學僕以至人未遇口訣難逢遂至寢食不安精神疲顇雖詢求遍於海嶽請益盡於賢愚皆莫能通曉眞宗開照心腑後至熙寧己酉歲因隨龍圖陸公入成都以夙志不回初诚愈恪遂感眞人授金丹藥物火候之訣其言甚簡其要不繁可謂指流知源語一悟百霧開日瑩塵盡鑑明校之仙經若合符契因念世之學仙者十有八九而達眞要者未聞一二僕既遇眞筌安敢隱默罄所得成律詩九九八十一首號曰悟眞篇内七言四韻一十六首以表二八之數絶句六十四首按周易諸卦五言一首以象太一續添西江月一十二首以周歲律其如鼎器尊卑藥物斤兩火候進退主客後先存亡有無吉凶晦吝悉備其中矣及乎篇集既成之後又覺其中惟談養命固形之術而於本源眞覺之性有所未究遂翫佛書及傳燈録至於祖師有擊竹而悟者乃形於歌頌詩曲雜言三十二首今附之卷末庶幾達本明性之道盡於此矣所期同志覽之則見末而悟本捨妄以從眞時皇宋熙寧乙卯歲旦天台張伯端平叔序
