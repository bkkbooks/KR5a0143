front:
  text: 紫陽眞人悟眞篇三註卷之一
  hash: sha256:be6f3e2f8b05d7cc7499656c476fc40f88559fb3151f29ba094d1b8187eab5f4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0143_SJB_001-020974c, image: sjb/02/020974c.png}
body:
  text: 紫賢薛道光子野陸墅上陽子陳致虚註七言律詩八首不求大道出迷途縱負賢材豈丈夫百歲光陰石火爍一生身世水泡浮只貪利禄求榮顯不顧形容暗悴枯試問堆金等山嶽無常買得不來無道光曰難莫難於遇人易莫易於成道今也現宰官長者之身結大道修丹之友煉一黍米於霎時之中立地成道此易莫易於成道也然紆紫懷金門深似海有道之士望望然而去之此難莫難於遇人也易莫易於遇人難莫難於成道今也百錢掛杖四海一身夙植靈根親傳大道然龍虎之韁易解刀圭之鎖難開得藥忘年煉鉛無計此又遇人之易而成道之難也安有二事俱全哉正好密扣玄關千載一時十洲三島者耶仙翁遊成都遇青城丈人得金液還丹之妙道驚嘆成藥之不難故作是詩結縁丹友其末章曰試問堆金等山嶽無常買得不來無辭意迫切雖有拱壁以先駟馬不如坐進此道仙翁遠矣高山流水落落知音子野曰道不負人人乃負道上陽子曰從古聖賢尊道貴德何謂道先天一炁之造化也何謂德積功累氣以成聖也古之上士必先積德古之聖賢必先聞道未有不聞道而稱聖未有不積德而曰賢既曰賢矣却不精修妙道者則與凡流同歸泯滅而已矣是不得名爲大丈夫百年榮顯光陰如電金玉堆裏難免無常且功如韓信冨遇石崇愈危身以棄生但殉名而殉貨以自滅其軀故經云道之眞可以治身其緒餘以爲國家其王且以治天下是以積德曰賢積財曰愚愚而且冨故業重賢而且貧必罪輕信夫天道好還者也仙翁憫世愚人貪財積業故作是書首以此詩諷勸世人崇修至道也人生雖有百年期壽夭窮通莫預知昨日街頭方走馬今朝棺内已眠屍妻財抛下非君有罪業將行難自欺大藥不求爭得遇遇之不煉是愚癡道光曰麟鳳不世出神仙不常見有能空夢幻泡影之身可脱生老病死之苦爲人間希有之事道上逢師師邊得㫖下手速修猶大遲也仙翁作是詩末章且曰大藥不求爭得遇遇之不煉是愚癡其叮嚀懇切如此吾儕未聞道者可即求師已遇人者豈容癡坐宜結一時之黍米守抱九載之空仙心藏太虚神遊八極露紫雲之半面應仙試於玄都毋使許君專美晋代子野曰知之非難行之惟難妙矣哉上陽子曰經云夫人上壽百歲中壽八十下壽六十除憂患死喪一月之間不過四五日而已一世之人儘貪名利爲可長享豈顧死期至哉僕每問嘆世之愚人一身之外急於妻子百計冨貴一旦身没妻適他人並以冨貴爲後夫所有誰肯思前夫方在地獄中受業報也故仙翁云妻財抛下非君有罪業將行難自欺惻隱之至矣但欲世人修道以脱輪迴多少負志自高之士已遇眞師直指大道乃欲待其功名志滿願足方煉金丹忽忽天不與年悔何能及豈非愚癡乎噫未聞者急求師已聞者即求藥矣人之壽夭不可預知也頓除執着更不愚癡信受奉行此可謂賢智者學仙雖是學天仙惟有金丹最的端二物會時情性合五行全處虎龍蟠本因戊己爲媒娉遂使夫妻鎮合歡只候功成朝北闕九霞光裏駕翔鸞道光曰仙有數等陰神至靈而無形者鬼仙也處世無疾而壽永者人仙也飛空走霧不飢不渴寒暑不侵遨遊海島長生不死者地仙也形神俱妙與道合眞歩日月無影入金石無礙變化無窮隱顯莫測或老或少至聖至神鬼神莫能知蓍龜不能測者天仙也陰眞君曰若能絶嗜慾修胎息頤神入定脱殻投胎託陰化生而不壞者可爲下品鬼仙也若受三甲符籙正一盟威上清三洞妙法及劍術尸解之法而得道者皆爲南宫列仙在諸洞府修眞得道乃中品仙也若修金丹大藥成道或脱殻或冲舉乃無上九極上品仙也丹法七十二品欲學天仙惟金丹至道而已此蓋無中生有天地未判之前煉混元眞一之氣非後天地生五金八石朱砂水銀黑鉛白錫黃丹雄黃雌黃硫黃砒粉秋石草木灰霜雪冰滓質煮伏之類及自身津精氣血液有中生有等物也惟眞一之氣聖人以法追攝於一時辰内結成一粒如黍米號曰金丹又曰眞鉛又曰陽丹又曰眞一之精又曰眞一之水又曰水虎又曰太乙含眞氣人得餌之立躋聖位此乃無上九極上品天仙之妙道世人罕得而遇也吾儕今得大道斷念浮華凝神碧落毋爲中下之圖當證無上九極上品天仙之位且眞一之氣生於天地之先混於虚無之中恍惚杳冥視之不見聽之不聞搏之不得如之何而凝結以成黍米之珠哉聖人以實而形虚以有而形無實而有者眞陰眞陽也同類有情之物也虚而無者二八初弦之炁也有氣而無質兩者相形一物生焉所謂一者眞一之氣而凝爲一黍米之珠也經曰元始懸一寳珠大如黍米在空玄之中者此其證也聖人恐泄天機以眞陰眞陽取喻青龍白虎以兩弦之氣取喻眞鉛眞汞也今仙翁詩曲中復以龍之一物名曰赤龍曰震龍曰天魂曰乾家曰乾爐曰玉鼎曰玉爐曰扶桑曰下弦曰東陽曰長男曰赤汞曰水銀曰朱砂曰離日曰赤鳳皆比喻青龍之一物也又以虎之一物名曰黑虎曰兊虎曰地魄曰坤位曰坤鼎曰金爐曰金鼎曰華嶽曰前弦曰西川曰少女曰黑鉛曰偃月爐曰坎月曰黑龜皆比喻白虎之一物也又以龍之弦氣曰眞汞曰姹女曰木液曰青娥曰朱裏汞曰性曰白雪曰流珠曰青衣女子曰金烏曰離女曰乾龍曰眞火曰二八姹女曰玉芝之類一也又以虎之弦氣曰眞鉛曰金翁曰金精曰水中金曰水中銀曰情曰黃芽曰金華曰素練郎君曰玉兔曰坎男曰雄虎曰眞水曰九三郎君曰刀圭之類一也二物會時情性合者二物即龍虎也青龍在東屬木木能生火龍之弦氣爲火曰性屬南謂之朱雀也白虎在西屬金金能生水虎之弦氣爲水曰情屬北謂之玄武也木火金水合龍虎情性通四象會中央功歸戊己土土者丹也此之謂眞五行全戊己爲媒娉者木在東金在西兩情相隔誰爲媒娉惟有黃婆能打合牽龍就虎作夫妻戊己屬土謂之黃婆龍虎雖處東西黃婆能使之歡會金木雖然間隔黃婆能使之交併兩者蓋眞一之氣潜兩者同眞一之氣變眞人自出現此外藥法象也丹熟人間功成天上九霞光裏兩腋風生非夙植靈根廣施陰騭其孰能語與於此哉子野曰天仙非金丹不能成道且道金丹是何物咦分明元是我家物寄在坤宫坤是人所言二物者何物也我與彼也彼我會則情性和而五行備龍虎即情性而已且道這箇會字如何會有用用中無功用功功裏施功咦竹密不妨流水過山高豈礙白雲飛戊己乃中也中者得其正位戊己者意土也彼我之意相合則夫妻之情歡悦而得矣茍陰之意雖欲求陽而陽之意未欲求陰則陰陽抗衝不相涉入則物不生矣所以戊己爲生物之鄉生物係乎意也眞土無位其意無形神哉神哉上陽子曰道光謂仙有數等有鬼仙人仙地仙神仙天仙而陰眞君又分上中下三品仙者皆欲明天仙爲高上蓋天仙之道除金丹之道則餘無他術矣金丹乃陰陽之祖氣即太極之先天地之根也所謂二物者一乾一坤也一有一無也一情一性也一離一坎也一水一火也一日一月也一男一女也一龍一虎也一鉛一汞也一竅一妙也一玄一牝也一戊一己也一烏一兔也一精一氣也一龜一蛇也一彼一我也一己一身也一金一木也一主一賓也一浮一沉也一剛一柔也一琴一劍也一陰一陽也皆云乾坤爲二物之體陰陽爲二物之根龍虎爲二物之象男女爲二物之名鉛汞爲二物之眞彼我爲二物之分精氣爲二物之用玄牝爲二物之門惟先天混元眞一之氣乃産於二物之内故夫一陽者本乾也因貪癡之後乾之一陽乃寄於坤之中爻而成坎故一陰者乃坤也因錯亂之後坤乃破乾之全體指而成離則離中之物唯汞而已坎中之物却名曰鉛鉛從白虎而生故曰虎之弦氣汞從青龍而生故曰龍之弦氣龍乃屬木木能生火故曰龍從火裏出虎乃屬金金能生水故曰虎向水中生名之者物之體也用之者物中所産之物也故云二物會者一情一性之交會也一乾一坤之歡會也一陰一陽之還會也因會方能有合戊己爲媒娉者媒者所以通兩家之消息娉者所以傳一時之過送然有内亦有外在外者即泥丸翁云言語不通非眷屬之謂也在内者戊己爲乾坤之門户爲陰陽之去來爲龍虎之起伏爲男女之媒娉以其鉛西汞東間隔千里若非戊子兩相媒娉而會合之則何由得産眞一之氣哉夫妻者却非世間之所謂夫妻也世之夫妻以生男生女爲喜以損精神爲樂因之而有恩愛因之而有生老病死苦以纏絆所以經云父母取其恩妻妾取其愛兒女取其形者皆因牽制於愛慾之場不能割斷於冨貴之域惟聖人則能相時而用不將不迎年壯而育子者續綱常也及乎四十而不惑不動心者不爲愛育之所制也金丹之言夫妻者獨妙矣哉又有内外亦有數說以虎而嫁龍外也以坎而適離外也以震男而求兊女外也至於以鉛合汞内也以氣合神内也以有入無内也皆爲男女等相又能以苦爲樂亦無恩愛留戀且以割捨爲先交媾只半箇時辰即得黍米之珠是以不爲萬物不爲人乃逆修而成仙作佛者此爲金丹之夫妻也雖然家家有之而非自家所有者蓋其見之不可用也欲若求之大要法財必於神州赤縣者爲其用之不可見也夫欲修此金丹必先煉己以待陽生之時若無煉己之功則二物雖會媒娉雖合夫妻雖眞將見鉛至而汞失應矣蓋古仙聖師必煉此金液大還丹而後白日騰空如黃帝之鼎湖張葛許之飛昇此但世所知者豈勝言哉而其不知者亦豈勝言哉故傳曰略記飛昇者三萬餘人拔宅者八百餘家此皆金丹之道得仙而又能積功累行豈有不翔鸞而朝北闕也此法眞中妙更眞都縁我獨異於人自知顛倒由離坎誰識浮沉定主賓金鼎若留朱裏汞玉池先下水中銀神功運火非終旦現出深潭月一輪道光曰此道至靈至聖至尊至貴至簡至易玄之又玄妙中之妙舉世罕聞仙翁出乎其類獨傳深㫖冲照王眞人曰金丹之道舉世道人無所許者惟平叔一人而已泰山丘垤河海行潦何敢望焉離三爲陽而居南所以返爲女者外陽而内陰是謂之眞汞坎爲陰而居北所以返爲男者外陰而内陽也是謂之眞鉛後詩云日居離位翻爲女坎配蟾宫却是男此言坎是男離是女猶言父之精母之血日之烏月之兔砂之汞鉛之銀天之玄地之黃也此類者皆指龍虎初弦之氣也顛倒主賓者陽尊高而居左曰主陰卑低而居右曰賓離爲火火炎上火與木之性俱浮爲陽故云主也坎爲水水流下水與金之性俱沉爲陰故云賓也此常道也令也離反爲女坎反爲男是主反爲賓而賓反爲主又道中取二弦顛倒之意爲主賓非取常道之主賓也金鼎者金爲陰物也鼎中有至陽之氣是陰中有陽之象白虎是也玉池者玉爲陽物也池中有至陰之氣是陽中有陰之象青龍是砂中之汞龍之弦氣也水中銀虎之弦氣也修丹之士若欲以虎留龍必先驅虎就龍然後二氣氤氲兩情交合施功煅煉自然凝結眞一之精氣也運火者火乃二弦之氣旦是一晝之首爲六陽之元故曰旦聖人運動丹火有神妙之功不半時之中立得眞一之精一粒大如黍米現在北海之中光透簾幃若深潭現出一輪之赫日也非終旦者明一時之中金丹立成此外藥法象也子野曰我本離而反陰彼本坎而反陽上下反常故稱顛倒彼鉛而沉沉乃降我汞而浮浮乃昇以汞制鉛彼爲主我爲賓入藥鏡云鉛龍昇汞虎降微哉微哉經云口爲玉池太和官金鼎喻我玉池喻彼留我身中之汞住得復玉池之銀制之則不致飛走銀即鉛也火者陰陽之氣合而内行内行則温而和所以能融物之眞使其交媾陰陽之氣不合即非火矣今之學者以一息不間爲行火抑何謬哉殊不知一息不間者陰符也何哉二數屬火一數屬水合則爲二不合則一其妙在乎積陰之下一陽來復之時也所以火必以候繼之其理明矣學者知其奥而運用之則陽氣回於丹田之中發生光華如深潭之有日也其功豈不神哉上陽子曰妙之一字夫誰肯信異於人者世人迷於愛慾我却於愛慾之中而有分别何謂分别聖人以離坎顛倒而用之謂之水上火下以乾坤顛倒用之謂之地上於天以夫婦顛倒而用之謂之男下女上浮沉者火炎木浮而在上爲主水降金沉而在下爲賓此乃人之道也此謂世間法也此謂順五行也今焉火木雖浮使之就下而反爲賓金水雖沉使之逆上而反爲主此謂之仙道也是出世間法也是謂水火既濟也是謂顛倒五行也金鼎玉池道光所註不出顛倒之機而又失欲留先下之義子野以金鼎喻我玉池喻彼此却合紫陽翁之意何哉縁自己之精氣血液者朱裏汞也不可令其走逸故云欲留如彼之華池靈液丹井甘泉者水中銀也即先天一點眞氣故云先下又欲留者但令其住而不令其去要取於人而不失於己又先下者彼到而我待之鉛至以汞迎之坎動而離受之金丹之道先要明此欲留先下四字之㫖連火非終旦者火必得其温和而運之故參同契云發火初温微亦如爻動時純陽翁云中宵漏永温温鉛鼎光透簾幃蓋萬物化生之初其受陰陽之氣只霎時中況此上仙之道其煉先天之氣又爲迅速故佛云如露亦如電者謂其至精至微而功甚速爲不可乆也乆則有損而有虧若得此先天眞鉛歸於懸胎室内豈非深潭之現紅日也虎躍龍騰風浪麤中央正位産玄珠果生枝上終期熟子在胞中豈有殊南北宗源翻卦象晨昏火候合天樞須知大隱居廛市何不深山守靜孤道光曰此言内藥法象也夫眞一之精造化在外曰金丹又曰眞土吞入腹中即名眞鉛又名陽丹此言虎即金丹也龍者我之眞氣也風浪者我之眞氣自氣海而出其湧如浪其動如風中央正位者即丹田中金胎神室也乃結丹凝氣之所玄珠者嬰兒也又曰金液還丹夫金丹者先天之一氣交結而成爲母爲君爲鉛故謂之虎也己之眞氣乃後天而生爲子爲臣爲汞故謂之龍也金丹自外來吞入腹中則己之眞氣自下元氣海中湧起似風浪吸然凑之如臣之於君如子之於母其相與之意可知矣龍虎交合神室之中結成聖胎若果之在枝必熟若兒之在腹必生十月功圓自然脱胎神化無方矣南北者子午也宗源者起苗之初也晨昏者晝夜之首也子時乃爲六陽之首故爲晨午時乃爲六陰之首故爲昏晨則屯卦直事宜進火之候昏則蒙卦直事宜進水之候一日兩卦始於屯卦蒙卦終於既濟未濟周而復始循環不已故曰翻卦象參同云朔旦屯直事至暮蒙當受晝夜各一卦用之依次序既未至晦爽終則復更始是也一日兩卦直事一月計六十卦一卦六爻并牝牡四卦計三百八十四爻以計一年閏餘之數乾之初九起於坤之初六乾之策三十有六爻計二百一十有六坤之初六起於乾之初九坤之策二十有四六爻計一百四十有四總三百六十應周天之數日月行度交合升降不出卦爻之外月行速一月一周天日行遲一年一周天天樞者斗極也一晝夜一周天而一月一移也如正月建寅二月建卯是也故曰月月常加戌時時見破軍上士至人知日月之盈虧明陰陽之上下行子午之符火日爲晝月爲夜應時加减然後暗合天度故曰合天樞也至道至妙妙在於斯坎離升降生産靈藥始結黃芽也金丹大藥家家自有不拘市朝奈何見龍不識龍見虎不識虎逆而修之幾何人哉片餉之間結成一珠大如黍米將來掌上看不得吞入腹中莫語人子野曰風浪麤者二氣交感之景象也交感後風恬浪靜採得藥歸中宫如黍米一粒從微至著即以成胎温之養之終雖成熟如果生枝上子在胞中而無别也中央正位乃黃庭也黃庭即下丹田南北宗源者南爲離是我北爲坎是彼取坎中之爻復我離中而成乾故曰翻卦象火見前註候者朝屯暮蒙之序朝而屯暮而蒙則晨昏動靜自然符合天機上陽子曰龍者離中之陰虎者坎中之陽降我家之龍則汞不至於逃逸伏彼中之虎則能得彼中之鉛華風浪麤者是内外火候之法象切須慎之在外則臨爐之時不懲不失在内則丹之後保養無虧仙翁以一點眞陽而比虎者言虎之爲物最爲難制故易之履辭曰履虎尾咥人凶言履之不曰其道則及咥人亦如狂風巨浪之中唯恐傾喪則於採藥之時牢把一念猶内觀其心心無其心外觀其形形無其形遠觀其物物無其物之義却能迎之以意則玄珠産於丹田中矣翻卦象者坎居上而離居下是爲水火既濟乾在下而坤在上是爲地天泰兊處上而震處下是爲澤雷隨艮居下兊居上是爲澤山咸也天樞者斗罡也金丹之道妙在天應斗之樞在身立人之極寂然不動感而遂通者此也釋氏乃號金剛至人體此而早求丹此丹在人類中而有在帀廛中而求所謂神州赤縣者乃大藥所産之處固非深山大澤所出亦非名山洞府所有何哉山高則陽寡澤窮則陰孤有輩愚人言及修行便謂深山兀坐窮谷獨居可也噫豈知達磨馬祖之所謂哉馬祖未修大藥而枯坐求佛是有磨磚之譏達磨已向長盧而入室下功是向少林冷坐修之與行各有時耳故我師云靜坐一件是得丹之後事也未能大隱帀廛何必深山守靜孤乎僕每興言及此未嘗不爲之長嘆大槩此章道光爲已得外丹而但能内藥法象故云金丹自身外來吞入腹中則已知眞氣自下元氣海中湧起似風浪翕然而凑之等語而子野則云風恬浪靜又似相戾仙師之意各出其說者皆欲學人慎思而明辨之精修而熟行之臨爐之際景象自現既得眞一之鉛歸入神室惟當守訥猶果在枝待時而熟子孕胞中待氣而全時熟氣全自然神化人人自有長生藥自是愚迷枉擺抛甘露降時天地合黄芽生處坎離交井蛙應謂無龍窟籬鷃爭知有鳳巢丹熟自然金滿屋何须尋草學燒茅道光曰甘露黃芽皆金丹之異名天地坎離乃龍虎法象天地之氣氤氲甘露自降坎離之氣交會黃芽自生龍虎二絃之氣交媾金丹自結矣此般至寳家家自有以其太近故輕棄之殊不知此乃升天之雲梯也近世學者多執傍門非類孤陰寡陽有中生有易遇難成等法而治諸身不知斯道簡而易成有如井裏之蛙籬間之鷃莫知有鳳巢龍窟也黍米之珠既懸天地之念可掬經曰地藏發泄金玉露形此其證也何尋草燒茅終年畢歲嗚呼老矣是誰之愆子野曰且道長生是何物咦子子孫孫因順去逆來永壽嘆誰知黃芽甘露俱是藥名天地坎離其實人也天地合坎離交則藥生矣凡夫愚子不知此道甘分待終蛙鷃不知有鳳巢龍窟也上陽子曰只前三詩已盡還丹之妙此章又出甘露降之㫖太切也金丹之道人人有之家家有之愚者迷而不覺中常之人偶或聞之而不信受反爲毁謗易之泰卦曰天地交泰又曰天地交而萬物通上下交其志同也且一陽之氣上升而一陰之氣下降則降甘露若眞水潤上而眞火炎下則結黃芽要知甘露黃芽即先天一炁此氣纔至即結成丹然上下不交則其志不同天地不合則此氣不降陰陽非類則黃芽不産仙翁顯言甘露降者使人知乎天地交泰之理而坎離交合則使知水火既濟之道嗟夫世人見聞不廣若井蛙籬鷃安有遠大之見也烏足得知玄牝之門以降甘露而生黃芽又烏得龍窟鳳巢爲呈瑞矣但以眼前非類如尋草燒茅等事大可笑也豈不聞純陽翁云九江張尚書服藥失明神氣枯不知還丹本無質翻餌金石何太愚哉諦聽此語可不慎歟世人禀天地至清之氣而生故皆可以明聖賢之道柰何賢愚貧賤之分又况逄盲師引入傍門乎要知産藥川源處只在西南是本鄉鉛遇癸生須急採金逢望遠不堪嘗送歸土釜牢封閉次入流珠厮配當藥重一斤須二八調停火候託陰陽道光曰藥在西南收居戊己採取有時下功有日夫西南是坤方白虎之地也又坤方是一月所生之處故曰本鄉月是金水之精上下兩弦金水合氣而生是以金丹藥物生産川源之處實出坤地鉛見癸生者時將丑也金逢望遠者月將虧也月之圓缺存乎口訣時之子午妙在心傳周天息數微微數玉漏寒聲刻刻符此眞人口口相傳之密㫖也柰何傍門紛紛以圭丹爲鉛金用天癸時採取有同兒戲葉文叔又有坤納癸之語又可笑也陸思成作序云此詩傳多謬以鉛爲若字以金爲如字甚失仙翁㫖意豈知鉛與金即金丹也此皆未遇眞師妄自穿鑿陸公發其端救魚魯之失祕其源恐竹帛之傳吾儕親授玄㫖當自知之如或未然空玄之中去地五丈黍米之珠殊不易得也餌丹歸黃庭土釜之中宜固濟則胎不泄運火飛流珠汞以配之靈胎乃結也烏肝八兩兔髓半斤兩箇八兩合成一斤故曰藥重一斤須二八也火實無火托陰陽之氣以調運之爾子野曰藥出西南是坤位欲尋坤位豈離人分明說破君須記只恐相逄認不眞癸者藥也迎其藥之將生則急取之方可用茍遲則藥已生質若質一生則爲後天之物所謂見之不可用也此時水源至清有氣無質一日僅有一時入藥鏡云一日十二時意所到皆可爲正此時也金逢望遠者喻採藥失時藥氣過矣如望後之月日虧一日謂之不堪嘗鑑本自明因塵蒙而遂晦鉛珠獨露縁癸積而漸藏塵去則鑑體依然癸盡則鉛華仍見鉛當急採恐癸水漸漸而後生金亦如之借鑑塵昏而爲喻採得癸生之藥入於丹田則當牢固封閉毋令滲漏以走靈藥次運自己之陰汞配合爲一結成聖胎封閉之法參同契云離氣納榮衛坎乃不用聰兊合不以談希言順洪濛之謂也又云汞自爲流珠而陰陽相停則聖胎結若失於偏枯所謂毫髮差殊不作丹也聖胎既結非得火候調停豈能冀甚成也上陽子曰易云西南得朋乃與類行西南爲坤同類之地鉛所由産藥在彼生兊乃代坤抱陽成坎兊之初癸是爲眞陰眞陽初動乃曰癸生天地以七日而來復復子也太陰以三日而出庚庚金也人身以三日而看經經鉛也癸動後而生鉛鉛之初生名曰先天眞一之氣此氣號曰金華言鉛言癸而不言水者取其氣也鉛生于癸後陽産於鉛中採取眞鉛借云煉丹其功只半箇時此合大造化也故一月止有一日一日止有一時夫此一時最不易得以其天地合德日月合明生生化化之眞機逆而修之超凡入聖故仙翁以癸生急採爲最切送歸土釜配以流珠調其火候以成聖胎僕令泄天地之機者欲明仙翁切切之意上士於此有悟則宜勤行而勿疑其中調停細密之㫖在人盡心而力行深究其妙化老子曰微妙玄通爲上士也休煉三黄及四神若尋衆藥便非眞陰陽得類俱交感二八相當自合親潭底日紅陰怪盡山頭月白藥苗新時人要識眞鉛汞不是凡砂及水銀道光曰三黃四神金石草木皆後天地生滓質之物安能化有形而入於無形哉經曰外物不可成胎綴花安能結子眞一之氣生於天地之先杳杳冥冥不可測度因二八相當之物合而成親氤氲交感之中激而有象同類者無情之情不色之色烏肝八兩兔髓半斤是也子野曰金丹乃眞陰眞陽交姤而成非外藥之可爲也惟類字至緊要陰陽之合在於得類非其類物徒爾爲也所以參同契云類同者相從事乖不成寳燕雀不生鳳狐兔不乳馬二八相當者在於得人得人則藥物無虧耗鼎器無滲漏之患也藥在下丹田爲火煅煉如日在潭一身之中陰氣盡爲銷鑠也月白藥苗新者水中金初生之時山頭月乃喻其坎當居上之意所以成既濟之道參同云關鍵有低昂兮害氣遂奔走江淮之枯竭兮水流注於海鼎器歌云陰在上陽下奔神哉神哉非眞師的傳者何敢以私意猜度而至此耶汞是我家元有物鉛是他家不死方若以凡砂水銀是猜量到底枉猜量上陽子曰三黃四神如雄黃硫黃雌黃黃丹黑鉛水銀凡砂凡丹金石草木等皆非眞直須要眞陰眞陽故仙翁以得類指示後人亦以深切類者如天必以地爲類如日必以月爲類如女必以男爲類如汞必以鉛爲類也二八爲一斤之數以十五者月之圓也契則云兩七聚輔翼人皆直指同類之數相當者不先不後不多不少不大不小不爭不怒不隱不瞞不驚不疑皆要相當方得交合結丹潭底者即伯陽翁云眞人潜深淵之意一念堅凝祛除萬慮則陰怪自滅山頭者仙翁每喻玄門爲崑崙山頂也若水清月白即時採得新生之靈藥非凡砂水銀是眞鉛眞汞即是靈父聖母之氣彼凡父凡母之氣順故成人成物也此聖父聖母之氣逆故生仙生佛也紫陽眞人悟眞篇三註卷之一
