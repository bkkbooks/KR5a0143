body:
  text: 爲類則汞必以鉛爲類也二八爲一斤之數又云十五者月之圓也鼎器歌云兩七聚輔翼人皆直指同類之數相當者不先不後不多不少不小不大不爭不怒不隱不瞞不驚不疑皆要相當方可交合而結丹潭底者卽參同契云眞人濳深淵之意一念堅凝袪除萬慮則陰怪自滅山頭者仙翁每喻玄門爲崑崙山也若水淸月白卽得新生之靈藥此藥非凡砂水銀是眞鉛眞汞卽靈父聖母之氣彼凡父母之氣順故成人此靈父聖母之氣逆故生仙生佛也陽裏陰精質不剛獨修一物轉羸尫勞形按引皆非道服氣飡霞總是狂舉世漫求鉛汞伏何時得見虎龍降勸君窮取生身處返本還元是藥王道光曰陽裏陰精已之眞精是也精能生氣氣能生神榮衞一身莫大於此油枯燈滅髓竭人亡此言精氣實一身之根本也奈何此物屬陰其質不剛其性好飛日逐前後便溺涕唾汗淚易失難擒不受制煉若不得混元眞一之丹以伏之無由凝結以成變化若或獨修一物轉見尫羸按引勞形皆非正道飡霞服氣總是狂徒設若吞日月之精華光生五内運雙關搖夾脊補腦還精以至尸解投胎出神入定千門萬法不過獨修此陽裏陰精之一物爾孤陰無陽如牝雞自卵欲抱成雛不亦難乎如鍾離翁云涕唾精津氣血液七般物色總皆陰若將此物爲丹質怎得飛神上玉京以此言之一身之中非惟眞精一物屬陰五臟六腑俱陰無陽分心腎爲坎離以肝肺爲龍虎用神氣爲子母執津液爲鉛汞得乎此至愚之徒執此等以治身而求純陽之證深可悲哉參同契曰去冷加冰除𤍠用湯飛龜舞蛇愈見乖張假使二女共室顏色甚姝蘇秦通言張儀合媒發辯利舌奮舒美辭推心調諧合爲夫妻弊髮腐齒終不相知以女妻女以陰煉陰胡爲乎而絪緼胡爲乎而化生乎哉導引按摩煉氣飡霞皆是小術止可辟病一旦不行前功俱廢參同契云陰道厭九一濁亂弄元胞食氣鳴腸胃吐正吸外邪晝夜不臥寐朔望未嘗休身體日疲倦恍惚狀若癡皆是狂爲去道遠矣眞龍眞虎二八是也眞鉛眞汞二弦之氣是也此道至𥳑不繁至近匪遠但學者執僻堅以旁門非類之藥爲鉛汞反以大道眞訣爲非深可悲傷故鍾離翁云求仙不識眞鉛汞謾讀丹經千萬篇不識箇中含蓄意謗他眞語作虛傳故仙翁直指二物所產川源之處身從何生命從何有返此之本還此之源顚倒修之卽得眞龍眞虎自降眞鉛眞汞自伏非藥中王其孰能與於此哉或者以混元圭丹擬議聖道譬如接竹點月不亦遠乎後天地生有形有質者皆非至藥也蓋形而下者非先天之道也子野曰易云男女媾精萬物化生始我之有此身也亦由父母媾精而生倘有父無母有母無父身從何有哉作丹之要與生身意同但有逆順之不同爾順則生人逆則生丹逆順之間天地懸隔也上陽子曰契云是非厯藏法内觀有所思陰道厭九一濁亂弄元胞諸術甚眾多千條萬有餘彭眞人云世人不達大道之宗元而無非旁門曲徑此屬多般皆爲左道乖訛天理悖亂至眞明違黃帝之言全失老君之旨本期永夀反爾傷生鍾離翁云生我之門死我戸之義大哉上賢說到下稍無人承當何哉只爲世人執己而修則千條百徑無非旁門者矣仙翁垂憫直言窮取生身處豈不忒露天機緣爲世人因業識中而來卻又因業識中而去一陽奔失形雖男子而身中皆陰若執一已而修豈能還其元而返其本哉旣不能還元返本又將何以回陽換骨也是以大修行人求先天眞鉛必從一初受氣生身之處求之方可得先天眞一之炁以還其元而返其本也此謂男子修仙之道如此女人修仙則以乳房爲生氣之所其法尤𥳑是以男子修仙曰煉氣女人修仙曰煉形女人修煉先積氣於乳房然後安爐立鼎行太陰煉形之法其道最易成也良有妙旨好把眞鉛着意尋莫教容易度光陰但將地魄擒朱汞自有天魂制水金可謂道高龍虎伏堪言德重鬼神欽已知夀永齊天地煩惱無由更上心道光曰眞鉛卽金丹也地魄在外藥則白虎是也在内藥卽金丹是也天魂在外藥則靑龍是也在内藥則己之眞精是也朱汞在外則龍之弦氣是也在内則己之眞氣是也水金在外則虎之弦氣是也在内則金丹是也又謂之水中銀此皆喻内外二事之藥也倘日已過命則隨滅吾儕着意尋師速煉金丹以超生死但將白虎擒龍自有靑龍制虎二氣相吞而產金丹復將此丹擒自已之眞氣眞氣亦戀金丹而結聖胎也外之眞龍眞虎旣降則内之龍虎自伏内煉神魂鬼魄旣聖則外之神鬼自欽非道隆德備之士孰能與於此哉體化純陽夀同天地逍遙物外自在人間萬念俱空何煩惱之有也子野曰地魄乃鉛也天魂乃汞也以鉛制汞在彼我爾上陽子曰着意尋眞鉛卽純陽翁詞云下手速修猶太遲從古聖師皆欲學者早下功入室眞鉛一物最不易尋貧者患無財有財患無地有地患無物有物患無侶侶者外護也着意尋者先聚法財而後擇地故仙翁曰始於有作無人見之句者若不得其善地則人見之而不可用也僕向未入室之先不甚注意於此及至入室之際競競着意尋擇方知多有難能之事甚費苦辛因知着意尋之句猶不易得况惟世人得師一訣之後又只懡㦬時光豈知年邁日衰容易老死而已地魄卽所尋之物天魂卽我家所積之汞也東海靑龍能制西江之月魄西山白虎能煉我家之日魂魂魄媾精乾坤比夀濟人接物德益重而鬼神欽煉已虛心道愈高而龍虎伏閻浮之諸塵漏盡煩惱更無仙家之眞樂匪常得大自在惟方便第一之積功也黃芽白雪不難尋達者須憑德行深四象五行全藉土三元八卦豈離壬煉成靈質人難識消盡陰魔鬼莫侵欲向人間留祕訣未逢一箇是知音道光曰龍之弦氣曰白雪虎之弦氣曰黃芽大藥根源實基於此其道至簡其事匪遙若非豐功偉行莫能遭遇眞師指授玄奧也道自虛無生一炁便從一炁產陰陽曰龍曰虎龍木生火虎金生水木火金水合成四象四象合而成大丹大丹之成實本於土土無定形分位四季四時不得四季眞土則四序不行造化何生焉是以四象五行全藉土也壬者水也卽眞一之炁生於天地之先變而爲陽龍陰虎合而成丹丹土也龍木也虎金也謂之三性三元不離眞一之水變也八卦者眞一之炁一變爲天曰乾爲父二變爲地曰坤爲母乾以陽氣索坤之陰氣一索而生長男曰震再索而生中男曰坎三索而生少男曰艮此乾交坤而生三陽坤以陰氣索乾之陽氣一索而生長女曰巽再索而生中女曰離三索而生少女曰兌此坤交乾而生三陰皆不離眞一之水變也故曰三元八卦豈離壬非惟三元八卦不離眞一之精自開闢以來凡有形質者莫不由此而成變化也眞一子云精乃天地之母陰陽之根水火之本日月之宗三才之液五行之祖萬物賴之以生成千靈承之以舒慘至於氣地高厚洞府名山玄象幽虛神仙聖眾風雨晦朔春夏秋冬未兆之前莫不因此鉛氣產出而成變化也修丹之士得眞一之水者萬事畢矣眞一之水以法化之爲眞一之黍珠吞歸丹田運火十月爍盡羣陰化爲純陽眞一之仙陰魔尸鬼逃遁無門善根種而靈骨生靈骨生而仙可冀靈骨之生善根之種也不於一生二二生千萬億無量生中積諸善根安得纔出頭來飄飄然有出塵氣象噫走鬼行尸一瓶一鉢便欲登仙神仙不易得也胡不捫已之心與平凡之心有以異乎我之仙事未有涯也必也廣大變通以道爲己任獨高一世鶴立雞羣人笑我爲疎狂我知我非凡輩赤松黃精乃吾友蓬萊方丈是吾家自然遭遇至人傳授至道結合心友叮嚀丹成仙翁欲向人間留祕旨奈何子期之不遇怎生得箇我般人也子野曰黃芽者鉛之精白雪者汞之氣欲求之者非有德行不可土者戊已壬者眞一之水生生化化之祖炁也上陽子曰黃芽白雪皆混元𥥆冥之中所產眞一之炁前言眞鉛要着意尋此乃言黃芽白雪不難尋者爲憑德行故也愚徒見此二詩似相矛盾豈知此道無德行者終不成丹諺曰言淸行濁休談道若知道而未積德卽如魚之無水燈之無油若何而成還丹哉四象五行三元八卦多端名色終不可無眞一之壬水我黃房公贊純陽老仙云鼎攢乎四象五行藥按乎三元八卦赤鳳吐南方之髓烏龜含北海之精亦指此也皆祖於純陽詩曰鼎隨四季中央合藥逐三元八卦行同一意也眞仙聖師雖慈悲引導實在乎人行爾此丹一成玉帝嘉贊天地萬靈莫不欽仰故號無上至眞靈寶神妙九還大丹昔元始天尊說度人經玄坐空浮懸一寶珠大如黍米者是也釋名大乘般若九品蓮臺光明藏大如意妙法靈感牟尼寶珠昔靈山會上龍女所獻者此也其貴重無可稱述豈世人所能識乎丹成則身聖陽神出現號曰眞人陰魔鬼賊化爲護法神身中靑龍白虎朱雀玄武三魂七魄三元九宮八部八景五臟八識皆化爲神三萬六千精光化爲神兵矣仙翁當時欲以口授祕訣與人然一世鮮有信受奉行者噫拜師於韁鎖之下杏林之後未之聞也草木陰陽亦兩齊若還缺一不芳菲初開綠葉陽先唱次發紅花陰後隨常道卽斯爲日用眞源反此有誰知報言學道諸君子不識陰陽莫亂爲道光曰草木未生之初含孕至朴及其甲坼稟一氣以萌芽故抽一𠏉以象一氣次分兩葉以象陰陽次兩葉中復抽一葉以應三才過此以往漸漸長茂春生綠葉夏長紅花此陽氣使然也秋肅而結實冬殺而復本此陰氣使然也陰陽兩齊化生不已若其缺一則萬物不生也眞一子云孤陰不自產寡陽不自成是以天地氤氲萬物化醕男女媾精萬物化生此常道只斯爲日用也眞源反此者有顚倒互用之玄機學者苟不明此何以超生死也子野曰金丹之道與草木陰陽一同譬如草木方感陽氣卽時發生芽蘖後必以花卉相繼而開花謝則結實於中猶人得此一點眞陽之氣其眞陰自然混合成胎陰陽相胥之意大率如此這些陰陽日用之常道但其眞源返處是則昧矣此所謂百姓日用而不知也上陽子曰天生二物曰動植也根爲植足爲動莫不皆稟乎陰陽二氣草木爲植乃無情之物也亦趂陽春而生長結實也人物爲動乃有情之形若非陰陽二氣則以何爲生育哉夫人爲物最靈者稟天地陰陽之正氣而生反不知陰陽盛衰順逆之道也僕今泄露到盡處也蓋順則爲凡父凡母逆則爲靈父聖母凡父凡母之氣順則成人謂之常道也靈父聖母之氣逆則成丹是曰眞源反此者男返是女而女返是男也不遇眞師亂爲何益不識玄中顚倒顚爭知火裏好栽蓮牽將白虎歸家養產箇明珠似月圓漫守藥爐看火候但安神息任天然羣陰剝盡丹成熟跳出樊籠夀萬年道光曰以人事推之男兒固不能有孕火裏固不可栽蓮然神仙有顚倒之妙輒使男兒有孕亦猶火裏栽蓮夫日爲離是男返爲女月爲坎是女返爲男此顚倒也二物顚倒而生丹卻將此丹點已之汞而結聖胎卽是男兒有孕豈非顚倒顚乎龍虎是眞一之精變爲二物分位東西實同出而異名也眞一之精屬汞爲靑龍在東白虎本是眞一精之子寄體在西其家在東仙翁曰金公本是東家子送在西鄰寄體生認得喚來歸舍養配將姹女作親情故此詩之意牽將白虎歸家以靑龍結爲夫婦以產明珠其言似月圓者修丹之法先取上弦西畔半輪月得陽金八兩次取下弦東畔半輪月得陰水半斤兩箇半輪月合氣而生丹故得金丹一粒似月圓也此外藥法象也及得此丹吞入已腹中謂牽此白虎歸已腹中配以我汞然後運陰符陽火煅煉而成金液還丹一粒亦重一斤此内藥法象也似月圓者蓋運火之卦一卦六爻六十四卦計三百八十四爻象一斤三百八十四銖也又外藥法象似月圓者參同契云上弦兌數八下弦艮亦八兩弦合其精乾坤體乃成二八應一斤易道正不傾是也仙翁指示月圓之意要使學道者洞曉造化之旨也分内外二八之數不可一槩而論之也火者非世之凡火乃元始祖炁也亦無爐可守也靑霞子云鼎鼎非金鼎爐爐非玉爐火從離下發水向坎中符三性旣會合二物自然拘固濟胎不泄變化在須臾高象先云天地氤氲男女媾四象五行隨輻凑晝夜屯蒙法自然何必孜孜看火候此自然爐火也但安神息調治文武策符漏刻毋得分毫差忒不半箇時立得丹餌然後復依進退陰符陽火運用抽添防危慮險十月功圓剝盡羣陰體化純陽跳出樊籠夀萬年也此方爲金液還丹未能入妙更須抱元九載使氣歸神方爲九轉金液大還丹也子野曰陰陽顚倒者陰中有陽陽中有陰火裏栽蓮火中有水陰中有陽殺中有生也白虎金精也白喻其質虎喻其難伏金精元是我家之物有生以來走在彼處今番認着用力牽歸如月如珠藥之象也得藥而後温養之法安神定息任其自然而已矣非所謂守定藥爐朝添八兩暮換半斤也上陽子曰陰陽有顚倒之機金丹有返還之術火裏栽蓮以坎而實離白虎爲難制之物爲太乙所含之氣牽將歸家者以伏其氣明珠爲丹旣已得丹運已汞調神息以養之莊子云眞人之息以踵廣成子云丹竈河車休矻矻鶴胎龜息自綿綿此爲神息也待其陰盡陽純以成眞人超凡入聖矣三五一都三箇字古今明者實然稀東三南二同成五北一西方四共之戊已自居生數五三家相見結嬰兒嬰兒是一含眞氣十月胎圓入聖基道光曰木數三居東火數二居南木能生火二物同宮故二與三合而成一五也金數四居西水數一居北金能生水二物同宮故四與一合而成二五也戊已本生數五是三五也三五合而爲一故曰三五一也自古迄今能合三五一而成丹者實稀也一者丹也卽彼之眞一之炁乃先天地之母也我之眞一之氣乃天地之子也以母炁伏子氣如猫捕鼠而不走失也子母之氣相戀於胞胎之中以結嬰兒也所謂太乙含眞氣者含眞一之氣也如人懷胎十月滿足自然降生聖胎功圓自然神聖故曰十月胎圓入聖基也子野曰三五一者金木水火土五行之數一者太極也五行不合則各一其性合則復爲一太極人能以五行合而爲一則復于混沌嬰兒有兆矣所謂三家相見之義其妙如此十月數周時至氣化自然符合先聖之機也上陽子曰天三生木地二生火火數二木數三三與二同性統爲一五木居於東法象爲靑龍龍之氣爲汞火居於南法象爲朱雀木生火是木爲體火爲所生之氣故木火爲一家然皆陽中之孤陰所以異名曰玄曰無曰妙者以其有木有火而無金水戊土也天一生水地四生金金數四水數一一與四同情統爲一五金居西法象爲白虎虎之氣爲鉛水居於北法象爲玄武金生水是金爲體水乃金所生之氣故金水爲一家然皆陰中之寡陽所以異名曰牝曰有曰竅者以其有金有水而無木火已土也天五已土地十戊土戊土居坎已土居離戊已分則二土之數十戊已合則二土成圭而數五土居中央是爲一五總而言三五震木離火同性爲一家龍爲震戸汞產於中兌金坎水同情爲一家虎爲兌門鉛生於内離已坎戊同根爲一家朱雀玄武相合而生物是云三家龍與朱雀意主生人虎與玄武意主殺人此世間法若欲出世間法則必顚倒制之功歸戊已二土也何哉金本戀木慈仁而内懷從革之情無由自合木雖愛金順義而内懷曲直之性豈得自媒欲使媒合功在二土以通其好且戊土生金則欲金氣發旺而相胥已爲木剋則先煉已珍重以求丹若不煉已待時則不能常應常靜煉已旣熟卻與戊合戊已一合則金木會金木會則龍虎交龍虎交則三五合一三五合一則三家相見三家相見則鉛汞結鉛汞結則嬰兒成嬰兒成則無非此之一氣佛祖云乾坤之内宇宙之間中有一室祕在形山此卽是太乙含眞氣之妙是以五行分而各得其道五行合而生一氣一氣結而爲嬰兒嬰兒出而成眞人矣不識眞鉛正祖宗萬般作用枉施功休妻謾遣陰陽隔絕粒徒教腸胃空草木金銀皆滓質雲霞日月屬朦朧更饒吐納幷存想總與金丹事不同道光曰眞鉛之要二八爲宗餘皆非道枉施功耳破迷歌云休妻不是道陰陽失宗位休糧不是道死去作餓鬼王眞人曰學人剛强辭妻妾不念無爲無不爲蓋道體法自然一切妄作烏可與金丹同日語哉子野曰休妻絕粒干甚麽事草木金銀有質之物雲霞日月外邪客氣吐納存想皆出妄爲俱非眞鉛制眞汞之義去金丹之道遠矣上陽子曰眞鉛乃靈父聖母之氣若非此氣將何入室而施功夫人生天地間稟凡父之精凡母之血而有其身故修仙做佛之道不外乎此而所異者須要靈父聖母方爲眞鉛何謂靈常應常靜之謂靈逆施造化之謂靈何謂聖太極初分之謂聖虎不傷人之謂聖有此靈聖方知眞鉛之祖宗也人之一身焉有許多精氣洩漏至盡身何能存若寶愛之則身健而命延夀永又得眞鉛而煉之豈不仙乎世人若無明師決破眞鉛一物雖行盡三千六百諸多旁門空自有損若望其成功奚可得哉萬卷仙經語總同金丹只此是根宗依他坤位生成體種向乾家交感宮莫怪天機都漏泄卻緣學者自迷蒙若人了得詩中意立見三淸太上翁道光曰萬卷丹經至當歸一皆依坤母生成之理逆而修之種在乾家交感之宮仙翁於此泄盡天機學者酷自迷䝉不肯近取諸身以明至道煉一黍米而賓於天也子野曰他爲坤位我是乾家藉彼坤中生物之氣自種靈根於家園之下以成聖胎耳上陽子曰金丹之妙不出鉛汞二物爲根宗也世人爲不知金丹之有根宗則不知内外二丹之妙夫安爐立鼎外也乾家坤位外也離已坎戊外也金精木液内也紅鉛黑汞内也先天一炁内也惟此先天一炁雖曰在内而從外來故仙師有依他種向之密旨參同契云丹砂木精得金乃幷又云太陽流珠常欲去人卒得金華轉而相因無非是此鉛金一物但一世間男女生成之法而逆種於乾宮故眞一子云更爲男女遞作夫妻者此也眞仙聖師慈悲開諭接引當來用心
