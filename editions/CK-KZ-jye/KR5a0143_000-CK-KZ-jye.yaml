body:
  text: 悟眞篇序嗟夫人身難得光陰易遷罔測短修安逃業報不自及早省悟惟只甘分待終若臨期一念有差墮三塗惡趣則動經塵劫無有出期當此之時雖悔何及故老釋以性命學開方便門教人修種以逃生死釋氏以空寂爲宗若頓悟圓通則直超彼岸如有習漏未盡則尚徇於有生老氏以煉養爲眞若得其要樞則立躋聖位如其未明本性則猶滯於幻形其次周易有窮理盡性至命之辭魯語有毋意必固我之說此仲尼極臻乎性命之奧也然其言之常略而不至於詳者何也蓋欲序正人倫施仁義禮樂之教故於無爲之道未嘗顯言但以命術寓諸易象以性法混諸微言耳至於莊子推窮物累逍遙之性孟子善養浩然之氣皆切幾之迨夫漢魏伯陽引易道陰陽交媾之體作參同契以明大丹之作用唐忠國師於語錄首序老莊言以顯至道之本末如此豈非教雖分三道乃歸一奈何後世黃緇之流各自專門互相非是致使三家宗要迷沒邪歧不能混一而同歸矣且今人以道門尚於修命而不知修命之法理出兩端有易遇而難成者有難遇而易成者如煉五芽之氣服七曜之光注想按摩納淸吐濁念經持呪噀水叱符叩齒集神休妻絕粒存神閉息運眉間之思補腦還精習房中之術以至服煉金石草木之類皆易遇而難成者已上諸法於修身之道率皆滅裂故施功雖多而求效莫驗若勤心苦志日夕修持止可以辟病免其非橫一旦不行則前功漸棄此乃遷延𡻕月必難成功欲望一得永得還嬰返老變化飛升不亦難乎深可痛傷蓋近世修行之徒妄有執着不悟妙法之眞卻怨神仙謾語殊不知成道者皆因煉金丹而得恐泄天機遂託數事爲名其中間惟閉息一法如能忘機絕慮卽與二乘坐禪頗同若勤而行之可以入定出神奈何精神屬陰宅舍難固不免長用遷徙之法旣未得金汞還返之道又豈能回陽換骨白日而升天哉夫煉金液還丹者則難遇而易成要須洞曉陰陽深達造化方能追二氣於黃道會三性於元宮攢簇五行合和四象龍吟虎嘯夫唱婦隨玉鼎湯煎金爐火熾始得玄珠成象太乙歸眞都來片餉功夫永保無窮逸樂至若防危慮險愼於運用抽添養正持盈要在守雌抱一自然復陽生之氣剝陰殺之形節氣旣周脫胎神化名題仙籍位號眞人此乃大丈夫功成名遂之時也今之學者有取鉛汞爲二氣指臟腑爲五行分心腎爲坎離以肝肺爲龍虎用神氣爲子母執津液爲鉛汞不識浮沈甯分主客何異認他財爲已物呼別姓爲親兒又豈知金木相剋之幽微陰陽互用之奧妙是皆日月失道鉛汞異爐欲望結成還丹不亦遠乎僕幼親善道涉獵三教經書以至形法書算醫卜戰陳天文地理吉凶死生之術靡不留心詳究惟金丹一法閱盡羣經及諸家歌詩契論皆云日魂月魄庚虎甲龍水銀硃砂白金黑錫坎男離女能成金液還丹終不言眞鉛眞汞是何物也不說火候法度温養指歸加以後世迷徒恣其臆說將先聖典教妄行箋註乖訛萬狀不惟紊亂仙經抑亦惑誤後學僕以至人未遇口訣難逢遂至寢食不安精神疲顇雖詢求徧於海嶽請益盡於賢愚皆莫能通曉眞宗開炤心腑後至熙甯己酉𡻕因隨龍圖陸公入成都以夙志不回初誠愈恪遂感眞人授金丹藥物火候之訣其言甚𥳑其要不繁可謂指流知源語一悟百霧開日瑩塵盡鑑明考之仙經若合符契因念世之學仙者十有八九而達眞要者未聞一二僕旣遇眞詮安敢隱默罄所得成律詩九九八十一首號曰悟眞篇内七言四韻一十六首以表二八之數絕句六十四首按周易諸卦五言一首以象太乙續添西江月一十二首以周𡻕律其如鼎器尊卑藥物斤兩火候進退主客後先存亡有無吉凶悔吝悉備其中矣及乎篇集旣成之後又覺其中惟談養命固形之術而於本源眞覺之性有所未究遂玩佛書及傳燈錄至於祖師有擊竹而悟者乃形於歌頌詩曲雜言三十二首今附之卷末庶幾達本明性之道盡於此矣所期同志覽之則見末而悟本舍妄以從眞旹皇宋熙甯乙卯𡻕旦天台張伯端平叔序
