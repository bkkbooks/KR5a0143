body:
  text: 至溥然不免泄盡天機學者奚可懷愚䝉之淺見起執迷之妄想多生謗毁惑亂仙經豈知一失人身萬劫莫贖切宜三思諦觀諦受咦世人若不迷䝉箇箇可辦此事伏惟此書在在處處有百萬神兵擁護豈可忽之一切學仙道伴因緣遭逢得遇此書特加敬仰信受奉行勿生驚疑勤而行之立躋天仙之位也重刊道藏輯要悟眞篇紫陽眞人張伯端著紫賢眞人辥道光注子野眞人陸墅注上陽子陳致虛注七言絕句凡六十四首以象八八六十四卦之數先把乾坤爲鼎器次搏烏兔藥來烹旣驅二物歸黃道爭得金丹不解生道光曰經云日月本是乾坤精聖人以乾坤喻鼎器日月喻藥物乾坤卽眞龍眞虎日月卽龍虎之弦氣也鼎鼎元無鼎藥藥元無藥聖人假名託象立喻其要妙在眞一之精歸於黃道也黃道卽中宮金丹凝結之處也子野曰我爲乾鼎彼爲坤器乾坤覆合則驅二氣會於中宮加以進火養符毫髮無差則金丹烏得不生焉上陽子曰鼎器者何也靈父聖母也乾男坤女也藥物者何也靈父聖母之氣乾男坤女之精驅此二家之物歸煉於神室之中以成靈丹黃房公曰手握乾坤口吞日月者是也安爐立鼎法乾坤煅煉精華制魄魂聚散氤氲爲變化敢將玄妙等閑論道光曰積諸陽氣爲天曰乾在上而不潤下積諸陰氣爲地曰坤在下而不炎上此天地不交也不交則焉能造化而生萬物哉蓋天雖至陽而中有一陰之氣故能降地地雖至陰而中有一陽之氣故能升天天地二氣氤氲萬物化醕以此二氣交合而成變化也金丹之道安爐立鼎煅煉精華以制魂魄莫不取法於天地也以類交結而成造化子母歌曰情交無用藥氣合無用語金丹以二氣同類而成始自無中生有復自有中生無無形而能變化是以變化無窮此乃天機也子野曰安爐立鼎法效天地地天則泰天地則否至於氤氲變化之妙其旨微矣上陽子曰爐鼎是彼我乾坤卽男女靈父聖母所媾之氣曰精華又曰華池神水以此鍛煉而成金丹則凡父凡母順而成人亦效天地之造化耳休泥丹竈費功夫煉藥須尋偃月爐自有天然眞火候不須柴炭及吹噓道光曰或有人指兩腎中爲偃月爐誰肯自認已錯更將錯路教人吁錯之甚也偃月爐之形仰開如偃月樣北海是也元始祖炁存焉中有自然眞火何用柴炭吹噓之有子野曰葉文叔指兩腎爲偃月爐是不知也謬註於世誤人甚矣上陽子曰純陽翁云曲江上見月華瑩淨此卽偃月爐也佛祖云西江皆此一竅而已偃月爐中玉蘂生硃砂鼎内水銀平只因火力調和後種得黃芽漸長成道光曰偃月爐陰爐也中有玉蘂之陽氣卽虎初弦之氣硃砂鼎陽鼎也中有水銀之陰氣卽龍初弦之氣金丹以此二弦之氣調停和合之功種得一粒黃芽結成黍米之珠也上陽子曰偃月爐中玉蘂生卽陰中之陽坎中之金也硃砂鼎内水銀平卽陽中之陰離中之火也陰陽二氣相生黃芽方結成丹矣嚥津納氣世人行有藥方能造化生鼎内若無眞種子猶將水火煮空鐺道光曰嚥津納氣世人多行之殊不知皆後天地生至陰之物非先天之炁夫先天眞一之炁混於恍惚杳冥之間難求難見聖人以法伏之變煉成丹此炁是名眞種子經曰伏炁不服氣服氣須伏炁服氣不長生長生須伏炁故得杳冥中精恍惚中物以此變煉成丹服歸丹田中則萬化自生矣故云有藥方能造化生也此眞種子也若無眞種子空鐺水火妄作施爲子野曰眞種子卽眞鉛也契云植禾當以黍覆雞用其卵上陽子曰物無陰陽安能生產人無眞種豈有姙孕嚥津納氣一已之陰孤陰不產獨陽不生陰陽若眞方得眞種咦妙矣哉調和鉛汞要成丹大小無傷兩國全若問眞鉛是何物蟾光終日照西川道光曰驅龍則汞火飛揚駕虎則鉛光閃爍氤氲造化一粒先天之炁結成丹龍大虎小陽尊陰卑之義何傷之有金丹因上下兩弦金水結成號曰眞鉛蟾光者金水之精終日照者與日交光之旨也象陰陽交合之義西者金也川者水也金水生於西方也聖人以八月十五夜合金水之氣結眞一之精故云蟾光終日照西川子野曰求鉛伏汞之法要在調和使無太過不及之患太過則恐傷於彼不及則恐不結丹大小者言陰陽也易曰大往小來蟾光照西川水中有金也上陽子曰乾之長男曰震言大也主產汞坤之少女曰兌言小也主產鉛震兌調和何傷之有兩國全者彼旣無虧我亦濟事眞鉛生於兌兌位乎西也未煉還丹莫入山山中内外盡非鉛此般至寶家家有自是愚人識不全道光曰龍不在東溟虎不在西山家家自有逆而修之還丹可冀子野曰已失而復得者謂之還已去而復來者謂之返作丹之要非鉛不可此鉛家家有之惜乎人之不識之也上陽子曰世人但見一段奇山秀水則眾皆言此地好修行古今多少人誤了也豈知大川幽谷所有者木石麋鹿而已是皆非類不可煅煉大還丹也若煉還丹必求同類若求同類大隱市㕓仙翁前詩己云何必深山守靜孤之句至此再題此意可謂深切此般眞鉛家家有之人人有之只爲夢生醉死之場依稀過了噫不遇眞師誰人得識竹破須將竹補宜覆雞當用卵爲之萬般非類徒勞力爭得眞鉛合聖機道光曰竹器破矣用金木之類補之可乎若欲器完必以竹補之鷄將覆矣以土木之類抱之可乎若欲翼生必以卵覆之陶眞人曰竹破須竹續木破須木補屋漏以瓦葢人衰以類生若非同類用功徒勞參同契云同類易施功非類難爲巧欲作服食仙當以同類者蓋人稟天地之秀氣以有生眞鉛是天地之母炁託同類之物孕而育之故眞鉛爲母炁也我之眞氣爲子氣豈非同類之至妙者乎若修天仙必求同類是以合至聖之深機自然之大道也子野曰紫陽眞人說到這里可謂步步向前上陽子曰從來神仙不肯分明說說得分明笑殺人崔公入藥鏡也只三字義用鉛不得用凡鉛用了眞鉛也棄捐此是用鉛眞妙訣用鉛不用是誠言道光曰凡鉛者卽後天生滓之物眞鉛者卽眞一之氣也人之精氣日逐飛散無由凝聚以結聖胎聖人煉眞鉛取而服之凝結成砂日逐運火漸漸添汞汞氣漸多鉛氣漸散添汞減鉛其妙如此十月火足六百卦終鉛氣飛浮只留得一味乾水銀鉛盡汞乾化爲金液大丹體變純陽與天齊夀故曰用了眞鉛也棄捐用鉛不用之說豈虛言哉學者問道至此則知師恩難報當盟心於天日之下誓當成道以答師恩若負師恩如負天日也子野曰用鉛之法如捕魚兔之筌蹄魚兔賴筌蹄而得之旣得則筌蹄無用矣亦如鉛池煎銀銀出不用鉛矣知此義者則知用鉛之妙訣矣上陽子曰老子經云天地無全功聖人無全能萬物無全用深明斯旨則知用了眞鉛卽棄之義虛心實腹義俱深只爲虛心要識心不若煉鉛先實腹且教守取滿堂金道光曰虛心則無我萬物皆空淸其天君也實腹則煉鉛乾汞毋搖其精精者汞也守鉛以實其腹腹實則金玉滿堂矣一者丹也抱一以虛其心心虛則一塵不立方其虛也則鍊鉛以制之及其實也則抱一以守之形神俱妙與道合眞修丹之士若煉鉛金毋搖汝精精少則還丹不成矣子野曰心虛則念靜一塵不立腹實則丹成四大牢固念靜丹成形神俱妙上陽子曰非煉已功勤則欲心虛而不能非全精絕慾煉鉛功熟則欲腹實而不能是故心虛而能應物腹實而乃全神虛心常應實腹常靜常應常靜常淸靜矣今人以精氣斵喪殆盡爲不識心仙翁教守取滿堂金玉方爲返本還元也夢謁西華到九天眞人授我指玄篇其中𥳑易無多語只是教人煉汞鉛道光曰我如來云惟此一事實餘二卽皆非金丹之道除汞鉛之外別無妙法子野曰高象先云日夕思眞不覺魂升玉京上帝憐之遂命西華太乙夫人指示金丹訣其篇有曰乾坤陰陽之門戸乾道男兮坤道女時人不識眞陰陽茫茫天地尋龍虎又云叔通從事魏伯陽相將笑入無何鄉准連山作參同契留爲萬古丹經王其言甚多只是教人明眞龍眞虎煉鉛制汞而已叔通姓湻于諱斟上陽子曰志於道者神仙中人也雖一寢一息之間未嘗暫忘故夢寐中常與眞仙上聖往來何也天無私親親於有德道自虛無生一炁便從一炁產陰陽陰陽再合生三體三體重生萬物昌道光曰道本虛而乃有形之氣氣本實而乃無形之形有無相制則一生焉夫一生二二生三三生萬物萬物莫不負陰而抱陽冲炁以爲和方其未形冲和之炁不可見也及其旣形淸氣爲陽濁氣爲陰二氣氤氲兩情交媾曰天曰地曰人三物生焉易曰天地氤氲萬物化醕男女媾精萬物化生是以聖人探斯之賾而知源窮斯之神而知化故能返本還源顚倒陶鎔逆施造化賊天地之母炁以爲丹盜陰陽之精氣以爲火煉形返歸於一氣煉氣復入於虛無故得身與道合微妙圓通變化無窮隱顯莫測號曰眞人子野曰一生二二生三三生萬物卽聖胎之眞身雖千百億化而無窮故金丹四百字云一載生箇兒箇箇會騎鶴泥丸翁云一載胎生一箇兒子生孫兮孫又枝皆發明三生萬物之義上陽子曰道生一炁一炁生形形中又含始炁是爲先天眞一之炁也此先天一炁順則爲人逆則爲丹逆則男子懷胎順則女子有孕此章專爲修行丹成陽神出胎再造陰陽復爲巳上事故云三體重萬物昌也坎電烹轟金水方火發崑崙陰與陽二物若還和合了自然丹熟徧身香道光曰坎電者水中之火謂之陰火卽虎之弦氣金水方者西北乾方卽龍是也西北又是天門謂之玄門此言虎以陰中之火炤爍乾龍龍卽發崑崙之火以應之二物之火相幷和合了則眞一之精自然凝結卽時採取服之則百骸俱理而香美矣參同契云金砂入五内霧散若風雨薰烝達四肢顏色悅澤好髮白皆變黑齒落生舊所老翁復丁壯耆嫗成姹女豈非眞香滿身乎旣餌之後復運陰符陽火進退抽添不失其時金液還丹自然成熟滿身增輝香且美矣此言内外二丹法象也子野曰坎電者水火也金水爲坤方水火交擊於坤方採丹歸巳自然一道眞一之氣直透頂門與身中陰氣混合徧體生香香生乃丹熟之驗矣上陽子曰坎電者乃彼鉛氣發生之時我卽乘其時至發崑崙之火應之所謂一月止有一日一日止有一時者此也香透丹田一身調暢目明體健得丹之效也離坎若還無戊巳雖含四象不成丹只緣彼此懷眞土遂使金丹有返還道光曰契云坎戊月精離巳日光離巳象龍之弦氣坎戊象虎之弦氣戊巳眞土分居二位龍虎若無二土之氣安能合併而使四象會於中央以成丹哉子野曰乾坤坎離四象雖具若非戊己配合則欲返者不得返還者不得還上陽子曰四象卽乾坤日月乾坤乃坎離之體日月乃坎離之象戊巳乃坎離之門妙在彼此懷眞土何用意太切若非兩家各以彼此二土合之則一氣何由而往來金丹何由而還返也老子云玄牝之門是謂天地根者卽彼此二土也日居離位翻爲女坎配蟾宮卻是男不會箇中顚倒意休將管見事高談道光曰日中烏屬陰故爲離女月中兔屬陽故爲坎男談不到此以管窺天子野曰離坎顚倒見律詩註上陽子曰離外陽而内陰是有外而無内坎外雌而内雄是有内而無外皆不得爲純陽以坎配離是云顚倒今時學人不肯苦志求師惟記前人幾件公案入廣眾中喃喃不住恃其機鋒敏捷以逞乾慧不思訛了舌頭把做何用饒他懸河之辯反爲入道之魔愈見學卑識淺又安能具大方之眼而拜師於韁鎖之下哉太上曰知者不言言者不知我太虛李眞人得丹之後聞寺講經濳眾聽之出而嘆曰他們說得是行不得我們行得又說不得仙翁憐憫此徒利口誤身故曰休將管見事高談取將坎位中心實點化離宮腹内陰從此變成乾健體濳藏飛躍盡由心道光曰離外陽而内陰坎外陰而内陽移内陽點内陰卽成三乾健之體此喻金丹是至陽之氣號曰陽丹結在北海之中以法取來點離已之陰汞化爲純陽之體然後運火抽添進退俱由我心運用也或者以金丹爲坎中一畫此後天地生滓穢之物何敢比先天之道也抽鉛添汞之法灼然見於是矣子野曰坎中之陽乾也乾動而陷於坤以成坎乾卻爲離修煉之法當於坎中取其一陽歸還於離而復純陽則修丹之法能事畢矣上陽子曰漆園莊老仙云鴻濛雲將謀報渾沌之德日鑿一竅七日而渾沌死一世之人假父母一點眞陰眞陽而有此身渾渾全全無一虧欠及乎二八之年方得養就純陽之全體已而鴻濛雲將者皆至六賊日戕於外七情夜殘於内豈知純陽交陰則虧全體而成離純陰負陽則奪一氣而成坎一切常人殆盡而已大修行人取坎還離是爲金丹之道也震龍汞自出離鄉兌虎鉛生在坎方二物總因兒產母五行全要入中央道光曰汞爲震龍屬木木生火木爲火母火爲木子此常道之順五行也如硃砂屬火爲離汞自砂中生卻是火返生木故曰兒產母也此五行顚倒之術也鉛爲兌虎屬金金生水金爲水母水爲金子此常道之順五行也如黑鉛屬水爲坎銀自鉛中生卻是水反生金故曰兒產母也此亦五行顚倒之術也不言銀者鉛中銀謂之眞鉛中央者下丹田大中極也太白眞人曰五行顚倒術龍從火裏出五行不順行虎向水中生二物互相生產而成四象會中宮合五行而結丹也子野曰大槪明兒產母之道上陽子曰震爲乾之長男替父之志而行道兌爲坤之少女代母之位而行道震兌合而龍虎降離坎交而鉛汞產餌丹歸於中央神室也月纔天際半輪明早有龍吟虎嘯聲便好用功修二八一時辰内管丹成道光曰仙翁所以指示月半輪者但發明二八兩半輪之數取喻龍虎也此道妙用卻在一時辰中分作六候只於兩候中金丹立成尙餘四候別有妙用不可盡言此皆天機難書竹帛口傳心授是也愚者不得眞師卻言藥成於一時非止用一時辰者蓋匹夫茫然不知所歸私意揣度亦何謬甚若云非止用一時辰是將款以日辰奚爲至𥳑至易之妙也此道非人世間可得而聞者要須大德大善方許參求謹按大丹火記曰聖人下功之際造鉛之初盜混元一周天之炁奪三千零七十三萬正氣之數聚於乾坤之鼎會於生殺之舍天地之數奪盡日月之數奪盡龍虎之數奪盡陰陽五行之數奪盡生辰之數奪盡擒在一時辰中製造聖丹一粒大如黍米其重一斤至靈至聖至尊至貴爲天地之元精作一身之主宰可謂賊天地盜陰陽宇宙在乎手萬化生乎身得成至眞仙子賓於上帝我祖師有言一時辰内管丹成豈虛語哉此其驗也子野曰藥生之時如月出庚而至丁乃上弦金半斤之氣候斯時陰陽相逢易於交媾至於十五三陽圓照東方甲則月已一輪升天卽今二八之氣候學者知其時而修煉則此一時之中金丹可成上陽子曰月纔天際月初受日之微陽虎嘯癸生虎旺先天之始炁時來勿失爐損難全紫陽老仙說到這裏一步緊一步惟恐後人之不仙也愚夫濁子終日談道以盲引盲旣不知龍吟虎嘯爲何物又不知用功在那一時懵然無所知卻謗老仙之語爲三峰採戰之術可憐此徒只管罪深去了且道這一時是甚麼時咦莫向天邊尋子午身中自有一陽生華嶽山頭雄虎嘯扶桑海底牝龍吟黃婆自解相媒合遣作夫妻共一心道光曰華嶽乃西山月出之地以象虎雄虎乃虎初弦之氣陰中之陽故曰雄虎扶桑乃東海日出之所以象龍牝龍乃龍初弦之氣陽中之陰故曰牝龍二物間隔東西黃婆能使之交合結爲夫妻以產黃芽子野曰坎上離下調以中和之意則虎龍相愛如夫婦黃者中也婆者女之終稱故無妒忌而能媒合黃婆之義中和盡焉上陽子曰山頭雄虎危而難伏海底牝龍險而難降非有大力量大猛勇之士安能駕馭哉卽如金丹是一箇至陽之氣居於恍惚不測之内危而難得險而難收自非積德重厚煉已純熟安能施功而得之哉且道如之何得他共一心咦若求天上寶須用世間財西山白虎正猖狂東海靑龍不可當兩手捉來令死鬬化成一塊紫金霜道光曰海蟾云左手捉住靑龍頭右手扯住白虎尾一時將來入口吞思量此物甚甘美算來只是水中金妙達玄機眞要理此言外象愚者未聞至道將兩手捉兩獸又非也子野曰西山白虎坎中金情東海靑龍離中木性二物𤢆惡猖狂不易擒捉若得法制之則彼此和合而化成丹這箇死字極有深理諺云欲求生富貴須下死工夫上陽子曰虎有傷人之理要思所以伏之龍有奔逸之患要思所以降之且道云何降伏云何死鬬咄耳目口三寶固塞勿發通眞人濳深淵浮游守規中者是也赤龍黑虎各西東四象交加戊巳中復姤自茲能運用金丹誰道不成功道光曰東乃赤龍之弦氣也名曰姹女西乃黑虎之弦氣也名曰金公二物卽砂中汞鉛中銀也赤龍黑虎合兩弦之氣交南北東西皆歸戊己名曰刀圭一粒如黍米光明烜赫透入崑崙山八水俱朝會然後進陽火於復卦退陰符於姤爻自然運用抽添莫不頭頭中度而於金丹之道指日成矣子野曰龍東虎西所以間隔欲使相逢須憑戊巳旣得交媾產成紫金之丹養火於復姤之功矣上陽子曰我趙老師父因見一人儘日談道每謂曾遇高人發明師卽前拜而問曰道不敢問且道龍虎爲何物人曰龍虎在汝身師曰作何狀人曰肝肺是也師曰汝當入拔舌地獄受報去矣更莫向世間誤賺人今紫陽翁指示龍虎二物忒殺切了夫我之物爲龍彼之物爲虎有彼我之分是云各西東龍之頭爲已虎之尾爲戊龍虎因之而交會復姤由茲而運用金丹得之而成功咦知之非難行之惟難先且觀天明五賊次須察地以安民民安國富當求戰戰罷方能見聖人道光曰五賊在天爲五星在地爲五嶽在神爲五帝在隅爲五方在人爲五臟五音五氣五性在物爲五行五色五金五穀五味是也陰符經曰天有五𧶂見之者昌人能見此逆而修之則宇宙在乎手萬化生乎身也察地之理在於安民民爲邦本本固邦甯而國富矣是以聖人以身爲國以精爲民以火爲臣以丹爲君也丹火相須君臣慶會則天下平治一身之國富矣修丹之士若能觀擒五賊逆而修之盜陰陽而運化則眞一之精可奪而已之陰汞立乾矣精固氣全求戰必勝是以運火無差十月功圓則脫胎神化爲眞人仙子故曰戰罷方能見聖人子野曰天者心也五賊者心中具五行之性五行各具一性則互相戕賊我之元氣皆爲賊矣金主怒木主喜水主順火主炎土主靜此五行之性能見此五賊者則心無雜念體若太虛民安國富者一身之喻也身中精氣神人民也精全氣壯謂之民安四大康健謂之國富國富而戰可克捷矣倘此心之妄想不除此身之根本不固盜賊蜂起精耗氣散以此而戰則必殞身而已何可得見聖人乎此章正是修心煉已築基事業上陽子曰金丹之道先須煉已使神全氣盛七情不動五賊不亂六根淨盡精難搖動此謂賊不打貧家丹道之言五賊卽眼耳鼻舌意爲天之五賊色聲香味觸爲世之五賊愛慾貪嗔癡爲内之五賊天之五賊不謹於内則内之五賊蜂起世之五賊不除於外則天之五賊𧲣生是以眼見色則愛起而賊精耳聽聲則慾起而搖精鼻聞香則貪起而耗精口嘗味則嗔起而走精身意遇觸則癡起而損精五者日夜戕賊於身其精能有幾何精一去則神氣隨之身則喪矣修行之人以身爲國以精氣爲民精不動搖謂之民安神氣充裕謂之國富以求丹爲戰敵以先天一炁爲聖人煉已者去五賊之害而先寶精養氣然後可以戰勝而得先天眞一之炁仙師以戰爲喻者使人恐懼修省愚者不明煉已去賊之害觀此求戰用將輕敵等語指爲三峰採戰之說至於結不可解咦愚者自愚賢者自賢用將須分左右軍饒他爲主我爲賓勸君臨陣休輕敵恐喪吾家無價珍道光曰此篇明火候作用也將者火也左爲文火右爲武火夫運火自子至已六辰爲陽象春夏發生之德也故爲文火居左謂之陽火也自午至亥六辰爲陰象秋冬肅殺之刑也故爲武火居右謂之陰符也夫主爲陽而雄好爭也賓爲陰而雌好靜也饒他爲主我爲賓卽是守雌而不雄也持靜而不爭也此慮險防危之意也喻如賓之見主進退恭謹而不敢妄動也兵法曰以逸待勞又曰制人而不制於人此之謂也夫運火者道之用存乎火火之用存乎人先定刻漏以分子午次接陰陽以爲化基搬六十四卦於陰符鼓二十四氣於陽火天關在手地軸由心回七十二候之要津攢歸鼎内奪三千六百之正氣輻凑胎中運用有方謹戒抽添精專運用慮其危防其險不使頃刻參差分毫差忒故得外接陰陽之符内生眞一之體苟或運心不謹節候差殊致使姹女逃亡靈胎不結而還丹無價之寶失矣故云臨陣休輕敵而可不愼者乎子野曰以軍將爲喻者蓋兵乃凶器善用之可全性命若輕戰易敵必致敗亡採藥之際當以彼我分爲左右軍伍我爲左軍彼爲右軍動容周旋端謹誠肅無令一毫犯其嚴令庶可保全無失喪也上陽子曰左爲我右爲彼饒他爲主我爲賓彼居上而我居下彼欲動而我欲靜也仙師言求丹乃以軍敵爲喻者蓋霎時間稍有不謹卽致敗失可輕易乎金丹九還惟只半箇時中造化爭馳虎龍交戰奪天地主宰之造化奪太極未分之造化奪乾坤交媾之造化奪陰陽不測之造化奪水火旣濟之造化奪五行戰剋之造化奪萬物生成之造化聚於頃刻而求一點先天眞炁以煉成丹其可不謹愼哉故此章專喻外丹法象若得外丹神仙之能事已畢是戒臨陣休輕敵也修行之士做得這一著出來方云難事還丹只此實爲最難故如來云世尊說此難事是爲甚難者此也若稍輕敵七情六賊有一不防則吾家至粹至精之寶喪矣安可輕敵乎火生於木本藏鋒不會鑽研莫强攻禍發總因斯害已要須制伏覓金公道光曰經云火生於木禍發必剋精生於身情動必潰不會鑽研禍斯害已呂眞人曰火發七戸密牢關莫教燒破河車路此要須制伏覓金公也子野曰木中有火乃本來已抱此殺氣矣倘其一發則木必焚蓋此生殺之機隔一線地百姓昧此皆流於淫蕩邪僻之歸矣聖人察其火之將發以水制之則火不能爲害也上陽子曰木喻此身火喻精氣鋒比愛慾鑽研比修煉夫人藉父母精氣而有此身日夜長大而精氣復生乎我之身矣至於年壯我之精氣且盛而愛慾之禍至矣不可得而制伏若欲制伏必得先天眞鉛方可然不得眞師指示眞鉛端的次第切莫强爲也金公本是東家子送在西鄰寄體生認得喚來歸舍養配將姹女作親情道光曰金丹作用法象有陽中之陰復陽而又陰者有陰中之陽復陰而又陽者又有内藥陰陽外藥陰陽内三性外三性内五行四象外五行四象又有内外陰陽互用法象反反覆覆不可名狀但默識心知可也吾儕親承玄旨不可蹉跎如不遭逢眞旨莫能洞曉其端仙翁作詩重重發明者舉一隅斯足也子野曰此章與前取將坎位中心實義同上陽子曰震是東家西是兌若求兌位莫離壬如此方是認得眞不可作容易喚來旣能喚來最緊關是歸舍一節噫件件是難底勾當奚敢妄爲又安敢妄說世有一等地獄種子開口便去說禪說道賺到老死猶不知悔又豈能解圓悟禪師之語哉圓悟云腳根下廓爾是無禪之禪謂之眞禪如兔懷胚胎頂門上照燿是無道之道謂之眞道似蚌含明月此豈不是認得喚來歸舍之妙乎姹女遊行自有方前行須短後須長歸來卻入黃婆舍嫁箇金公作老郎道光曰姹女汞也謂之汞火遊行有方者前行是外藥作用一時中用兩候故云須短也後行是内藥作用一時中用四候故云須長也有此兩用故曰自有方聖人下功煉金丹之初運汞火不出半箇時辰立得眞一之精大如黍米者餌之此爲前行須短也及乎服丹之後又運已汞火卻有十月之功此爲後須長也黃婆舍乃神室卽金胎土釡是也金公卽眞鉛也老郎卽純陽之象也子野曰姹女已之陰汞前順去後逆歸順去則片餉之間陷溺於彼逆歸則自下而上周流一身落於中宮與眞鉛合而結聖胎上陽子曰姹女是已之精遊行有方者精有所行之熟路常人精每虧少但凡交感激撓一身之骨脈攪動一身之精髓情慾方動心君亦婬三尸搬於上七魄催於下方得精自兩頸而上由五臟升泥丸與髓同下自夾脊雙關至外腎交媾此謂五濁世間法此謂遊行自有方此爲常道之順也金丹則不然行顚倒之法持逆修之道大修行人煉已純熟身心不動魂魄受制情慾不干精氣滿盈如驟富之家何處不有金五待彼一陽初動之時先天眞鉛將至則我一身之精氣不動只於内腎之下就近便處運一點眞汞以迎之此謂前行短也眞鉛旣度鵲橋之東汞與鉛混合卽隨眞鉛升轆轤三車由雙關夾脊上入泥丸徧九宮注雙目降金橋下重樓入絳宮冶煉此謂遊行自有方此謂後須長也然後還歸黃庭神室交結成丹此謂歸來卻入黃婆舍而嫁金公也此謂顚倒五行而逆修也及温養十月以成眞人與天齊夀是謂老郎仙師說得次第明白如此諸家所註皆略而不詳者莫敢泄漏故也僕願天下人願後世萬萬人皆以此而成仙作佛僕亦甘受漏泄之咎眞仙聖師在上天地神明鑒之縱識硃砂與黑鉛不知火候也如閒大都全藉修持力毫髮差殊不作丹道光曰金丹造化全藉丁翁毫髮差殊失之千里聖人傳藥不傳火從來火候少人知子野曰雖識得眞鉛眞汞不知火候聖胎不結何哉蓋火性暖而能融物之眞使其交媾若無火則鉛自鉛汞自汞各不交矣上陽子曰鼎器藥物仙師詩中發泄到盡處惟火候不留於文者蓋必要師傳若不得眞師口傳雖知藥物丹亦無成且火候次第自有數節豈愚人妄猜者所能知也契論丹經講至眞不將火候著於文要知口訣通玄處須共神仙仔細論道光曰火記六百篇篇篇相似出入貫串與天合度天之所祕愼莫傳之獲遇眞師莫容鹵莽仔細究竟子野曰火候丹中要非師勿妄猜上陽子曰有外火候有内火候古仙上聖丹經萬卷不指火候者莫敢泄天寶也僕今指出内外火候願後來學人箇箇成仙也參同契云三日月出庚外火候也崔公曰天應星地應潮外火候也純陽翁云正一陽初動中宵漏永温温鉛鼎光透簾幃外火候也這般提出大似分明廣成子曰丹竈河車休矻矻鶴胎龜息自綿綿内火候也仙師詩曰謾守藥爐看火候但安神息任天然内火候也未煉丹時最難得者是外火候也此乃有爲有作立基之事内火候則已得丹但任天然斯乃大休歇大自在無爲之功也八月十五翫蟾輝正是金精壯盛時若到一陽纔起處便宜進火莫延遲道光曰八月十五是金水氣旺之日一陽來起復乃天上之子時内外二火功夫宜疾進也子野曰金精壯盛如八月十五夜月月爲金金旺在酉八月建酉故以比喻此時進火煉之無待其旺過而衰也上陽子曰水淸金旺天上之蟾朗星輝鉛遇癸生人間之藥物可煉正是一陽初動便莫遲延毋令鉛鼎漸虧空勞神用仙師此詩特言外火候也如此一陽纔動作丹時鉛鼎温温照幌幃受氣之初容易得抽添運用切防危道光曰一陽子時造丹鼎内眞鉛得火煅煉光透簾幃一時之中得之甚易及乎在内卻有十月之功運用抽添要防危慮險也子野曰學者趁一陽動時而作丹鉛鼎光生眞氣易得及退藏於密尤當謹愼抽添上陽子曰崔公入藥鏡云受氣吉防成凶意同玄珠有象逐陽生陽極陰來漸剝形十月霜飛丹始熟此時神鬼也須驚道光曰金液還丹者杳杳冥冥其中有精恍恍惚惚其中有物惚兮恍兮其中有象蓋自冬至進以陽火逐一陽而生眞精夏至退以陰符剝至十月還丹始熟脫胎形化爲純陽之仙豈惟萬神賓伏而已子野曰玄珠者藥之象藥不能自生須感陽氣而生自微至著陽極陰消十月數周大丹成就上陽子曰此言内丹法象抽添温養之事金丹大要書中所言抽添温養功夫甚詳前弦之後後弦前藥味平平氣象全採得歸來爐裏煅煅成温養自烹煎道光曰月至三十日陽魂之金散盡陰魄之水盈輪故純黑而無光法象坤故曰晦此時與日相交在晦朔兩日之間日月交合同出同沒至於初二日感陽光而有孕漸漸相離至初三日日沒月卽現一陽於坤方娥眉於庚上於純陰輪中生一陽光卽魄中生魂法象震此時人身金氣初生藥苗新也至初八日二陽生法象兌此時魄中魂半其平如繩故曰上弦弦前屬陽弦後屬陰陰中陽半得水中之金八兩其味平平其氣象全至十五日三陽備法象乾此時陰魄之水消盡陽魂之金盈輪是以團圓純陽而無陰故云望夫陽極則陰生十六日輪生一陰魂中生魄法象巽漸漸缺至二十三日二陰生法象艮此時魂中魄半亦平如繩故曰下弦也弦前屬陰弦後屬陽陽中陰半得金中之水半斤其味平平其氣象全聖人採此二八擒居造化爐中烹煉温養以成還丹仙翁此章叮嚀反覆使自己烹煎者良有妙哉意也子野曰前弦後後弦前乃日月合璧之後太陰將復生魂之時此時藥材正新得其平平之味卽採歸己與身中陰汞凝結始於温養終於烹煎此丹熟自然之事上陽子曰仙翁詩意惟欲指示三日藥生一時便修煉者亦如太陰領覽太陽初生之氣以成金丹辥陸所註意同或者以前弦爲上弦以後弦爲下弦者非也長男乍飮西方酒少女初開北地花若使靑娥相見後一時關鎖在黃家道光曰震爲長男卽龍也兌爲少女卽虎也北地卽陰物花卽陰氣謂之陰火靑娥卽姹女龍之弦氣謂之汞火修丹之士驅龍乍來就虎虎開陰戸之花以就龍龍卽動汞火與白虎交見之後一時封鎖會於黃家以產金丹而成眞人子野曰三日生魂如震陽生於坤下金水本坤之陰氣震爲來復食其坤之陰氣故喻長男乍飮西方酒震來之地乃兌之位此地得其陽生消其陰氣故喻少女初開北地花開卽發之義花乃陰氣前有次發紅花陰後隨之句同靑娥卽木汞只此一時坎離交媾採藥歸巳封鎖中宮也上陽子曰酒飮西方男女有東西之位花開北地人身辨南北之稱道光已露出於前陸公復泄漏於後聞者受者信之愼之兔雞之月及其時刑德臨門藥象之到此金砂宜沐浴若還加火必傾危道光曰二月爲德八月爲刑時當沐浴不宜加火恐傾危也夏氏曰物極必反理勢然也故乾之上九純陽之極也聖人必以亢龍有悔戒之况金生於已旺於酉木生於亥旺於卯蓋兔者卯之木雞者酉之金也金主刑木主德刑德臨門者卯酉爲二八之門乃日月出入之路陰陽晝夜之分也大道旣以陰陽日月爲主纔到卯酉極旺之地便當沐浴以專氣致柔無爲恬澹使沖和元陽充塞天地之間此心無外自然與太虛同體所謂百骸俱理正無爲若加添炎火則藥物走失必傾危矣正是抽添運用卻要防危也子野曰煉丹之法陽則進陽火陰則養陰符火符隨其消長不可易之也兔雞之月卯酉春秋平分之時陰中有陽陽中有陰故於此時不敢進火但以眞氣薰烝而爲沐浴保其危險契云八月麥生陰中有生氣二月榆死陽中有殺氣也上陽子曰刑爲殺德爲功刑爲危險德爲保養旣得金砂在鼎須要温養保扶紫淸眞人尙有煙氣滿寥穴之嘆可不愼乎日月三旬一遇逢以時易日法神功守城野戰知凶吉增得靈砂滿鼎紅道光曰太陽太陰一月一合聖人則之故移一月之候在一日之中又移一日之候在一時辰内搬運符火守城則沐浴罷功野戰則龍虎交媾神功者進火之度抽添進退慮險防危無忽無怠故得靈砂凝結也苟或陰陽錯亂日月乖戾外火雖動内符不應必要進火退水知吉知凶旋斗厯箕暗合天度自然靈胎密就神鼎增輝也子野曰太陰太陽一月一度合璧修煉之法以時易日而交離坎時乃晦盡朔來藥生之時卽非尋常時也上陽子曰一年十二度月圓月月有陽生之日一月晝夜三千刻刻刻尋癸生之時野戰則採鉛守城惟温養要知凶吉方保成功也否泰纔交萬物盈屯蒙二卦稟生成此中得意休求象若究羣爻謾役情道光曰冬夏二至爲一陰一陽之首子午二時爲一日一夜之元聖人運動陰符陽火協天地升降之道日月往來之理攢簇四時八節二十四氣七十二候環列鼎中而生眞一之體故託諸卦象分擘於一月三旬之中以闡玄機以明火候若執而用爻象者非也但屯蒙爲眾卦之首以象作用生成之始造化稟受之原故朝以屯暮以蒙也否泰運用陽升陰降春分陽氣升到天地之中陰陽相半爲泰卦亦如月之上弦氣候此時陰陽自然相交不進火候謂之沐浴秋分陰氣降到天地之中陰陽相半爲否卦亦如月之下弦氣候此時陰陽自然交結不進火候謂之沐浴斯亦法象如此何勞執諸卦象哉子野曰陰陽一交則萬物生生而無窮使其交者火候也朝屯暮蒙乃行火之綱領學者知之則其餘卦象皆自然而然上陽子曰天地未通爲否陰陽巳交爲泰屯稟生成之始蒙受養育之功此言内丹之道也卦中設象本儀形得象忘言意自明後世迷徒惟泥象卻行卦氣望飛升道光曰卦者火之筌蹄也伯陽作參同契演易象以明丹道喻乾坤爲鼎器象巳腹中金胎神室又以坎離爲藥物象靈胎中鉛汞也乾坤爲眾卦之父母坎離乃乾坤之眞精故以四卦居於中宮猶靈胎之在丹田處中以制外故以四卦不係運轂之數其六十卦分在一月之中搬運符火始自屯蒙終於旣未周而復始如車之輪運轉不巳一日兩卦直事三十日六十卦足幷乾坤坎離四卦共六十四卦總三百八十四爻以象一年及閏月餘三百八十四日象金丹二八一斤之數一斤計三百八十四銖此皆比喻設象如此苟明火候則卦爻爲無用學者反泥此而行卦氣勞形苦思而望飛升者不亦悲乎得魚忘筌得兔忘蹄若反執此筌蹄爲魚兔去道遠矣子野曰先師借易卦陰陽爲喻不過行自巳造化若泥象執文按圖索駿者去道遠矣上陽子曰丹道喻乾坤爲鼎器者使知男女龍虎喻坎離爲藥物者則知鉛汞是龍虎所產之物世人執於易之辭不明卦之用不明卦之用不知易之道欲明易之道道在身中不屬卦氣天地盈虛自有時審能消息始知機由來庚甲申明令殺盡三尸道可期道光曰夫天地上下相去八萬四千里冬至之日地中一陽升一日之中升四百六十六里零二百四十步五日爲一候升二千三百三十三里零一百二十步三候爲一氣升七千里三氣爲一節其卦屬泰卽立春之日也升二萬一千里二節爲一時計九十日陽氣上升共前四萬二千里正到天地之中是時春分之節其卦屬壯陰中陽半其氣變寒爲温萬物發生之時也自此而後陽氣升入陽位亦如前升九十日通前共一百八十日爲夏至之節陽氣共升八萬四千里而到天是時陽中之陽爲純陽屬乾卦也其氣變温爲𤍠萬物茂盛之時其陽盈滿天地之間故曰盈也陽極則陰生故夏至一陰自天而降亦如前十五日陰氣下降七千里三氣爲一節至四十五日立秋節陰氣下降二萬一千里其卦屬否二節爲一時計九十日陰氣下降共前四萬二千里正到天地之中是時秋分之節其卦屬觀陽中陰半其氣變𤍠爲涼萬物結實之時也自此而後陰氣降入陰位亦如前漸降九十日共前一百八十日爲冬至節陰氣共降八萬四千里而到地是時陰中之陰爲純陰坤卦也其氣變涼爲寒萬物收藏之時也故曰虛也天地盈虛因月而見月從日生以月晦朔爲冬至初三日震庚月華生光以兩日半三十時當爲一氣之候初八日兌丁上弦應春分之節陰中陽半也至十五日乾甲周滿陽魂盈輪純陽無陰故曰盈也比夏至之節月華盈輪爲純陽十六日巽辛一陰生也二十三日艮丙下弦應秋分之節陽中陰半也三十日坤乙消盡明光陰魄盈輪純陰無陽比冬至之節也故曰虛也聖人消息天地盈虛之機移一年氣候在一月之中以初一日一陽生爲冬至兩日半當一月氣候至上弦時陰中陽半卽春分也至十五日得四月氣候月光圓滿爲純陽之氣盈輪故曰盈十六日一陰生爲夏至至下弦時陽中陰半卽秋分也三十日得十月節候月盡黑爲純陰陰氣消輪故曰虛終而復始循環不巳聖人運動陰符陽火一依天地盈虛循環升降周而復始依約六十四卦法庚甲圓缺之理亦猶人君申明號令戮盡陰尸道可期也子野曰學者見天地盈虛消息之理則而行之於巳趁其申明生庚滿甲之令朔後望前採取天地盈時之氣歸於身中煉而成丹則尸鬼烏得不滅上陽子曰潮來則盈潮去則虛此天地之盈虛月滿則盈月缺則虛此日月之盈虛春生夏長秋斂冬肅此四時之盈虛氣旺則盈氣散則虛此人身之盈虛癸生則盈望遠則虛此金丹之盈虛長春眞人云猶氣鞠之氣氣實則壯氣餒則虛此氣之盈虛最要人能消息用之學者下功之初先去三尸六賊煉得心如太虛六根淨盡方可入室而煉大丹要得谷神長不死須憑玄牝立根基眞精旣返黃金室一顆靈光永不離道光曰陰陽不測之謂神感而遂通如谷應聲故曰谷神夫神因氣立氣因精生精能生氣氣能生神故神氣爲一身主宰一身爲神氣之府形不得神而氣不生神不得氣而精不生神氣精不得形則不能立三者相須始有生也若學長生根基全憑玄牝玄牝旣立然後長生可致萬物莫不由此二物而生因此二物而死實爲天地之根五行之祖陰陽之元萬化之基聖人憑此以成外丹藉此以就内藥故得眞精返於黃金之室變爲一顆靈光化形爲氣化氣爲神形神俱妙與道合眞隱顯莫測眞精者乃華池中神水之眞金也又名金胎神室者乃丹田混元宮中有眞一之精在天爲天一之水也子野曰谷者養也玄牝者陰陽也人欲養神長生必須憑此陰陽旣濟則金精復歸我中宮如一顆明珠長存也上陽子曰谷神不死是謂玄牝玄牝之門是謂天地根此老子之言仙師再爲後人明之立根基者蓋玄牝乃人身出入之門戸金丹由此而修合大修行人先要洞明玄牝之旨是陰陽媾精之處方得一顆靈光之珠也玄牝之門世罕知休將口鼻妄施爲饒君吐納經千載爭得金烏搦兔兒道光曰玄牝之門是謂天地根舉世學人莫能知此非遇眞師指示孰能曉哉自開闢以來非此玄牝二物安能生萬物哉夫内外二丹從此而立聖人祕之曰偃月爐懸胎鼎也金烏卽金丹也以此金丹乃能制已之陰汞似猫捕鼠如鷹搦兔不能逃遁或者以兩腎中間混元一穴爲玄牝非也蓋玄牝乃二物豈可通作一穴言之若無此二物何以造化萬物豈可指凡體一穴而通論哉又以口鼻爲玄牝者大可笑也子野曰前章只說得玄牝二字再於此章發明一門字其理深妙門者出入往來之所陰陽交會之地不得心傳口授之眞何可强猜而知之乎上陽子曰玄牝之門四字自老子指出之後後來眞師仙聖得以下手而煉大丹愚人以口鼻爲玄牝以吐納爲是道如斯謬戾何由得烏兔之交合哉異名同出少人知兩者玄玄是要機保命全形明損益紫金丹藥最靈奇道光曰經云無名天地之始有名萬物之母又云兩者同出而異名方其無也眞一之炁不可見故爲天地之始及其有也眞一之珠現空懸中故爲萬物之母在天曰離爲汞在地曰坎爲鉛其本則一其用則異同謂之玄玄之又玄上士至人執此兩者之玄機以明損益以治諸身則形可全而命可保所謂損者五行順而常道有生有滅是也所謂益者五行逆而丹體常靈常存是也吁神聖哉純陽紫金之藥隱爲天地之始顯爲萬物之母故曰紫金丹藥最靈奇當知仙翁嗟嘆不盡之意也子野曰一炁分爲陰陽故有異名後皆從太極而生故曰同出此陰陽修煉之要機保我之命全我之形無損於彼有益於我神哉水中之金乎上陽子曰異名者有無也竅妙也始與母也玄與牝也此陰陽交合之所金丹化生之處上根之士必先悟此兩者然後可煉紫金丹也始於有作人難見及至無爲眾始知但見無爲爲要妙豈知有作是根基道光曰筌蹄方在手莫我知也夫到岸不須船十目俄瞠視凡聖雜市朝魚龍混通衢懊恨世間人對面不相識子野曰採藥行火得無爲乎但知無爲不知有作何以結丹上陽子曰到老無爲如何得藥入室採鉛是云有作大隱市朝又誰知覺欲成匡郭先立鄞鄂得一黍珠方是不錯九載坐忘無爲功博行滿三千與眾共樂若只無爲不先有作此乃愚夫自相執著慇懃數語以詔後學黑中有白爲丹母雄裏懷雌是聖胎太乙在爐宜愼守三田聚寶應三台道光曰鉛中取銀卽爲丹母朱裏取汞卽爲聖胎二物感化結在爐中精明氣候恪守規中分毫無差故得三性聚會結成丹寶上應三台也子野曰黑中有白是水中之金卽坎中之陽氣人能採此眞陽之氣結而成胎所謂雄裏懷雌也採藥之際當以太乙主人爲念倘不愼守人欲橫流則喪吾珍主人得不爲之異乎上陽子曰黑中有白乃陰中有陽外丹法象雄裏懷雌乃陽中有陰内丹法象太一在爐尤宜愼守則三田之寶聚矣恍惚之中尋有象杳冥之内覓眞精有無從此自相入未見如何想得成道光曰恍惚中有物者龍之弦氣也杳冥中有精者虎之弦氣也二弦之氣恍恍惚惚杳杳冥冥視之不見聽之不聞眞一之炁靈而無形眞一子云無者龍也有者虎也無者汞氣也有者鉛金也無因有激之而成象有因無感之而有靈故得黍米空懸霞光耀日也兀兀思存塵埃心地誰與共言矣子野曰煉金丹者須於杳冥恍惚之内得其眞精有象始爲了事若未得師傳不可以智識猜度上陽子曰經云恍兮惚其中有物惚兮恍其中有象杳兮冥其中有精其精甚眞其中有信金丹之道斯言盡矣仙師再題出可謂甚親甚切倘非言傳心授之眞何必枯坐存想乎四象會時玄體就五行全處紫金明脫胎入口身通聖無限龍神盡失驚道光曰四象五行會時眞一之精結成黍米紫色光明密運於内將來脫胎入口通神天地龍神盡失驚也夏氏曰四象者靑龍白虎朱雀玄武也五行者金木水火土也大道虛無以金丹爲玄妙金丹雖妙不過攢簇五行和合四象也四象一會則玄體必就五行旣合則丹光自明非曰存心之火想腎之水也亦非曰肝爲龍肺爲虎也天生人物人生靈寶五行攢於此四象聚於此苟得玄機烹成大藥脫胎入口超凡入聖無限龍神盡皆驚畏子野曰十月數周聖胎完具遍身通聖神明得不驚乎上陽子曰一得永得自然身輕到此功滿丹靈方是大丈夫也華池宴罷月澄輝跨箇金龍訪紫微從此眾仙相見後海潮陵谷任遷移道光曰華池宴罷得丹成功脫胎神化肌膚若冰雪綽約若處子御氣乘雲遨遊八極飽觀塵世海變桑田也子野曰華池乃產藥之地宴罷乃採藥已足聖胎完備身外有身朝元謁帝蓬萊仙島無所往而不可也上陽子曰華池卽曲江卽坎宮之戸金丹由是而成功圓到此天仙之位也此章亦紫陽仙師自頌以詔後世要知金液還丹法須向家園下種栽不假吹噓幷著力自然果熟脫眞胎道光曰此道甚近家園自有宜急下功若非其類愈求愈遠若得同類又何著力之有子野曰採藥他家而歸自己家園下栽培以至成熟自然之妙非用人力也上陽子曰還丹之法蓋家園自有金花種子自可栽培不須爐火吹噓功成丹熟脫胎方外道人圓頂禪衲要知家園之妙在朝市間維摩傅大士輩皆得此園而下種故如來號之曰給孤獨園也休施巧僞爲功力認取他家不死方壺内旋添延命酒鼎中收取返魂漿道光曰修眞之士多執非類巧僞之法施功於已安有成就晚學不肯下問於人若悟他家有不死之藥能於鼎中採取返本之陽丹腹内旋添延命之酒水火二物者乃修身之至寶不死之良方也子野曰此道乃眞陰眞陽逆合而盜其殺機中之生氣耳卽非三峰採戰其他巧僞淫蕩之術酒與漿皆神水也上陽子曰前云家園下種此云他家不死豈非兩物乎延命酒返魂漿二者卽眞精眞氣經云仙人道士非有神積精累氣以爲眞是也雪山一味好醍醐傾入東陽造化爐若過崑崙西北去張騫始得見麻姑道光曰雪山喻白色西方金之象比金丹一粒味若醍醐餌歸丹田造化爐中崑崙在海水中我身之崑崙本在下元海水中生出狀若崑崙故曰崑崙山實發火之處崑崙頂有門名曰玄門又曰天門又曰命門在西北乾位張騫象乾卦又象眞汞爲陰火麻姑象坤卦又象眞鉛爲陽火言發火自崑崙玄門而入則鼎内眞鉛始見眞汞而有變化方見眞胎内融眞火外接坤策變乾策陰水返陽符兩火交通鉛汞結合神仙之道根本於斯張騫乘槎至月宮遇女宿喻其陰陽相會之意子野曰醍醐乃坎中金液取歸離中離卽我也然後運之由尾閭經泥丸自腹中至丹田與身中陰汞混合爲一矣上陽子曰雪山乃至陰之地陰中有陽故云好醍醐經云醍醐灌頂者此也傾入者他反居上也我屬東故云東陽我之玄門曰造化爐崑崙張騫道光巳解昔佛在雪山修行者卽此是也古人因有其地而名之故多假名以象物爾不識陽精及主賓知他那箇是疎親房中空閉尾閭穴誤殺閻浮多少人道光曰鍾離翁云四大一身皆屬陰不知何物是陽精蓋陽精是眞一之精乃至陽之氣號曰陽丹巳之眞氣屬陰爲一身之主以養百骸及陽丹自外來制巳之陰汞卽是陽丹返爲主而巳之陰汞返爲賓也二物相戀結成金砂自然不飛不走然後加火煅煉遂成還丹也故陽丹在外謂之疎巳之陰氣在内謂之親返此親疎巳定賓主卽成道也迷徒不達此理卻行房中御女之術强閉尾閭名爲煉陰以此延年實抱薪救火耳陰符經云火生於木禍發必剋可不愼乎子野曰陽精實坎中之金雖從外來本身内之物惟有同出異名之一間耳上陽子曰陽精雖是房中得之而非御女之術若行此術是邪道也豈能久長故佛云是人行邪道不能見如來倘非眞師指示陽精之路則諸旁門皆爲邪道世之盲師以採陰三峰御女之術轉相授受所謂以盲引盲及臘月三十夜到來反怨丹經虛誑終不回思自巳錯謬故仙翁直露此詩萬物芸芸各返根返根復命卽長存知常返本人難會妄作招凶往往聞道光曰經云萬物芸芸各歸其根歸根曰靜靜曰復命復命曰常知常曰明不知常妄作凶夫人未生之前冥然無知混乎至朴及其生也禀以陰陽受之父母聖人立法逆而修之奪先天一炁以爲丹母賊陰陽始炁以爲化基煉形返入於無形煉氣復歸於至朴煉神而與道合眞故云返根復命卽常存也能知常道而返其本者聖人也是以長生不知常道而妄作者羣迷也是以招凶子野曰萬物如草木之類猶能歸根返本以厯𡻕月人爲萬物之靈動至死地反不能如草木也此道乃歸根返本之道卻爲尋常妄爲而招凶也上陽子曰萬物有歸根之時至人明長生之理草木遇陰之極則歸其根待春而復茂世人氣血將衰須求歸根之道可以回老可以返嬰可以長生噫歸根卽還丹也常者乃常俗之世法修諸常俗世法深深密密方能返本還元是爲知常所以大隱市廛者要人不能識也倘幾事不密而爲之是以妄作而招凶謗故達磨遠來東土求成佛者欲避凶而遠謗也六祖禪師隱於四會獵人中者亦避凶而求成佛後道光禪師旣得石眞人傳無奈之何只得復俗依有力以了茲事我重陽帝君居活死人墓以成道太虛眞人往武夷七月長生眞君往洛陽三年古人波波吒吒只爲此事今時學者偶記前賢一言兩語以爲是道儘日談論又有一輩小慧之人不參仙聖所爲乃謗修行之事曰世有生必有死安有久視之道此乃地獄種子甘分輪迴次有執著之輩因人略指旁門小徑便云能行旣不遇眞仙至人又不知歸根復命又不知出世間法亦不知同類是何物倘或知之且不能韜晦於常俗中了其有爲之大事卻無忌諱而妄爲者豈不招乎凶殃哉故經云知常曰明不知常妄作凶知常容容乃公是也歐冶親傳鑄劍方莫耶金水配柔剛煉成便會知人意萬里誅妖一電光道光曰歐冶鑄劍上帝遣神女爲之侍爐制以金水配以柔剛劍成誅妖如一電光其間靈異若此聖人鑄劍功亦如之以天地爲爐冶以陰陽爲水火配以五行制以神氣煉成寶劍能曲能直能柔能剛能善能惡能圓能方心有所思意有所適飛揚誅斬一電光耳此乃自然神劍也修丹之士若無此劍猶取魚兔而乏筌蹄也仙翁作歐冶之事而言之實玄珠之罔象也子野曰煉丹採藥全憑慧劍降魔誅妖倏忽變化瞬息萬里慧劍若無鋒利妖魔豈不爲害乎上陽子曰要鑄此劍非用凡金凡鐵蓋鑄此神劍乃天地之根陰陽之骨内斬三尸外誅凶惡愚者以此劍殺其身聖人以此劍飛其神旌陽使五仙童女戲劍誅斬妖蛟洞賓以三淸寶劍精靈滅迹在佛亦云金剛寶劍實成仙佛之器耳敲竹喚龜吞玉芝鼓琴招鳳飮刀圭近來透體金光現不與凡人話此規道光曰竹乃虛心之物無情之義也琴乃樂之正音和諧之義也龜卽黑虎鳳卽赤龍龍之弦氣曰玉芝虎之弦氣曰刀圭言龍虎是無情之物而能交媾故曰敲竹猶兩物相敲擊之意龍虎相交爲夫婦是以和諧故曰鼓琴龍虎交則二弦之氣相吞相啖煉就還丹透體金光玄黃燦爛風生兩腋跳出人間子野曰玉芝刀圭皆藥之異名藥生坎中坎有乾陽乾爲金爲玉故喻爲玉芝刀圭敲竹鼓琴乃陰陽相求之和聲竹則虛心應而無欲琴則正音和而不亂此聲之感非尋常邪僻情僞鄭衞之音喚龜招鳳所謂本乎天者親上本乎地者親下入藥鏡謂之上鵲橋下鵲橋之義又離爲禽爲南方朱鳳喻坎招離翕受其藥離卽我也上陽子曰竹是中通外直之物爲其不直則敲之要其能應於物琴乃徽弦相和之意爲其不和則調之庶能克濟所事玉芝卽乾龍刀圭爲坤物喚龜屬我招鳳屬彼若非太和則他安能招我鳳乎修行之人卦氣已過竹不應物可不擊乎擊卽敲也琴若不和可不調乎調卽鼓也是以七十八十至百二十𡻕皆可還丹是此道也中人常士烏可語此邪師妄人烏能知此此非眞仙聖師盟天口授孰得而知之乎昔我紫瓊公常侍太虛眞人偶一辯士求見曰敲竹喚龜吞玉芝敢問我師如何是喚龜太虛曰喚龜我當語汝我且問你如何是敲竹辯士曰上上關捩太虛曰我不問上上關捩且說如何是敲竹辯士曰密密深機太虛曰你這言句是長連牀上學來底你將去與天下人論辯去我這裏不是你喚龜處其人不悟令紫瓊拖出後問紫瓊曰汝知敲竹否曰寂然不動感而遂通曰汝知喚龜否曰禮下於人必有所得曰適來辯士何以不言紫瓊曰彼未得師强猜不得太虛復誡曰知之非難行之爲難也藥逢氣類方成象道在希夷合自然一粒靈丹吞入腹始知我命不由天道光曰有物混成先天地生聖人强名之曰混元眞一之炁視之不見聽之不聞搏之不得聖人以同類二八初弦之氣感而遂通結成靈丹象空懸之中一粒寶珠取而餌之立乾已汞化爲純陽之軀與天齊年朝元子曰死生盡道由天地性命元來屬汞鉛豈非我命在我不在天耶子野曰道自是道淸淨爲要藥自是藥得類乃成若求非類徒勞心力上陽子曰易云西南得朋乃與類行若二陽同處則成亢旱豈有情性相感哉二陰同室則必爭安得陰陽相類哉蓋陰從陽方爲類鉛投汞方成藥藥化爲丹丹化爲神形神俱妙與道合眞是謂命在我也赫赫金丹一日成古仙垂語實堪聽若言九載三年者盡是推延款日程道光曰金丹大藥下功不逾半箇時立得服餌此言一日者聖人促一年氣候在一月之中又以一月氣候移在一日之中復以一日作用移在一箇時辰之内故通言一日仙翁曰以時易日法神功此取半箇時也金丹入口立躋聖地如此之妙奚可以九載三年而遷延𡻕月以款日程也哉子野曰作丹之法大要汞與鉛合則片餉之間丹頭卽結但究鉛生之時斯時也萬物萌芽有氣無質水源至淸且道這時是甚麽時咦今年初盡處明日未來時上陽子曰煉丹之法要知他家活子時也非天下之至妙孰能與於此哉大藥修之有易難也知由我亦由天若非積行修陰德動有羣魔作障緣道光曰魔障在彼修持在我陰德旣宏靈丹可冀子野曰金丹大道古人以萬劫一傳非等閒之細事道旣高魔必盛非以陰德相扶恐有剉志之患上陽子曰前云我命不由天是造化之妙在乎我此章言由我亦由天蓋修還丹須要先積陰德夫施與不求報陰德也積善無人知陰德也不陷人於險陰德也暗中作方便陰德也大修行人自已積德未充鮮不爲外魔所攻若能回思内省發大忍辱精進則魔障化爲陰德經云彼以禍來我以福往彼以怨來我以德報皆陰德之盛祛魔之功也三才相盜及其時道德神仙隱此機萬化旣安諸慮息百骸俱理證無爲道光曰天地以四時盜萬物故有榮枯而不能長榮萬物以五味盜人故有生死而不能長生人以五行盜萬物故有存毁而不能長存三盜旣宜三才旣安是以有生有死有榮有枯有存有毁有物有我紛紛而起循環無端此乃自然之道若能混此三盜爲一返其機而動之逆其時而食之則百體俱理而萬化自安諸慮自息是無爲之道證矣子野曰盜者使人不知不覺而竊其所有之謂修煉之法竊天地之機盜殺中之生氣爾得其理則百骸安上陽子曰盜者非世俗之所謂盜也是金丹之法盜其先天先地一點眞陽之始炁以煉還丹此乃道高德重神仙中人方能隱用此機而非讒德殄行庸常之人所可知之偶或知之非疑則惑何哉緣無德故也故云道德神仙隱此機陰符寶字逾三百道德靈文滿五千今古上仙無限數盡於此處達眞詮道光曰二經爲羣經之樞轄諸子之機紐也上陽子曰陰符道德丹經之祖書上仙皆藉之爲筌蹄修之成道然其旨意玄遠世薄人澆不能達此故仙師作此悟眞篇使後學者一見了然易於領悟而行之爾是知陰符道德悟眞篇三書同一事也饒君聰慧過顏閔不遇眞師莫强猜只爲金丹無口訣教君何處結靈胎道光曰昔黃帝參廣成子而授道老子感商容而授道尹眞人拜太上而授道祖天師感太上而授道許眞仙禮諶母而授道抱朴子眞人幼學道年至六十厯覽萬書知齊十哲慧過顏閔莫能自悟後遇鄭思遠眞人授之口訣方敢下手修煉大丹自上聖高眞祖師神仙皆以口口相傳心心相授今仙翁自云曩以至人未遇口訣難逢遂至寢食不安後至熙甯己酉𡻕以夙志不回初誠愈恪遂感眞人授以金丹藥物火候之訣正所謂指流知源語一悟百又契云著情於竹帛又恐泄天符若遂結舌喑絕道獲罪誅是不敢祕亦不敢泄也隱在諸丹經中但要眞師指示而已後序云此悟眞篇中所歌詠大丹藥物火候細微之旨無不備悉倘好事者夙有仙骨觀之則智慧自明可以尋文解義如此乃天之所賜非某之輒傳也然萬萬學人未聞一二也今道光又加註釋然而亦不敢漏露輕泄吾儕旣學道自當不恥下問若恥下問則去道遠矣若欲求道須勤下問切莫强猜千經萬論惟布枝條至道不繁獨傳心印未遇眞師强猜不得子野曰非師口訣眞要則從何處而下手上陽子曰九流百家一應藝術皆可留之紙上或可以智慧猜曉而知惟獨金丹一事非得眞師逐節指示不可强以意會或者得師略言鼎器而不知藥生之時亦不成丹旣知藥物而不知火候亦不成丹旣知火候而不知顚倒亦不成丹旣知顚倒而不知煉已細微亦不成丹旣知煉已細微而不知法財兩用亦不成丹崔公入藥鏡云差毫髮不成丹噫世之愚人恃其機鋒欲以言語話會恃其聰慧欲以心領意會或因邪僻而行採戰或只枯坐自謂無爲如此等所爲非但於身無益反爲法門之罪人也仙師慈悲甚至詩句迫切沾丏後來者多矣了了心猿方寸機三千功行與天齊自然有鼎烹龍虎何必擔家戀子妻道光曰此言甚切何故不知返也上陽子曰天地之功春生夏長秋收冬藏萬物榮枯星宿遷斡造化運轉只三百六十日爲一始終之成功也修行之人制御心猿滌洗方寸收寶珠於愛河之内只半箇時守還丹於神室之中幾三千日功備造化德伏鬼神豈非功行與天齊乎未煉還丹須速煉煉了還須知止足若也持盈未已心不免一朝遭殆辱道光曰若未煉丹急須下手時不待人旣煉丹畢抱一守成面壁九年斯道宏矣上陽子曰未煉還丹急須煉之若已煉丹急須去之佛云道成之後丹房器皿委之而去若不去之則心境現前恐有殆辱之患紫淸白眞人云半夜忽風雷此其證也是以達磨去長蘆而入少林冷坐者無一朝之患也須將死戸爲生戸莫執生門號死門若會殺機明反覆始知害裏卻生恩道光曰陰陽五行順之則生逆之則死此常道也不生之生則長生不順之順爲至順此丹道也若能明此則害裏生恩男兒有孕也上陽子曰詩云來時門戸急重修今人若達此理明生死之機識顚倒之用知返還之妙轉生殺之戸以苦爲樂以忍收恩何憂其不仙乎禍福由來互倚伏還如影響相隨逐若能轉此生殺機反掌之間災變福道光曰陽主生曰福陰主殺曰禍陰消則陽長陽極則陰生互相倚伏此常道也若以生殺之機逆而修之反掌之間災中變福害裏生恩男兒有孕此丹道也子野曰所謂五行順行法界火坑五行顚倒大地七寶上陽子曰造化在吾掌握禍福由我修持順則生人逆則生丹世人爲不知轉生殺之機是以輪迴而無了期又烏知成佛作仙之道止一反掌間耳修行混俗且和光圓卽圓兮方卽方顯晦逆從人莫測教人爭得見行藏道光曰被褐懷玉和光同塵剖破藩籬無我無人老子云和其光同其塵和同天人之際實修行之祕要子野曰外圓内方者是有爲也道之所爲奚可令人見之乎上陽子曰仙師廣大慈悲非特以金丹之祕開悟後人幷以世間法終始叮嚀何其切也夫金丹之最難者混俗也要深不可識者和光也雖有妙用而不露鋒芒者方圓應世也濳搬造化而不顯圭角者孰知行藏也凡此數者實爲大修行之上事道光得杏林之語卽棄僧伽黎復俗以了大事豈非混俗乎六祖得五祖之言入於獵人之中無人知覺豈非混俗乎我太虛眞人得黃房公妙旨去隱武夷七箇月方成道豈非和光乎今者黃緇之流圓其頂而衲其衣髽其髻而方其袍此豈知吾有大患爲吾有身之聖訓乎又安知此身相
