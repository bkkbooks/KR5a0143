front:
  text: 紫陽真人悟真篇三注卷之二律二
  hash: sha256:9205ba6fa4522703ac2da306fc1be6c150a728ba5ba5e9e6faefcbf4061625fa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0143_HFL_002-001a, image: hfl/0063/0063-132.png}
body:
  text: 紫賢薛道光子野陸墅上陽子陳致虛注七言律詩八首陽裏陰精質不剛獨修此物轉羸尪勞形按引皆非道服氣餐霞總是狂舉世謾求鉛汞伏何時得見虎龍降勸君窮取生身處返本還元是藥王道光曰陽裏陰精己之真精是也精能生氣氣能生神榮衛一身莫大於此油枯燈滅髓竭人亡此言精氣實一身之根本也奈何此物屬陰其質不剛其性好飛日逐前後便溺涕唾汗淚易失難擒不受制煉若不得混元真一之丹以伏之則無凝結以成變化若或獨修此物轉見尪羸按引勞形皆非正道餐霞煉氣總是強徒設若吞日月之精華光生五內連雙關搖夾脊補腦還精以至尸解投胎出神入定千門萬法不過獨修陽裏陰精之一物爾孤陰無陽如牝雞自卵欲抱成雛不亦難乎如鍾離翁云涕唾精津氣血液七般物色總皆陰若將此物為丹質怎得飛神上玉京一身之中非惟真精一物屬陰五臟六腑俱陰無陽分心腎於坎離以肝肺為龍虎用神氣為子母執津液為鉛汞得乎此至愚之徒執此等以治身而求純陽之證深可悲哉參同契曰去冷加冰除熱用湯飛龜無蛇愈見乖張假使二女同室顔色甚殊令蘇秦通言張儀結媒發辨利舌奮為美辭推心調諧合為夫婦弊髮腐齒終不相知無過以女妻女以陰煉陰導引按摩煉氣餐霞皆是小術止可辟病一旦不行前功俱廢參同契云陰道厭九一濁亂弄元胞食氣鳴腸胃吐正吸外邪晝夜不卧寐朔晦未嘗休身體自疲倦恍惚狀若癡皆是強為去道遠矣真龍真虎二八是也真鉛真汞二弦之氣是也此道至簡不繁至近匪遠但學者堅執後天傍門非類以為龍虎鉛汞是致差殊殊不思仙翁直指二物所産川源之源身從何有命從何有返此之本還此之源顛倒修之即得真龍真虎自降真鉛真汞自伏非藥中王其孰能與於此哉或者以混元圭丹擬議聖道譬如接竹點月不亦遠乎蓋後天有形有質者皆非至藥也子野曰易云男女媾精萬物化生始我之有此身也亦由父母精媾而生倘有父無母有母無父身從何有哉作丹之要與生意但有逆順之不同爾順則生人逆則生丹逆順之間天地懸隔也上陽子曰契云是非歷藏法內視有所思陰道厭九一濁亂弄元胞諸術甚衆多千條有萬餘彭真人云世人不違大道之宗元而無非傍門曲徑此屬多般皆為左道乖訛天理悖亂至真明違黃帝之言全失老君之旨本期永壽反爾傷生鍾離翁云生我之門死我户之意大哉上賢説到下稍無人承當何哉只為世人執己而修則千條百徑無非傍門者矣仙翁垂憫直言窮取生身處豈不忒露天機緣為世人因業識中來却又因業識中而去一陽奔失形雖男子而身中皆陰若執一己而修豈能還其元而返其本哉既不能還元返本又將何以回陽换骨也是以大修行人求先天真鉛必從一初受氣生身之處求之方可得先天真一之氣以還其元而返其本也此謂男女修行如此女人修仙則以乳房為生氣之所其法尤簡是以男子修仙曰煉氣女人修仙曰煉形女人修煉先積氣於乳房然後安鼎立爐行太陰煉形之法其道最易成道也良有妙旨昔宣和中洞賓遊吳興見一娼妓張珍奴色華容美性好淡素雖落風塵每夕沐浴更衣炷香告天求解脫去甚切洞賓作一士訪之珍奴見之風神異殊心甚敬之盡歡士飄然而去明日又至亦如之往往月餘終不及亂張珍奴曰荷君眷顧甚久獨不留一宿罄枕席之娛豈妾猥漏不足奉君子耶士曰不然人貴心相知何必如此哉且汝每夜告天實何所求珍奴曰失身於此又將何為但自念奴入是門中妄施粉黛以假為真歌謳艷曲以悲為樂本是一團臭膿皮袋借偽飾以惑人每每悔嘆世之愚夫不自尊貴過我門者睹我如花情牽意惹迷戀不捨非但喪財多致身殞妾雖假容交歡覺罪甚重惟朝夕告天早脫此門士曰汝志如何何不學道珍奴曰陷于此地何從得師士曰吾為汝師乎珍奴即拜扣士曰再來乃可遂去珍奴日夜望不至深自懊恨因書曰逢師許多時不説些兒箇安得仍前相對坐懊恨韶光空自過直到如今悶損我筆未竟士忽來見所書續其韻道無巧妙與你方兒一箇子後午前定息坐夾脊雙關崑崙過恁時得氣力思量我珍奴大喜士乃以太陰煉形太丹法與之珍奴自是神氣裕然若大開悟不知密有所傳尤多珍奴亦不告人臨别作步蟾宫云坎離坤兊分子午須認自家宗祖地雷震動山頭雨要侁濯黃芽出土捉得金精牢閉固辨甲庚要生龍虎待他問汝甚人傳但説先生姓吕珍奴方悟是吕先生即佯狂丐于匝投荒地密修其訣逾三年尸解而去修行一事不問男女若猛勇心堅成道必矣好把真鉛著意尋莫教容易度光陰但將地魄擒朱汞自有天魂制水金可謂道高龍虎伏堪言德重鬼神欽已知壽永齊天地煩惱無由更上心道光曰真鉛即金丹也地魄在外藥則白虎是也在內藥即金丹是也天魂在乎外藥則青龍是也在乎內藥則己之真精是也朱汞在外則龍之弦氣是也在內則己之真氣是也水金在外則虎之弦氣是也在內則金丹是也又謂之水中銀此皆喻內外二事之藥也但日已過命則隨減吾儕著意尋師速修以金丹而超生死但將白虎擒龍自有青龍制虎二氣相吞而産金丹復將此丹擒自己之真氣真氣自戀金丹而結聖胎也外之真龍真虎既降則內之龍虎自伏內煉神魂鬼魄既聖則外之神鬼自欽非道隆德備之士孰能與於此哉體化純陽壽同天地逍遙物外自在人間萬念俱空何煩惱之有也子野曰地魄乃鉛也天魂乃汞也以鉛制汞在彼我爾上陽子曰著意尋真鉛即純陽翁云下手速修猶太遲從古聖師皆欲學者早下工入室真鉛一物最不易尋貧者患無財有財患無地有地患無物有物患無侣侣者外護也著意尋者先聚法財而後擇地故仙翁曰始之有作無人見之句者若不得其善地則人見之而不可用也僕向未入室之先不甚注意於此及至入室之際競競著意尋擇方知多有難能之事甚費苦辛因知著意尋之句猶不易得況惟世人得師一訣之後又只懡㦬時光豈知年邁日衰容易老死而已地魄即所尋之物天魂即我家所積之汞也東海之龍能制西江之月魄西江白虎能煉我家之日魂魂魄媾精乾坤比壽濟人接物德益鬼神欽煉己虛心道高龍虎伏閻浮之諸塵漏盡煩惱更無仙家之真樂匪常得大自在惟方便第一之積功也黃芽白雪不難尋達者須憑德行深四象五行全藉土三元八卦豈離壬煉成靈質人難識消盡群魔鬼莫侵欲向人間留祕訣未聞一箇是知音道光曰龍之弦氣曰白雪虎之弦氣曰黃芽大藥根源實基於此其道至簡其事匪遙若非豐功偉行莫能遭遇真師指授玄奧也道自虛無生一氣一氣變陰陽曰龍曰虎龍木生火虎金生水木火金水合成四象四象合而成大丹大丹之成實於土土無定形分位四季四時不得四季真土則四序不行造化何生焉是以四象五行全藉土也壬者水也即真一之氣生於天地之先變而為陽龍陰虎合而成丹丹土也龍木也虎金也謂之三性三元不離真一之水變也八卦者真一之氣一變為天曰乾為父二變為地曰坤為母乾以陽氣索坤之陰氣一索而生長男曰震再索而生中男曰坎三索而生少男曰艮此乾交坤而生三陽坤以陰氣索乾之陽氣一索而生長女曰巽再索而生中女曰離三索而生少女曰兊此坤交乾而生三陰皆不離真一之水變也故曰三元八卦豈離壬非惟三元八卦不離真一之精自開闢以來凡有形者莫不由此而成變化修真之士得真一之水者萬事畢矣真一之水以法化之為真一之黍米吞歸丹田運火十月爍盡群陰也純陽真一之仙陰魔尸鬼逃遁無門善根種而靈骨生靈骨生而仙可冀靈骨之生善根之種也不於一生二生而千萬億無量生中積諸善根安得才出頭來飄飄然有出塵氣象噫走鬼行尸一瓶一鉢本欲登仙神仙不易得也胡不捫己之心與平凡之心有以異乎我之仙事亦有涯也必也廣大變通以道為己任獨高一世鶴立雞群人笑我為疏狂我知我非凡輩赤松黃精乃吾友蓬萊方丈是吾家自然遭遇至人傳授至道結合心友丁寧丹成仙翁欲向人間留祕旨奈何子期之不遇怎生得箇我般人也子野曰黃芽者鉛之精白雪者汞之氣欲求之者非有德行不可土者戊己壬者真一之水生生物物之祖氣也上陽子曰黃芽白雪皆混元窈冥之中所産真一之氣前言真鉛要著意尋此乃言黃芽白雪不難尋者為憑德行故也愚徒見此二詩似相矛盾豈知此道無德行者終不成丹諺曰言清行濁休談道若知道而未積德即如魚之無水燈之無油若何而成還丹哉四象五行三元八卦多端名色終不可無真一之壬水我黃房公贊純陽老仙云鼎攢乎四象五行藥按乎三元八卦赤鳳吐南方之髓烏龜含北海之精亦指此也皆祖於純陽詩曰鼎隨四季中央合藥逐三元八卦行同一意也真仙聖師雖慈悲引導實在乎人行爾此丹一成玉帝嘉贊天地萬靈莫不欽仰故號無上至真靈寶神妙九還大丹昔元始天尊説經度人玄座空浮懸一寶珠大如黍米者是也釋名大乘般若九品蓮臺光明藏大如意妙法靈感牟尼寶珠昔靈山會上龍女所獻者此也其貴重無可稱述世人所能識哉丹成則身聖陽神出現號曰真人陰魔鬼賊化為護法神身中青龍白虎朱雀玄武三魂七魄三元九宫三部八景五臟八識皆化為神三萬六千精光化為神兵矣仙翁當時欲以口授祕訣與人然一世鮮有信受奉行者噫拜師于韁鎖之下杏林之後來門人也草木陰陽亦兩齊若還缺一不芳菲初開緑葉陽先唱次發紅花陰後隨常道即斯為日用真源反覆有誰知報言學道諸君子不識陰陽莫強嗤道光曰草木未生之初含孕至朴及其甲坼稟一氣以萌芽故抽一葉以象一氣次分兩葉以象陰陽次兩葉中復抽一葉以應三才過此以往漸漸長茂春生緑葉夏長紅花此陽氣使然秋肅而結實冬殺而復本此陰氣使然陰陽兩齊化生不已若其缺一則萬物不生也真一子云孤陰不自産寡陽不自成是以天地氤氲萬物化醇男女媾精萬物化生此常道只斯為日用也真源反覆者有顛倒互用之玄機學者苟不明此何以超生死也子野曰金丹之道與草木陰陽亦同譬如草木方感陽氣即時發生芽蘖後必以花卉相繼而開花謝則結實于中猶人得此一點真陽之氣其真陰自然混合成胎陰陽相胥之意大率如此這些陰陽日用之常道但其真源反覆處是則昧矣此所謂百姓日用而不知也上陽子曰天生二物曰動植也根為植足為動莫不皆稟乎陰陽二氣草木為植乃無情之物也亦趁陽春而生長結實也人物為動乃有情之形若非陰陽二氣則何以為生育哉夫人為物最靈者稟天地之正氣而生反不知陰陽盛衰逆順之道也僕今泄露到盡處也蓋順則為凡父凡母逆則為靈父聖母凡父凡母之氣順則成人謂之常道也靈父聖母之氣逆則成丹是曰真源反覆者男返是女而女返是男也不遇真師説為何益不識玄中顛倒顛爭知火裏好栽蓮牽將白虎歸家養産箇明珠似月圓謾守藥爐看火候但安神息任天然群陰消盡丹成熟跳出凡籠壽萬年道光曰以人事推之男兒固不能有孕火裏固不可栽蓮然神仙有顛倒之妙輒使男兒有孕亦由火裏栽蓮夫日為離是男反為女月為坎是女反為男此顛倒也二物顛倒而生丹却將此丹點己之汞而結聖胎即是男兒有孕豈非顛倒顛乎龍虎是真一之精變為二物分位東西實同出而異名也真一之精屬汞為青龍在東白虎本是真一精之子寄體在西其家在東仙翁曰金公本是東家子送在西鄰寄體生認得唤來歸舍養配將姹女作親情故此詩之意牽將白虎歸家以青龍結為夫婦以産明珠其言似月圓者修丹之法先取上弦西畔半輪月得陽金八兩次取下弦東畔半輪月得陰水半斤兩箇半輪月合氣而生丹故得金丹一粒似月圓也此外藥法象也及得此丹吞入己腹中謂牽此白虎歸己腹中配以我汞然後運陰符陽火煅煉而成金液還丹一粒亦重一斤此內藥法象也似月圓者蓋連火之卦一卦六爻六十四卦計三百八十四爻象一斤三百八十四銖也又外藥法象似月圓者參同契云上弦兊數八下弦艮亦八兩弦合其精乾坤體乃成二八應一斤易道正不傾是也仙翁指示月圓之意要使學道者洞曉造化之旨也分內外二八之數不可一槩而論之也火者非世之凡火乃元始祖氣也亦無爐可守也青霞子云鼎鼎非金鼎爐爐非玉爐火從離下發水向坎中符三姓既會合二物自然拘固濟胎不泄變化在須臾高象先云天地氤氲男女媾四象五行隨幅湊晝夜屯蒙法自然何必孜孜看火候此自然爐火也但安神息調文治武策符漏刻母得分毫差忒不半箇時立得丹餌然後復依進退陰符陽火連用抽添防慮險十月功圓剝盡群陰體化純陽跳出凡籠壽萬年也此方為金液還丹未能入妙更須拘元九載使氣歸神方為九轉金液大還丹也子野曰陰陽顛倒者陰中有陽陽中有陰火裏栽蓮火中有水陰中有陽殺中有生也白虎金精也白喻其質虎喻其難伏金精元是我家之物有生以來走在彼處今翻認著用力牽歸如月如珠藥之象也得藥而後溫養之法安神定息任其自然而已矣非所謂守定藥爐朝添八兩暮换半斤是也上陽子曰陰陽有顛倒之機金丹有返還之術火裏栽蓮以坎而歸離白虎為難制之物為太一所含之氣牽將歸家者已伏其氣明珠為丹既已得丹連己汞調神息以養之莊子云真人之息以踵廣成子云丹竈河車休矻矻鶴胎龜息自綿綿以為神息也待其陰盡陽純以成真人超凡入聖矣三五一都三箇字古今明者實然稀東三南二同成五北一西方四共之戊己身居生數五三家相見結嬰兒嬰兒是一含真氣十月胎圓入聖基道光曰木數三居東火數二居南木能生火二物同宫故二與三合而成一五也金數四居西水數一居北金能生水二物同宫故四與一合而成二五也戊己本數五是三五也三五合而為一故曰三五一也自古迄今能合三五一而成丹者實稀也一者丹即彼之真一之氣乃先天地之母也我之真一之氣乃天地之子也以母氣伏子氣如貓捕鼠而不走失也子母之氣相戀於胞胎之中以結嬰兒也所謂太一含真氣者含真一氣也如人懷胎十月滿足自然降生聖胎功圓自然神聖故曰十月胎圓入聖基也子野曰三五一者金木水火土五行之數一者太極也五行不合則各其性合則復為一太極人能以五行合而為一則復於混沌嬰兒有兆矣所謂三家相見之義其妙如此十月數周時至氣化自然符合先聖之機也上陽子曰天三生木地二生火火數二木數三三與二同性統為一五木象於東法象為青龍龍之氣為汞火居於南法象為朱雀木生火是木為體火為所生之氣是故木火為一家然皆陽中之孤陰所以異名曰玄曰無曰妙者其有木有火而無金水戊土也天一生水地四生金金數四水數一一與四同情結為一五金居西法象為虎虎之氣為鉛水居于北法象為玄武金生水是金為體水乃金所生之氣故金水為一家然皆陰中之寡陽所以異名曰牝曰有曰徼者以其有金有水而無木火己土也天五己土地十戊土戊土居坎己土居離戊己分則二土之數十戊己合則二土成圭而數五土居中央是為一五總而言三五震木離火同性為一家龍為震户汞産於中兊金坎水同情為一家虎為兊門鉛生於內離己坎戊同根為一家朱雀玄武相合而生物是云三家龍與朱雀意主生人虎與玄武意主殺人此世間法若欲出世間法則必顛倒制之功歸戊己二土也何哉金本戀木慈仁而內懷從事之情無由自合木雖愛金順義而內懷曲直之性豈得自媒欲使媒合功在二土以通其好且戊土生金則欲金氣發旺而相胥己為木尅則先煉己珍重以求丹若不煉己待時則不能常應常靜煉己既熟却與戊合戊己一合則金木會金木會則龍虎交龍虎交則三五合一三五合一則三家相見三家相見則鉛汞結鉛汞結則嬰兒成無非此之一氣佛祖云乾坤之內宇宙之間中有一室祕在形山此即是太一含真氣之妙是以五行分而名真道五行合而生一氣一氣結而為嬰兒嬰兒出而成真人矣不識真鉛正祖宗萬般作用枉施功休妻謾遣陰陽隔絶粒從教腸胃空草木金銀皆滓質雲霞日月屬朦朧更饒吐納并存想總與金丹事不同道光曰真鉛之要二八為宗餘皆非道枉施功耳破迷歌云休妻不是道陰陽失宗位休糧不是道死去作餓鬼王真人曰學人剛強辭妻妾不念無為無不為蓋道體法自然一切妄作烏可與金丹同日語哉子野曰休妻絶粒干甚麼事草木金銀有質之物雲霞日月外邪客氣吐納存想皆出妄為俱非真鉛制真汞之義去金丹之道遠矣上陽子曰真鉛乃靈父聖母之氣若非此氣將何入室而施功夫人生天地間稟凡父之精凡母之血而有其身故修仙做佛之道不外乎此而所異者須要靈父聖母方為真鉛何謂靈常應常靜之謂靈逆施造化之謂靈何謂聖太極初分之謂聖虎不傷人之謂聖有此靈聖方知真鉛之祖宗也人之一身止有許多精氣泄漏至盡身何能存若寶愛之則身健而命延壽永又得真鉛而煉之豈不仙乎世人若無好師訣破真鉛一物雖行盡三千六百許多傍門空自有損若望其成功奚得哉萬卷仙經語總同金丹只此是根宗依他坤位生成體種向乾家交感宫莫怪天機都漏泄却緣學者自迷蒙若人了得詩中意立見三清太上翁道光曰萬卷丹經至當歸一皆依坤母生成之理逆而修之種在乾家交感之宫仙翁於此泄盡天機學者酷自迷蒙不肯近取諸身以明至道煉一黍米而賓于天也子野曰他為坤位我是乾家藉彼坤中生物之氣自種靈根於家園之下以成聖胎耳上陽子曰金丹之妙不出鉛汞二物為根宗也世人為不知金丹之有根宗則不知內外二丹之妙夫安爐立鼎外也乾家坤位外也離己坎戊外也金精木液內也紅鉛黑汞內也先天一氣內也唯此先天一氣雖曰在內而從外來故仙師有依他種而之密旨參同契云丹砂木精得金乃并又云太陽流珠常欲去人卒得金華轉而相因無非是此鉛金一物但依世間男女生成之法而逆種於乾宫故真一子云更為男女近作夫妻者此也真仙聖師慈悲開諭接引當來用心至博然不免泄盡天機學者奚可懷愚蒙之淺見超執迷之妄想多生謗毁惑亂仙經豈知一失人身萬劫莫贖切宜三思諦觀諦受咦世人若不迷蒙箇箇可辦此事伏惟此書在在處處有百萬神兵擁護豈可忽之一切學仙道伴因緣遭逢得遇此書時加敬仰信受奉行勿生驚疑勤而行之立躋天仙之位也紫陽真人悟真篇三注卷之二
