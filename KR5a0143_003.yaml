front:
  text: 紫陽眞人悟眞篇三註卷之三律三
  hash: sha256:d8a6a0fff64fb64557d43918668066b201cf64ccfdcf86e64df7a681e7a51269
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0143_HFL_003-001a, image: hfl/0063/0063-174.png}
body:
  text: 紫賢薛道光子野陸墅上陽子陳致虚註七言絶句三十二首先把乾坤爲鼎器次搏烏兔藥來烹既軀二物歸黄道爭得金丹不解生道光曰經云日月本是乾坤精聖人以乾坤喻鼎器日月喻藥物乾坤即眞龍眞虎日月即龍虎之弦氣也聖人假名托象立喻其要妙在眞一之精歸於黃道也子野曰我爲乾鼎彼爲坤器乾坤覆合則驅二氣會於中宫那以進火養符毫髮無差金丹烏得不生焉上陽子曰鼎器者何也靈父聖母也乾男坤女也藥物者何也靈父聖母之氣乾男坤女之精驅此二家之物歸鍊於神室中以成靈丹黃房公曰手握乾坤口吞日月者是也安爐立鼎法乾坤煅煉精華制魄魂聚散氤氲爲變化敢將玄妙等閑論道光曰積諸陽氣爲天上不潤下積諸陰氣爲地下不炎上此天地不交也不交焉能造化生萬物哉蓋天雖至陽而中有一陰之氣故能降地地雖至陰而中有一陽之氣故能升天二氣氤氲萬物化醇金丹之道安爐立鼎煅鍊精華以制魂魄莫不取法於天地以類交結而成造化始自無中生有復自有中生無無形而能變化是名變化無窮此乃天機也子野曰安爐立鼎法效天地地天則泰天地則否至於氤氲變化之妙其㫖微矣上陽子曰爐鼎是彼我乾坤即男女靈父聖母所媾之氣曰精華又曰華池神水以此變鍊於凡父母軀殻之中以成丹皆做天地之造耳休泥丹竈費工夫煉藥須尋偃月爐自有天然眞火候不須柴炭及吹嘘道光曰偃月爐之形仰開如偃月樣陰海是也元始祖氣存焉何用柴炭吹嘘之有子野曰葉文叔指兩腎爲偃月爐是不知也謬註于世誤人甚矣上陽子曰純陽翁云曲江上見月華瑩淨此即偃月爐也佛祖之西江皆此一竅而矣偃月爐中玉蕋生朱砂鼎内水銀平只因火力調和後種得黄芽漸長成道光曰偃月爐陰爐也中有玉蕊之陽氣即虎初弦之氣硃砂鼎陽鼎也中有水銀之陰氣即龍初弦之氣金丹以此二弦之氣調停和合之功種得一粒黃芽結成黍米之珠也上陽子曰偃月爐中玉蕊即陰中之陽坎中之物也朱砂鼎内水銀即陽中之陰離中之火也陰陽二氣相生黃芽方結丹成嚥津納氣是人行有藥方能造化生鼎内若無眞種子猶將水火煮空鐺道光曰嚥津納氣世人多行之殊不知皆後天地生至陰之物非先天之氣夫先天眞一之氣混於恍惚杳冥之間難求難見聖人以法火之變鍊成丹此氣是名眞種子經曰伏氣不服氣服氣須伏氣服氣不長生長生須伏氣子野曰眞種子即眞鉛也契云植禾當以黍覆鷄用其卵上陽子曰物無陰陽安能生産人無眞種豈有妊孕嚥津納氣一己之陰孤陰不産獨陽不生陰陽若眞方得眞種咦妙矣哉調和鉛汞要成丹大小無傷兩國全若問眞鉛是何物蟾光終日照西川道光曰驅龍則汞火飛揚駕虎則鉛光閃爍氤氲造化一粒先天之氣結成丹龍大虎小陽尊陰卑之義何傷之有蟾光者金水之精聖人以八月十五夜合金木之氣結眞一之精故云蟾光終日照西川子野曰求鉛伏汞之法要在調和使無太過不及之患大過則恐傷彼不及恐不結丹大小者言陰陽也易曰大往小來蟾光照西川水中有金也上陽子曰乾之長男曰震言大也主産汞坤之少女曰兊言小也主産鉛震兊調和何傷之有兩國全者彼既無虧我亦濟事眞鉛生於兊兊位乎西也未鍊還丹莫入山山中内外盡非鉛此般至寳家家有自是愚人識不全道光曰龍不在東溟虎不在西川家家自有逆而修之還丹可冀子野曰已失而後得者謂之還已去而後來者謂之返作丹之要非鉛不可此鉛家家有之惜人不識之也上陽子曰世人但見一段奇山秀水則衆皆言此地好修行古今多少人誤了也豈知大川幽谷所有者木石麋鹿而已是皆非類不可煅鍊大還丹也若鍊還丹必求同類若求同類大隱市廛仙翁前詩已云何必深山守靜孤之句至此在題此意可謂深切此般眞鉛家家有之人人有之只爲夢生醉死之場依稀過了不遇眞師誰人識得竹破須將竹補宜覆鷄當用卵爲之萬般非類徒勞力爭得眞鉛合聖機道光曰竹器破矣用金木之類補之可乎若欲器完必竹補之鷄將覆矣以土水之類抱之可乎若欲翼生必以卵覆之陶眞人曰竹破須竹續木破須木補屋漏以瓦蓋人衰以類立若修天仙必求同類方合聖機子野曰紫陽眞人說到這里可謂歩歩向前上陽子曰從來神仙不肯分明說說得分明笑殺人崔公入藥鏡也只三字義用鉛不得用凡鉛用了眞鉛也棄捐此是用鉛眞妙訣用鉛不用是誠言道光曰凡鉛者即後天生滓之物眞鉛者即眞一之氣人之精氣日逐飛散無由凝聚以結聖胎聖人鍊眞鉛取而伏之凝結成砂日逐運火漸漸添汞汞氣漸多鉛氣漸散添汞减鉛眞妙如此十月火足六百卦終鉛氣飛浮只留得一味乾水銀鉛盡汞乾化爲金液大丹體變純陽與天齊壽學者問道至此則知師恩難報當盟心於天日之下誓當成道以答師恩若負師恩如負天日也子野曰用鉛之法如捕魚兔之筌蹄魚兔賴筌蹄而得之既得則筌蹄無用矣亦如鉛池煎銀銀出不用鉛矣知此義者則知用鉛矣上陽子曰老子經云天地無全功聖人無全能萬物無全用深明斯㫖則知用了眞鉛即棄之義虚心實腹義俱深只爲虚心要識心不若鍊鉛先實腹且教守取滿堂金道光曰守精以實腹腹實則金玉滿堂抱一以虚心心空則一塵不立方其虚也則鍊鉛以制之及其實也則抱一以守之形神俱妙與道合眞修丹之士若鍊鉛金母揺汝精精少則還丹不成子野曰心虚則念净一塵不立腹實則丹成四大牢固念净丹成形神俱妙上陽子曰非鍊己功勤則欲心虚而不能非全精絶慾鍊鉛功熟則欲腹實而不能全神虚心常應實腹常靜常應常靜常清靜矣今人以精氣斲喪殆盡爲不識心仙翁教守取滿堂金玉方爲返本還元也夢謁西華到九天眞人授我指玄篇其中簡易無多語只是教人鍊汞鉛道光曰我如來云惟比一事實餘二即皆非金丹之道除汞鉛之外别無妙法子野曰高象先日夕思眞不覺魂升玉京上帝遂命西華太乙夫人指示金丹訣其篇有曰乾坤陰陽之門户乾道男坤道女時人不識眞陰陽茫茫天地尋龍虎又云叔通從事魏伯陽相將笑入無何鄉維連山作參同契留爲萬古丹經王眞人言甚多只是鍊鉛制汞耳上陽子曰志於道者神仙中人也雖一寢一息之間未嘗暫忘故夢寐中常與眞仙上聖往來何也天無私親輔於有德道自虚無生一氣便從一氣産陰陽陰陽再合生三體三體重生萬物昌道光曰道本虚而乃有形之氣氣本實而乃無形之形有無相制則一生二二生三三生萬物萬物莫不負陰而抱陽沖氣以爲和方其未形沖和之氣不可見也及空既形清氣爲陽濁氣爲陰二氣氤氲兩情交媾曰天曰地曰人三物生焉易曰天地氤氲萬物化醇男女媾精萬物化生是以聖人探斯之賾而知源窮斯之神而知化故能返本還源顛倒陶鎔逆施造化賊天地之母氣以爲丹盜陰陽之精氣以爲火鍊形返歸於一氣鍊氣復入於虚無故得身與道合微妙圓通變化無窮隱顯莫測號曰眞人子野曰一生二二生三三生萬物即聖胎之眞身雖千百億化而無窮故金丹四百字云一載生箇兒箇箇會騎鶴泥丸翁云一載胎生一箇兒子生孫兮孫又枝皆發明三生萬物之義上陽子曰道生一氣一氣生形形中又含始氣是爲先天眞一之氣也此先天氣順則爲人逆則爲丹逆則男子懷胎順則女人有孕此重生專謂修行丹成陽神出胎再造陰陽復爲已上章云三體重生也坎電烹轟金水方火發崑崙陰與陽二物若還和合了自然丹熟遍身香道光曰坎電者虎之弦氣虎以陰中之火照爍乾龍龍即發崑崙之火應之二物之火相并和合眞一之精自然凝結即時採餌百骸俱理香且美矣子野曰坎電者水火也金水爲坤方水火交擊于坤方採丹歸己自然一道眞一氣直透頂門與身中陰氣混合遍體生香香生乃丹熟之驗上陽子曰坎電者乃彼鉛氣發旺之時我即乘其時至發崑崙之火應之所謂一月止有一日一日止有一時者此也香透丹田一身調暢目明體健得丹之效也離坎若還無戊己雖含四象不成丹只縁彼此懷眞土遂使金丹有返還道光曰契云坎戊月精離己日光離己象龍之弦氣坎戊象虎之弦氣戊己眞土分居二位龍虎若無二土之氣安能合併而使四象會于中央以成丹哉子野曰乾坤坎離四象雖具若非戊己配合則欲返者不得返還者不得還上陽子曰四象即乾坤日月乾坤乃坎離之體日月乃坎離之象戊己乃坎離之門妙在彼此懷眞土何用意太切若非兩家各以彼此二土合之則一氣何由而往來金丹何由而還返也老子云玄牝之門是爲天地根者即彼此二土也日居離位翻爲女坎配蟾宫却是男不會箇中顛倒意休將管見事高談道光曰日中烏屬陰故爲離女月中兔屬陽故爲坎男談不到此以管窺天子野曰離坎顛倒見律詩註上陽子曰離外陽而内陰是有外無内坎外雌而内雄是有内而無外皆不得純陽以坎配離是云顛倒今時學人不肯苦志求師唯記前人幾件公案入廣衆中喃喃不住恃其機鋒敏捷以逞乾慧不思訛了舌頭把做何用饒他懸河之辯反爲入道之魔愈見學識卑污又安能具大方之眼而拜師于韁鎖之下哉太上曰知者不言言者不知我太虚李眞人得丹之後聞寺講經潜衆聽之出而嘆曰他們說得是行不得我們行得說不得仙翁憐惻此徒利口誤身故云休將管見事空談也取將坎位中心實點化離宫腹裏陰從此變成乾健體潜藏飛躍盡由心道光曰離外陽而内陰坎外陰而内陽以内陽點内陰即成純乾金丹在外來是至陽之氣號曰丹而結在北海之中以法取來點己陰汞化爲純陽然後運水火抽添總由我也子野曰坎中之陽乾也乾動而陷於坤以成坎乾却爲離修鍊之法當於坎中取其一陽歸還於離而復純陽則修丹之法能事畢矣上陽子曰漆園莊老仙云鴻濛雲將謀報渾沌之德日鑿一竅七日而渾沌死一世之人假父母一點眞陰眞陽而有此身渾渾全全無一虧欠及乎二八之年方得養就純陽之體已而鴻濛雲將者皆至六賊日藏於外七情夜殘於内豈知純陽交陰則虧全體而成離純陰負陽則奪一氣而成坎一切常人殆盡而已大修行人取坎還離是爲金丹之道也震龍汞自出離鄉兊虎鉛生在坎方二物總成兒産母五行全要入中央道光曰汞爲震龍屬木木生火木爲火母火爲木子此常道之順五行如朱砂屬火爲離汞自砂中生却是火反生木故曰兒産母也鉛爲兊屬金金生水金爲水母水爲金子此常道之順五行如黑鉛屬水爲坎鉛自鉛中生却是水反生金故曰兒産母也太白眞人曰五行顛倒術龍從火裏出五行不須行虎向水中生二物互相生産而成四象會中宫合五行而結丹也子野曰大槩明兒産母之道上陽子曰震爲乾之長男遵父之志而行道兊爲坤之少女代母之位而行道震兊合而虎龍降離坎交而鉛汞産餌丹歸于中央神室也月纔天霽半輪明早有龍吟虎嘯聲便好用工修二八一時辰内管丹成道光曰仙翁所以指示月半輪者但發明二八兩半輪之數取喻於龍虎此道妙用却在一時辰中分作六候只於兩候中金丹立成尚餘四候别有妙用此皆天機難書竹帛口傳心授是也愚者不得眞師却言藥成於一時非止用一時辰者蓋匹夫茫然不知所歸私意揣度亦何謬甚若云非止用一時辰是將欲以日辰矣爲至簡至易之妙也此道非人間世上可得聞也要須大德大善方許參求謹按大丹火記曰聖人下工之際造鉛之初盜混元一周天之氣奪三千零七十三萬年正數聚於乾坤之鼎會於生殺之舍天地之數奪盡日月之數奪盡龍虎之數奪盡陰陽五行之數奪盡生成之數奪盡擒在一時辰中製造聖丹一粒大如黍米其重一斤至靈至聖至尊至貴爲天地之元精作一身之主宰可謂賊天地盜陰陽宇宙在乎手萬化生乎身得成至眞仙子賔于上帝則一時丹成即其驗也子野曰藥生之時如月出庚而至丁乃上弦金半斤之氣候斯時陰陽相逢易於交媾至於十五三陽圓至東方甲則月已一輪升天乾金二八之氣候學者知其時而修鍊則此一時之中金丹可成上陽子曰月纔天際月初受日之微陽虎嘯癸生虎旺先天之始氣時來勿失爐損難全紫陽老仙說到這裏一歩緊一歩唯恐後人之不仙也愚夫濁子終日談道以盲引盲既不知龍吟虎嘯爲何物又不知用工在一時懵無所知却謗老仙之語三峰採戰之術可憐此徒只管罪深與夫且道這一時是甚麽時咦莫向天邊尋子午早從身上數坤申華嶽山頭雄虎嘯扶桑海底牝龍吟黄婆自解相媒合遣作夫婦共一心道光曰華嶽乃西山月出之地以象虎雄虎乃虎初弦之氣陰中之陽故云雄虎扶桑乃日出之所以象龍牝龍乃龍初弦之氣陽中之陰故云牝龍二物間隔東西黃婆能使之交合結爲夫妻以産黃芽子野曰坎上離下調以中和之意則虎龍相愛如夫婦黃者中也婆者女之終稱故無妒忌而能媒合黃婆之義中和盡焉上陽子曰山頭雄虎危而難伏海底牝龍險而難降非有大力量大勇猛之士安能駕馭哉即如金丹是一箇至陽之氣居於恍惚不測之内危而難得險而難收自非積德重厚鍊己純熟安能施功而得之哉且道如之何得他共一心咦若求天上寳須用世間財西山白虎性猖狂東海青龍不可當兩手捉來令死鬥化成一塊紫金霜道光曰海蟾云左手捉住青龍頭右手扯住白虎尾一時將來入口吞思量此物甚甘美此言外象愚者未聞至道將兩手捉兩獸又非也子野曰西山白虎坎中金精東海青龍離中木性二物獰惡猖狂不易擒捉若得法制之則彼此和合而化成丹這箇死字極有深理諺云欲求生冨貴須下死工夫上陽子曰虎有傷人之理要思所以伏之龍有奔逸之患要思所以降之且道云何降伏云何死鬥咄耳口目三寳閉塞勿發通眞人潜深淵浮游守規中赤龍黑虎各西東四象交加戊己中復姤自兹能運用金丹誰道不成功道光曰赤龍黑虎交於戊己産丹一粒歸納中宫進陽火於復卦退陰水於姤爻連用抽添金丹成矣子野曰龍西虎東所以間隔欲使相逢須憑戊己既得交媾産成紫金之丹養火於復姤之功矣上陽子曰我趙老師因見一人盡日談道每謂曾遇高人發明師即前拜而問曰道不敢問且道龍虎爲何物人曰龍虎在汝身師曰作何狀人曰肝肺是也師曰汝當入拔舌地獄受報去矣更不向世間誤賺人今紫陽翁指示龍虎二物忒殺切了夫我之物爲龍彼之物爲虎有彼我之分是云各東西龍之頭爲己虎之門爲戊龍虎因之而交會復姤由兹而連用金丹得之而功成咦知之非難行之惟難先且觀天明五賊次須察地以安民民安國冨方求戰戰罷方能見聖人道光曰天有五賊見之者昌人能見此而逆修之則宇宙在乎手萬化生乎身察地之理先須安民民爲邦本本固邦寧聖人以身爲國以精爲民以火爲臣以丹爲主吾儕以心觀天擒五賊而逆修之盜陰陽而連化之時眞一之精可奪而乾己之陰汞精固氣全求戰必勝而見聖人矣子野曰天者心也五賊者心中具五行之性五行各具一性則至相戕賊之元氣皆爲賊矣金主怒木主喜水主凉火主炎土主靜此五行之性能見此賊者則心無雜念體若太虚地者一身之謂身中精氣神人民也精全氣壯謂之民安四大康健爲之國冨國冨而戰爲克捷矣倘此心妄想不降此身之根本不固盜賊蜂起精耗氣散以此而戰則必殞身而已何可得見聖人乎此章正是修心鍊己築基事業上陽子曰金丹之道先須鍊己使神全氣盛七情不動五賊不亂六根净盡精難揺動此謂賊不打貧家丹道之言五賊即眼耳鼻舌意爲天之五賊色聲香味觸爲世之五賊愛慾貪嗔癡爲内之五賊天之五賊不謹於内則内之五賊蜂起世之五賊不除于外則天之五賊豺生是以眼見色則愛起而賊精耳聽聲則慾起而揺精鼻聞香則貪起而耗精口嘗味則嗔起而走精身意遇觸則癡起而損精五者日夜戕賊于身其精能有幾何精一去則神氣隨之喪矣修行之人以身爲國以精氣爲民精不動揺謂之民安神氣充裕謂之國冨以求丹爲戰敵以先天一氣爲聖人鍊己者去五賊之害而先守精養氣然後可以戰勝而得先天眞一之氣仙師以戰爲喻者使人恐懼修省愚者不明鍊己去賊之害觀此求戰用將輕敵等語指爲三峰採戰之說至于結不可解咦愚者愚賢者賢用將須分左右軍饒他爲主我爲賓勸君臨陣休輕敵恐喪吾家無價珍道光曰將者火也左爲文火右爲武火饒他爲主者主爲陽雄而好爭賓爲陰雌而好靜我爲賓者是守雌而不雄持靜而不爭慮險防危驚畏之意兵法曰以逸待勞以靜制動是也道之用在火火之用在人先定刻漏以分子午次接陰陽以爲化基搬六十四卦之陰符鼓二十四氣之陽火天關在手地軸由心迴七十二候之要津攢歸鼎内奪三百六十之正氣輻凑胎中連用有方抽添有序動則防危慮險靡敢分毫差忒外接陰陽之符内生眞一之體苟或運心不謹節候差殊致使姹女逃亡靈胎不結還丹無價之寳失矣亦如臨陣不守雌而輕敵也子野曰以軍將爲喻者蓋兵者乃凶器善用之可全性命若輕戰易敵必致敗亡採藥之際當以彼我分左右軍伍我爲左軍彼爲右軍動容周旋端謹誠肅無令一毫犯其嚴令庶可保全無失喪也上陽子曰左爲我右爲彼饒他爲主我爲賓者彼居上而我在下彼欲動而我欲靜也仙師言求丹乃以軍敵爲喻者蓋霎時間稍有不謹即所敗矣可輕易乎金丹九還唯只半箇時中造化爭馳虎龍交戰奪天地主宰之造化奪太極未分之造化奪乾坤交媾之造化奪陰陽不測之造化奪水火既濟之造化奪五行戰剋之造化奪萬物生成之造化聚於頃刻而求一點先天眞氣以鍊成丹其可不謹懼哉故此章專喻外丹法象若得外丹神仙之能事已畢是戒臨陣休輕敵也修行之士做得這一著出來方云難事還丹只此實爲最難故如來云世尊說此難事是爲甚難也若稍輕敵七情六賊有一不防則吾家至輝至精之寳喪矣安可輕敵乎火生於木本藏鋒不會鑽研莫强攻禍發祗因斯害己要須制伏覓金公道光曰火生於木禍發必剋精生于身動之必潰不會鑽研禍斯害己吕眞人曰火發七户密牢關莫教燒破河車路此要制伏覓金公也子野曰木中有火乃本來已抱此殺氣矣倘其一發則木必焚蓋此生殺之機隔一線地百姓昧此皆流於淫蕩邪僻之歸己聖人察其火之將發以水制之則火不能爲害也上陽子曰木喻此身此身日夜長大而精氣復至乎我之身矣至于年壯我之精氣且盛而愛慾之禍至矣不可得而制伏若欲制伏必得先天眞鉛方可然不得眞師指示眞鉛端的次第切莫强爲也金公本是東家子送在西鄰寄體生認得唤來歸舍養配將姹女作親情道光曰金丹作用法象有陽中之陰復陽而又陰者有陰中之陽復陰而又陽者又有内藥陰陽外藥陰陽内三性外三性内五行四象外五行四象又有内外陰陽互用法象反反覆覆不可名狀吾儕親承玄㫖不可蹉跎子野曰此章與前取將坎位中心實義同上陽子曰震是東家西是兊若求兊位莫離壬如此方是認歸且不可作容易唤來既能唤來最緊關是歸舍一節噫件件是難底勾當奚敢妄爲又安敢妄說世有一等地獄種子開口便云說禪說道賺到老死猶不知悔又豈能解圓悟禪師之語哉圓悟云脚根不廓爾無禪之禪謂之眞禪似兔懷胎頂門上五耀無道之道謂之眞道蚌含明月此豈不是認得唤來歸舍之妙乎姹女遊行自有方前行須短後須長歸來却入黄婆舍嫁箇金翁作老郎道光曰姹女汞也遊行有方是外藥作用鍊丹之初連汞火不半箇時即得眞精餌之此爲前行須短服丹之後連己汞火却有十月之功此爲後須長黃婆爲内象即土釜金翁即眞鉛老郎即純陽也子野曰姹女己之陰汞前順去後逆歸順去則片餉之間陷溺於彼逆歸則自下即上周流一身落中宫爲鉛合而結聖胎上陽子曰姹女是己之精遊行有方者精有所行之熟路常人精每虧少但凡交感激撓一身之骨脉攪動一身之精髓情慾方動心君亦淫三尸搬於上七魄摧於下方得精自兩脛而上由五臟升泥丸與髓同下自夾脊雙關至外腎交媾此爲五濁世間法此謂遊行自有方此謂常道之順也金丹則不然行顛倒之法持逆修之道大修行人鍊己純熟身心不動魂魄受制情慾不千精氣滿盈如驟富之家何處不有金玉待彼一陽初動之時先天眞鉛将至则我一身之精气不动只於内腎之下就近便處運一點眞鉛以迎之此謂前行短也眞鉛既渡鵲橋之家與混合却隨眞鉛升轆轤三車由雙關夾脊上入泥丸遍九宫注雙目降金橋下重樓入絳宫冶鍊此爲遊行自有方此謂後須長也然後還歸黃庭神室交結成丹此謂歸來却入黃婆舍而嫁金翁也此爲顛倒五行而逆修也及温養十月以成眞人與天齊壽是謂老郎仙師說得次第明白如此諸家所註皆略而不詳者莫敢泄漏故也僕願天下人願後世萬萬人皆以此而成仙作佛僕亦甘受漏泄之咎眞仙聖師在上天地神明鑒之縱識朱砂與黑鉛不知火候也如閑大都全藉修持力毫髮差殊不作丹道光曰金丹造化毫髮差殊失之千里聖人傳藥不傳火從來火候少人知子野曰雖識得眞鉛眞汞不知火候聖胎不結何哉蓋火性暖而能融物之眞使其交媾若無火則鉛自鉛汞自汞各不交矣上陽子曰鼎器藥物仙師詩中發泄到盡唯火候不留於文者蓋必要師傳若不得師口傳雖知藥物丹亦無成且火候次第自有數節豈愚人妄猜者所能知契論丹經講至眞不將火候著於文要知口訣玄通處須共神仙子細論道光曰火記六百篇篇篇相似與天合度天之所祕聖莫傳之獲遇眞師子細究竟子野曰火候丹中要非師勿妄猜上陽子曰外火候有内火候古仙上聖丹經萬卷不指火候者莫敢泄天寳也僕今指出内外火候願後來學人箇箇成仙也伯陽翁云三日月出庚外火候也崔公曰天應星地應潮外火候也純陽翁曰正一陽初動中宵漏永温温鉛鼎光透簾幃外火候也這般題出大似分明廣成子曰丹竈河車休矻矻鶴胎龜息自綿綿内火候也仙師詩曰謾守藥爐看火候但看神息任天然内火候也未鍊丹時最難得者是外火候此有爲作立基之事内火候則已得丹但任天自然乃大休歇大自在無爲之功也八月十五翫蟾輝正是金精壯盛時若到一陽纔起處便宜進火莫延遲道光曰八月十五是金水氣旺一陽來起復乃上天之子時内外二火工夫宜疾進也子野曰金精壯盛如八月十五夜月月爲金金旺酉八月建酉故以此喻此時進火鍊之無待莫旺過而衰也上陽子曰水清金旺天上之蟾月星輝鉛遇癸生人間之藥物可煉正是一陽初動便莫遲延毋令鉛鼎漸虧空勞神用仙師此詩持言外火候也如此一陽纔動作丹時鉛鼎温温照幌幃受氣之初容易得抽添運用却防危道光曰一陽子時造丹鼎内眞鉛得火光透簾幃丹既在内十月連用抽添有防危之功也子野曰學者趁一陽動時作丹鉛鼎光生眞氣易得及退藏於密尤當謹慎抽添上陽子曰崔公之入藥鏡云受氣吉防成凶意同玄珠有象逐陽生陽極陰來漸剥形十月霜飛丹始熟此時神鬼也須驚道光曰有象者冬至則逐陽生而進陽火夏至退以陰符剥至十月還丹始熟子野曰玄珠者藥之象藥不能自生須感陽氣而生自微至著陽極陰消十月數周大丹成就上陽子曰此言内丹法象抽添温養之事金丹大要書所言抽添温養工夫甚詳前弦之後後弦前藥物平平氣象全採得歸來爐裏煅煅成温養自烹煎道光曰月至三十陽魂之金散盡陰魄之水盈輪故純陰陰而無光法象坤故曰晦晦朔兩日日月交合同出同没至於初二月感陽光而孕初三即現一陽於坤方庚上即魄中生魂法象震此時人身金氯初生藥苗新也初八日二陽生法象兊此時魄中魂半其平如繩故曰上弦弦前屬陽弦後屬陰陰中陽半得水中之金八兩其味平平其氣象全十五日三陽備法象乾此時陰魄之水消盡陽魂之金盈輪是以團圓純陽而無陰故云望陽極則生陰十六日輪生一陰魂中魄生象巽二十三日二陰生象艮此時魂中魄半亦平如繩故曰下弦弦前屬陰弦後屬陽陽中陰半得金中之水半斤其味平平其氣象全聖人採此二八擒居造化爐中烹煅温養以成還丹仙翁此章丁寧反覆使自己一意也烹煎者良有妙哉意也子野曰前弦後後弦前乃日月合壁之後太陰將復生之時此時藥材正新得其平平之味急採己與身中陰汞凝結始於温養終於烹煎此丹熟自能清上陽子曰仙師詩意唯欲指示三日藥生一時便修鍊者亦如太陰領覽初生之氣以成金丹薛陸所註意同或者以前弦爲上弦以後弦爲下弦者非也紫陽眞人悟眞篇三註卷之三紫陽眞人悟直篇三註卷之四律四紫賢薛道光子野陸墅上陽子陳致虚註七言絶句三十二首長男乍飲西方酒少女初開北地花若使青娥相見後一時關鎖在黄家道光曰震爲長男即龍也兊爲少女即虎也北地即陰物花即陰氣謂之陰火青娥即姹女龍之弦氣謂之汞火修丹之士驅龍乍來就虎虎開陰户之花以就龍龍即動汞火與白虎交見之後一時封鎖會於黃家以産金丹而成眞人子野曰三日生魄如震陽生坤丁金火本坤之陰氣震爲來復食其坤之陰氣故喻長男乍飲西方酒震來之地乃兊之位此地得其陽生消其陰氣故喻少女初開北地花開即發之意花乃陰氣前有次發紅花陰後隨之句同青娥即木汞只此一時坎離交媾採藥歸己封鎖中宫也上陽子曰酒飲西方男女有東西之位花開北地人身辯南北之稱道光已露出於前陸公復泄漏於後聞者受者信之慎之兔雞之月及其時形德臨門藥象之到此金砂宜沐浴若還加火必傾危道光曰二爲德八爲刑時當沐浴不宜加火子野曰煉丹之法陽則進陽火陰則養陰符火符隨其消長不可易之法也兔雞之月卯酉春秋平分之時陰中有陽陽中有陰故於此時不敢進火但以眞氣薫蒸而爲沐浴保其危險契云八月麥生陰中有生氣二月榆死陽中有殺氣也上陽子曰刑爲殺德爲功刑爲危險德爲保養既自金砂在鼎須要温養保扶紫清眞人尚有煙氣滿寥穴之嘆可不慎乎日月三旬一遇逢以時易日法神功守城野戰知凶吉增得靈砂滿鼎紅道光曰太陽太陰一月一合聖人則之縮一日爲一時以月易日以日易時守城則沐浴罷功野戰則虎龍交媾神功者進火之度苟或陰陽錯亂日月乖戾外火雖動内符不應必要進火退水知吉知凶旋斗歷箕暗合天度自然靈胎密就神鼎增輝也子野曰太陰太陽一月一度合壁修煉之法以時易日而交離坎時乃晦盡朔來藥生之時即非尋常時也上陽子曰一年十二度月圓明明有陽生之日一月晝夜三千刻刻刻尋癸生之時野戰則採鉛守城唯温養要知凶吉方保成功否泰纔交萬物盈屯蒙受卦禀生成此中得意休求象若究群爻謾役情道光曰冬夏二至爲一陰一陽之首子午二時爲一日一夜之元聖人連動陰陽符火協天地升降之道日月往來之理攢簇四時八節二十四氣七十二候環列鼎中而生眞一之體故託諸卦象分壁於一月三旬之中以闡玄機以明火候若執而用爻象者非也但屯蒙爲衆卦之首以象作用生成之始造化禀受之原故朝以屯暮以蒙也否泰連用陽升陰降春分陽氣升到天地之中陰陽相半爲泰卦亦如月之上弦氣候此時陰陽自然相交不進火候謂之沐浴秋分陰氣降到天地之中陰陽相半爲否卦亦如月之下弦氣候此時陰陽自然交結不進火候謂之沐浴斯亦法象如此何勞執諸卦爻哉子野曰陰陽一交則萬物生生而無窮使其交者火候也朝屯暮蒙乃行火之綱領學者知之則其餘卦象皆自然而然上陽子曰天地未通爲否陰陽已交爲泰屯禀生成之始蒙受育養之功此言内丹之道卦中設象本儀形得象忘言意自明後世迷徒唯泥象却行卦氣望飛升道光曰卦者火之筌蹄伯陽作參同契演易象以明丹道喻乾坤爲鼎器坎離爲藥物故以四卦居中宫不係連轂之數其六十卦分在一月之中搬連符火始在屯蒙終於既未周而復始如車之輪連轉不已一日兩卦直事三十日六十卦也并乾坤坎離四卦共六十四總三百八十四爻以象一年及閏月餘三百八十四日象金丹二八一斤之數一斤計三百八十四銖此皆比喻設象如此茍明火候則卦爻爲無用學者反泥此而行卦炁勞形苦思而望飛昇者不亦悲乎子野曰先師借易卦陰陽爲喻不過行自己造化若泥象執文按圖索駿者去道遠矣上陽子曰丹道喻乾坤爲鼎器者使知男女龍虎喻坎離爲藥物者則知鉛汞是虎龍所産之物世人執於易之辭不明卦之用苟明卦之用不知易之道欲明易之道在身中不屬卦氣天地盈虚自有時審能消息始知機由來庚甲申明令殺盡三尸道可期道光曰天地相去八萬四千里冬至地中陽氣上昇一日之中昇四百六十里二百四十歩五日爲一候三候爲一氣三氣爲一節三節爲一時即春分日計九十日陽氣共昇到天四萬二千里正到天地之中此時陰中陽半爲泰卦其氣變寒爲温萬物發生之時自此而後陽氣昇入陽位升到夏至并前共計一百八十四日共計到天八萬四千里此時陽中之陽爲乾卦號純陽變温爲熱萬物茂盛盈滿之時故曰盈滿陽極則陰生自夏至後陰氣自天而降一日降四百六十里二百四十歩降至秋分計九十日陰氣共降四萬二千里正在天地之中此時陽中陰半爲否卦其氣變熱爲凉萬物結實之時自此而後陰氣降入陰位到冬至并前計一百八十日共降到地八萬四千里此時陰中之陰爲坤卦乃純陰變凉爲寒萬物斂肅收藏之時故曰天地盈虚因月而見月從日生初三日震庚生形初八日兊丁生弦十五日乾甲周滿故曰盈十六日巽辛受統二十三日艮丙成弦三十日坤乙消滅故曰虚聖人消息天地盈虚之機移一年氣候在一月之中以知一日一陽生爲冬至兩日半當一月氣候至上弦時陰中陽半即春分也至十五日得四月節氣月圓滿爲純陽陽氣盈輪故曰盈十六日一陰生爲夏至至下弦時陽中陰半即秋分也三十日得十月節氣月盡黑爲終陰陰氣消輪故曰虚終而復始循環不已聖人連動陰符陽火一依天地盈虚升降循環六十四卦法庚甲圓缺之理亦猶人君申明號令殺盡陰尸道可期也子野曰學者見之天地盈虚之消息道理則而行之於己趁其申明生庚滿甲之令朔後望前採取天地盈時之氣歸於身中煉而成丹則尸鬼烏得不滅上陽子曰潮來則盈潮去則虚此天地之盈虚月滿則盈月缺則虚此日月之盈虚春生夏長秋斂冬肅此四時之盈虚氣旺則盈氣散則虚此人身之盈虚癸生則盈望遠則虚此金丹之盈虚長春眞人云猶氣鞠之氣氣實則壯氣餒則虚此氣之盈虚最要人能消息用之學者下工之初先去三尸六賊鍊得心如太虚六根净盡方可入室而煉大丹要得谷神長不死須憑玄牝立根基眞精既返黄金室一顆靈光永不離道光曰陰陽不測之謂神感而遂通如谷應聲故曰谷神夫神因氣立氣因精生精精能生氣氣能生神故神氣爲一身主宰一身爲形氣之府形不得神氣不得生神氣不得形則不立二物相須始有生也若學長生根基全憑玄牝玄牝既立然後長生可致萬物莫不因此而生因此二物而死實爲天地之根五行之祖陰陽之元萬化之基聖人憑此以成外丹藉此以就内藥故得眞精返爲黃金之室變爲一顆靈光化身爲氣化氣爲神形神俱妙與道合眞隱顯莫測子野曰谷者養也玄牝者陰陽也人欲養神長生必須陰陽既濟而後則金精復歸我之中宫如一顆明珠長存也上陽子曰谷神不死是爲玄牝玄牝之門是爲天地根此老子之言仙師再爲後人明之立根基者蓋玄牝乃人身出入之門尸金丹由此而修合大修行人先要洞明玄牝之㫖是陰陽媾精之處方得一顆靈光之珠也玄牝之門世罕知指將口鼻妄施爲饒君吐納經千載爭得金烏搦兔兒道光曰玄牝之門是爲天地根舉世學人莫能知此非遇眞師指示熟能曉哉自開闢以來非此玄牝二物安能有萬物哉夫内外二丹從此而立聖人祕之曰偃月爐懸胎鼎也金烏即金丹也以此金丹乃能制己之陰汞似猫捕鼠如鷹搦兔或曰以兩腎中間混元一穴爲玄牝非也蓋玄牝乃二物若無此二物何以造化萬物豈可指凡體一穴而通論之又以口鼻爲玄牝者大可笑也子野曰前章只說得玄牝二字再於此章發明一門字其理深妙門者出入往來之所陰陽交會之地不得心傳口授之眞何可强猜而知之乎上陽子曰玄牝之門四字自老子指出之後後來眞師仙聖得以下手而煉大丹愚人以口鼻爲玄牝以吐納爲是道如斯謬戾何由得烏兔之交合哉異名同出少人知兩者玄玄是要機保命全形明損益紫金丹藥最靈奇道光曰經云無名天地之始有名萬物之母又云兩者同出而異名方其無眞一之氣不可見故爲天地之始及其有眞一之珠現空玄故爲萬物之母在天曰離爲汞在地曰坎爲鉛其本則一其用則異同謂之玄玄之又玄上士至人執此兩者之玄機以明損益以治諸身則形可全而命可保所謂損者五行順而常道有生有滅所謂益者五行逆而丹體常靈常存吁純陽紫金立乎天地之始出爲萬物之母此非金丹之最靈乎子野曰一氣分爲陰陽故有異名然皆從太極而生故曰同此陰陽修煉之要機保我之命全我之形無損於彼有益於我神哉水中之金乎上陽子曰異名者有無也徼妙也始與母也玄與牝也此者陰陽交合之所金丹化生之處上根之士必先悟此兩者然後可煉紫金丹也始於有作無人見及至無爲衆始知但見無爲爲要妙豈知有作是根基道光曰筌蹄方在手莫我知也夫到岸不須船十目俄瞠視凡聖雜帀朝魚龍混通衢懊恨世間人對面不相識子野曰採藥行火得無爲乎但知無爲不知有作何以結丹上陽子曰到老無爲如何得藥入室採鉛是云有作大隱市朝又誰知覺欲成匡廓先立鄞鄂得一黍珠云是不錯九載坐忘無爲功博行滿三千與衆共樂若只無爲不先有作此乃愚夫自相執著慇懃數語以詔後學黑中有白爲丹母雄裏藏雌是聖胎太一在爐宜慎守三田聚寳應三台道光曰鉛中取銀即爲丹母朱裏出汞即是聖胎二物感化結在爐中精明氣候恪守規模分毫無差故得三性聚會結成丹寳上應三台也子野曰黑中白是水中之金即坎中陽氣人能採此眞陽之氣結而成胎所謂雄裏懷雌採藥之際當以太乙主人爲念倘不慎守人欲横流則喪吾珍主人得不爲之異乎上陽子曰黑中有白乃陰中之陽外丹法象雄裏懷雌乃陽中得陰内丹法象太乙在爐尤宜慎守則三田之寳聚矣恍惚之中尋有象杳冥之内覓眞精有無從此自相入未見如何想得成道光曰眞一子云無者龍也有者虎也無者汞也有者鉛也無因有激之而成象有因無感之而有靈故得黍米空玄霞光耀日也子野曰煉金丹者須於杳冥恍惚之内得其眞精眞象始爲了事若未得師傳不可以智識猜度上陽子曰經云恍兮惚其中有物惚兮恍其中有象杳兮冥其中有精其精甚眞其中有信金丹之道斯言盡矣仙師再題出可謂甚親甚切倘非言傳心授之眞何必枯坐存想四象會時玄體就五行全處紫金明脱胎入口通身聖無限龍神盡失驚道光曰四象五行會之時眞一之精結成黍米紫色光明密連于内將來脱胎入口通神天地龍神盡失驚也子野曰十月數周聖胎完具遍身通聖通于神明得不驚也上陽子曰一得永得自然身輕到此功滿丹靈方是大丈夫也華池宴罷月澄輝跨箇金龍訪紫微從此衆仙相見後海潮陵谷任遷移道光曰華池宴罷得丹成功脱胎神化肌膚若冰雪綽約若列子御氣乘雲遨遊八極飽觀塵世海變桑田也子野曰華池乃産藥之地宴罷則採藥已足聖胎完備身外有身朝元謁帝蓬萊仙島無所往而不可上陽子曰華池即曲江即坎宫之户金丹由是而成功圓到此天仙之位也此章亦紫陽仙師自頌以詔後世蓋仙師乃紫微天宫之一星也要知金液還丹法須向家園下種栽不假吹嘘并著力自然果熟脱眞胎道光曰此道甚近家園自有宜急下工若非其類愈遠若得同類又何著力之有子野曰藥採他家而歸自己家園下栽培以至成熟自然之妙非用人力也上陽子曰還丹之法蓋家園自有金花種子自可栽培不須爐炭吹嘘功成果熟脱胎方外道人員頂禪衲要知家園之妙在朝市間維摩傅大士輩皆得此園而下種故如來號之曰給孤獨園也休施巧僞爲功力認取他家不死方壼内旋添留命酒鼎中收取返魂漿道光曰修眞之士多執非類巧偽之法施功於己安有成就若悟他家有不死之藥腹内添返命之火是爲眞寳也子野曰此道乃眞陽逆合盜其殺機中之生氣耳即非三峰採戰其他巧偽漂蕩之術酒與漿皆神水上陽子曰前云家園下種此云他家不死豈非兩物乎延命酒返魂漿二者即眞精眞氣經云仙人道士能有神積精累氣以爲眞是也雪山一味好醍醐傾入東陽造化爐若過崑崙西北去張騫方得見麻姑道光曰雪山喻白色西山金之象比金丹一粒味醍醐餌歸丹田造化爐中崑崙在海水中我身之崑崙本在下元海水中生出狀若崑崙實發火之處崑崙頂有門曰玄門又云天門在西北乾位張騫象乾卦爻象眞汞爲陰火麻姑象坤卦爻象眞鉛爲陽火言發火自崑崙玄門而入則鼎内眞鉛始見而有變化方其眞胎内融眞火外接坤策變乾策陰水返陽符南火交通鉛汞結合神仙之道根本於斯張騫乘槎至月宫遇女宿喻其陰陽相會遇之意子野曰醍醐乃坎中金液取歸離中離即我也然後連之由尾閭經泥丸自腹中至丹田與身中陰汞混合爲一矣上陽子曰雪山乃至陰之地陰中有陽故云好醍醐灌頂者此也傾入者他反居上也我屬東故云東陽我之玄門曰造化爐崑崙張騫道光已解昔佛在雪山修行者即此是也古人因有其地而名之故多假名以像物爾不識陽精及主賓知他那箇是疏親房中空閉尾閭穴誤殺閻浮多少人道光曰鍾離公云四大一身皆屬陰不知何物是陽精蓋眞一之精乃至陽之氣號曰陽丹而自外來制己陰汞故爲主也二物相戀結成金砂自然不走遂成還丹迷徒不達此理却行房中御女之術强閉尾閭名爲煉陰以此延年實抱薪救火耳陰符經曰火生於木禍發必剋可不慎乎子野曰陽精實坎中之金雖從外來本一身内之物唯有同出異名之一間耳上陽子曰陽精雖是房中得之而非御女之術若行此術是邪道也豈能乆長故佛云是人行邪道不能見如來倘非眞師指示陽精之路則諸傍門皆爲邪道世之盲師以採陰三峰御女之怪術轉相授受所謂以盲引盲及臘月三十夜到來反怨丹經虚誑終不回思自己錯謬故仙翁直露此詩萬物芸芸各返根返根復命即長存知常返本人難會妄作招凶衆所聞道光曰經云萬物芸芸各歸其根歸根曰靜靜曰復命復命曰常知常曰明夫人未生之前冥然無知混乎至朴及其生也禀以陰陽之父母聖人逆而修之奪先天之氣以爲丹母賊陰陽始氣以爲化基煉形返入於無形煉氣復歸於至朴能知常道而返其知者聖人也是以長生不知常道而妄作者群迷也是以招凶子野曰萬物如草木之類猶能歸根返本以歷歲月人爲萬物之靈動至死地反不能如草木也此道乃歸根返本之道却非尋常妄爲而凶也上陽子曰萬物有歸根之時至人明長生之理草木遇陰之極則歸其根待春而復茂世人氣血將衰須求歸根之道可以回老可以返嬰可以長生噫歸根即還丹也常者乃常俗之世法備諸常俗世法深深密密方能返本還元是爲知常所以大隱市廛者要人不能識也倘幾事不密而爲之妄作而招凶謗故達磨遠來東土求成佛者欲避凶而遠謗也六禪禪師隱于四會獵人中者亦避凶而求成佛後道光禪師既得石眞人傳無奈之何只得復俗依有力以了兹事我重陽帝君居活死人墓以成道太虚眞人往武夷七月長生眞君往洛陽三年古人波波吒吒只爲此事今時學者偶記前賢一言兩語以爲是道終日談論又有一輩小愚之人不參仙聖所爲乃謗修行之事曰世有生必有死安有乆視之道此乃地獄種子甘分輪迴次有執著之輩因人略指傍門小徑便云能行既不遇眞仙至人又不知歸根復命又不知出世間法亦不知同類是何物倘或知之且能韜晦于常俗中了其有爲之大事却無忘諱而妄爲者豈不招乎凶殃故經云知常曰明不知常妄作凶知常容容乃公是也歐冶親傳鑄劍方莫耶金水配柔剛煉成便會知人意萬里追凶一電光道光曰歐冶鑄劍天帝遣神女爲之侍爐制以金水配以柔剛劍成誅妖如一電光靈異若此聖人鑄劍功亦如之以天地爲爐冶以陰陽爲水火配以五行制以神氣煉成寳劍能曲能直能柔能剛能善能惡能圓能方心有所思意有所適飛揚誅斬一電光耳此乃神劍修丹若無此劍猶取魚兔而乏筌蹄也子野曰煉丹採藥全憑慧劍降魔誅妖倏忽變化瞬息萬里慧劍若無鋒利妖魔豈不爲害乎上陽子曰要鑄此劍非用凡金凡鐵蓋此神劍内斬三尸外誅凶惡愚者以此劍殺其身聖人以此劍飛其神旌陽使五仙童女戲劍誅斬妖蛟洞賓以三清寳劍精靈滅迹在佛亦云金剛寳劍實成仙佛之器耳敲竹唤龜吞玉芝鼓琴招鳳飲刀圭近來透體金光現不與常人話此規道光曰竹乃虚心之物無情之義也琴乃樂之正音和諧之義也龜即黑虎鳳即赤龍龍之弦氣曰玉芝虎之弦氣曰刀圭言龍虎是無情之物而能交媾故曰敲猶兩物相敲擊之意龍虎相交爲夫婦是以和諧故曰鼓琴龍虎交則二弦之氣相吞相啖煉就還丹透體金光玄黃燦爛風生兩腋出人間子野曰玉芝刀圭藥之異名藥生坎中坎有乾陽乾爲金爲玉故喻爲玉芝刀圭敲竹鼓琴乃陰陽相求之和聲竹則虚心應而先欲琴則正音和而不亂此聲之感非尋常邪僻情偽鄭衛之音唤龜招鳳所謂本乎天者親上本乎地者親下入藥鏡謂之上鵲橋下鵲橋之義又離爲禽爲南方朱鳳喻坎招離翕受其藥離即我也上陽子曰竹是中通外直之物爲其不直則敲之要其能應于物琴乃徽弦相和之意爲其不和則調之庶能克濟所事玉芝即乾龍刀圭爲坤物唤龜屬我招鳳要他若非大和則他安能招鳳乎修行之人卦氣已過竹不應物可不擊乎擊即敲也琴若不和可不調乎調即鼓也是以七十八十至百二十歲皆可還丹是此道也中人常士烏可語此邪師妄人烏能知此此非眞仙聖師盟天口授孰得而知之乎昔我紫瓊公常侍太虚眞人偶一辯士求見曰敲竹唤龜吞玉芝問我師如何是唤龜太虚曰唤龜我當語汝我且問你如何是敲竹辯士曰上上關捩太虚曰我不問上上關捩且說如何是敲竹辯士曰密密深機太虚曰你這言句是長連床上學來底你將去與天下人論辯去我這裏不是你唤龜處其人不悟令紫瓊拖出後却問紫瓊曰汝知敲竹否曰寂然不動感而遂通曰汝知唤龜否曰禮下於人必有所得曰適來辯士何以不言紫瓊曰彼未得師强猜不得太虚復誡曰知之非難行之唯難藥逢氣類方成象道在希夷合自然一粒靈丹吞入腹始知我命不由天道光曰有物混成先天地生聖人强名之曰混元眞一之氣視之不見感而遂通降成靈丹象空玄之中一粒寳珠取而餌之立乾己汞化爲純陽之軀與天齊年朝元子曰死生盡道由天地性命元來屬汞鉛豈非我命在我所爲乎子野曰道自是道清淨爲要藥自是藥得類乃成若求非類徒勞心力上陽子曰易云西南得朋乃與類行若二陽同類則成亢旱豈有性情相感二陰同室則必爭安得陰陽相類哉蓋陰從陽方爲類鉛投水方成藥藥化爲丹丹化爲神形神俱妙命在我也赫赫金丹一日成古仙垂語實堪聽若言九載三年者盡是推延款日程道光曰金丹大藥下工不逾半箇時立得服餌此言一日者只於一日之中取此半箇時也金丹入口立躋聖地如此之妙奚可以九載三年而遷延子野曰作丹之法大要鉛與汞合則片餉之間丹頭即結但究鉛生之時斯時也萬物萌芽有氣無質水源至清妙矣哉且道這時是甚麽時咦今年初盡處明日未來時上陽子曰煉丹之法要知他家活子時也非天下之至妙孰能與於此哉大藥修之有易難也知由我亦由天若非積行修陰德動有群魔作障縁道光曰魔障在彼修持在我陰德既宏靈丹可冀子野曰金丹大道古人以萬劫一傳非等閑之細事道既高魔必盛非以陰德相扶恐有剉志之患上陽子曰前云我命不由天是造化之妙在乎我此章言由我亦由天蓋還丹先須積陰德夫施與不求報陰德也積善無人知陰德也不陷人于險陰德也暗中作方便陰德也大修行人自己積德未充鮮不爲外魔所攻若能回思内省發大忍辱精進則魔障化爲陰德經云彼以禍來我以福往彼以怨來我以德報皆陰德之盛祛魔之功也三才相盜及其時道德神仙隱此機萬化旣安諸慮息百骸俱理證無爲道光曰天地以四時盜萬物故有榮枯而不能長榮萬物以五味盜人故有生死而不能長生人以五行盜萬物故有存毁而不能長存三盜既宜三才既安是以有生有死有榮有枯有存有毁有物有我紛紛而起循環無端此乃自然之道若能混此三盜爲一返其機而動之逆其時而食之則百骸俱理而萬化自安諸慮自息是無爲之道證矣子野曰盜者使人不知不覺而竊其所謂之事修煉之法竊天地之機盜殺中之生氣爾得其理則百骸安上陽子曰盜者非世俗之所謂盜也是金丹之法盜其先天先地一點眞陽之始氣以煉還丹此乃道高德重神仙中人方能隱用此機而非讒德殄行庸常之人所可知之偶或知之非疑則惑何哉無德故也此云道德神仙隱此機陰符寳字逾三百道德靈文滿五千今古上仙無限數盡於此處達眞詮道光曰二經爲群經之樞轄諸子之機紐也上陽子曰陰符道德丹之祖書上仙皆毒之爲筌蹄修之成道然其㫖意玄遠世薄人澆不能達此故仙師作此悟眞篇使後學者一見了然易於領悟而行之爾是知陰符道德悟眞篇三書同一事也饒君聰慧過顔閔不遇明師莫强猜只爲金丹無口訣教君何處結靈胎道光曰千經萬論唯布枝條至道不繁獨傳心即未遇眞師强猜不得子野曰非師口訣眞要則從何處而下手上陽子曰九流百家一應藝術皆可留之紙上或可以智慧猜曉而知唯獨金丹一事非得眞師逐節指示不可强以意會或者得師略言鼎器而不知藥生之時亦不成丹既知藥物不知火候亦不成丹既知火候而不顛倒亦不成丹既知顛倒而不知煉己細微亦不成丹既知煉己而不知法財兩用亦不成丹崔公入藥鏡差毫髮不成丹噫世之愚人恃其機鋒欲以言語會恃其聰慧欲以心領意會或因邪僻而行採戰或只枯坐自爲仙師慈悲甚至詩句迫切沾丐後來者多矣了了心猿方寸機三千功行與天齊自然有鼎烹龍虎何必擔家戀子妻道光曰此言甚切何故不知返也上陽子曰天地之功春生夏長秋收冬閉萬物榮枯星宿遷斡造化連轉只三百六十日爲一始終之成功也修行之人制御心猿滌洗方寸收寳珠於愛河之内只半箇時守還丹於神室之中幾三千日功備造化德伏鬼神豈非功行與天齊乎未煉還丹須急速煉了還須知止足若也持盈未已心不免一朝遭殆辱道光曰若未煉丹急須下手時不待人既煉丹畢抱一守成面壁九年斯道弘矣上陽子曰未煉還丹急須煉之若已煉丹急須去之佛云道成之後丹房器皿委之而去若不去之則心境見前恐有殆辱之患紫清白眞人半夜忽風雷此其證也是以達磨去長蘆而入少林冷坐者無一朝之患也須將死户爲生户莫執生門號死門若會殺機明反覆始知害裏却生恩道光曰陰陽五行順之則生逆之則死此常道也不生之生則長生不順之順爲至順此丹道也若能明此則害裏生恩男兒有孕也上陽子曰詩云明門户急重修今人若達此理明生死之機識顛倒之用知返還之妙轉生殺之户以苦爲樂以忍收恩何憂不仙乎禍福由來互倚伏還如影響相隨逐若能轉此生殺機反掌之間灾變福道光曰陽主生曰福陰主殺曰禍陰消則陽長陽極則陰生互相倚伏此常道也若以生殺之機逆而修之反掌之間灾中變福害裏生恩男兒有孕爲丹道也子野曰所謂五行順行法界火坑五行顛倒大地七寳上陽子曰造化在吾掌握禍福由我而修順則生人逆則生丹世人爲不知轉生殺之機是以輪迴而無了期又烏知成佛作仙之道止一反掌間耳修行混俗且和光圓即圓兮方即方顯晦逆從人莫測教人爭得見無藏道光曰老子云和其光同其塵和同天人之際實修行之祕要子野曰外圓内方是有爲也道之所謂奚可令人見之乎上陽子曰仙師廣大慈悲非特以金丹之祕開悟後人並以世間法終始叮嚀何其切也夫大丹之最難者混俗也要深不可識者和光也雖有妙用而不露鋒芒者方圓應世潛造化而不顯至此者孰知行藏凡此數者實爲大修行之上事道光得杏林之語即棄僧伽黎復俗以了大事豈非混俗乎六祖得五祖之言入于獵人之中無人知覺豈非混俗乎我大虚眞人得黃房公妙㫖去隱武夷七箇月方成道豈非和光乎今者黃緇之流圓其頂而衲其衣髽其髻而方其袍此豈知吾有大患爲吾有身之聖訓乎又安知此身相反爲入室之大患乎所以大隱市廛者使人不可得而測度修出世間法者要人不得而知行藏故老子曰迎之不見其首隨之不見其後又曰惟不可識故强爲之容明達到此回視愚夫俗子欲以機鋒巧詐剽識淫蕩而求道者遠之又遠矣大修行人工夫至此可不三復是詩以求成道勲業乎紫陽眞人悟眞篇三註卷之四
