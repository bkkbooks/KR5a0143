  - {type: variant, offset: 7775, length: 0, content: '', CK-KZ: 潭者陰也日者陽也山者陽也月者陰也潭底日紅者陰中之陽也乃虎之初弦之氣謂之紅鉛也純陽無陰則陰怪滅也山頭月白者陽中之陰也乃龍之初弦之氣也謂之黑汞也初弦新嫩此藥苗新也聖人以此二物於一時辰中造化成一粒陽丹結在北海之中赫然如日光透簾幃卽時吞入腹中點我陰汞則一身陰邪之氣悉皆消滅亦如曉日之狀自東海而升赫然炤耀則陰怪滅也已之陰汞在内丹田下峯之頂乍稟陽丹之氣漸漸凝結其芽微嫩藥苗新也亦如月之朔旦與日相交乍稟太陽之氣三日日沒之時則吐微光於西方庚位狀若娥眉其光新嫩藥苗新也此寓意於内外二藥之象也夫外之眞鉛眞汞卽龍虎初弦之氣内之眞鉛眞汞卽金丹也時人要識眞鉛汞卽此是也餘外非眞道此二眞物能有形入於無形爲仙子也凡砂凡汞莫與此倫矣經曰陽中之陰名曰姹女陰中之陽名曰金公此乃壺中夫婦紫府階梯悟之者神仙現在目睫迷之者杳隔塵沙}
