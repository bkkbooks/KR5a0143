  - {type: page-break, offset: 0, content: '', id: KR5a0143_CK-KZ_02p001a, image: JY175/CK-KZ_JY175_02p001a.png}
  - {type: variant, offset: 0, length: 0, content: '', CK-KZ-jye: 重刊道藏輯要悟眞篇}
  - {type: variant, offset: 0, length: 0, content: '', YP-C: 詩九九八十一首號曰悟眞篇内七言四韻一十六首以表二八之數絕句六十四首按周易諸卦五言一首以象太乙續添西江月一十二首以周𡻕律其如鼎器尊卑藥物斤兩火候進退主客後先存亡有無吉凶悔吝悉備其中矣及乎篇集旣成之後又覺其中惟談養命固形之術而於本源眞覺之性有所未究遂玩佛書及傳燈錄至於祖師有擊竹而悟者乃形於歌頌詩曲雜言三十二首今附之卷末庶幾達本明性之道盡於此矣所期同志覽之則見末而悟本舍妄以從眞旹皇宋熙甯乙卯𡻕旦天台張伯端平叔序重刊道藏輯要悟眞篇}
