  - {type: variant, offset: 1067, length: 522, content: 㫖昔宣和中洞賓遊吴興見一娼妓張珍奴色華容美性好淡素雖落風塵每夕沐浴更衣炷香告天求解脱去甚切洞賓作一士訪之珍奴見之風神異殊心甚敬之盡歡士飄然而去明日又至亦如之往往月餘終不及亂張珍奴曰荷君眷顧甚乆獨不留一宿罄枕席之娱豈妾猥漏不足奉君子耶士曰不然人貴心相知何必如此哉且汝每夜告天實何所求珍奴曰失身於此又將何爲但自念奴入是門中妄施粉黛以假爲眞歌謳艷曲以悲爲樂本是一團臭膿皮袋借偽飾以惑人每每悔嘆世之愚夫不自尊貴過我門者睹我如花情牽意惹迷戀不捨非但喪財多致身殞妾雖假容交歡覺罪甚重惟朝夕告天早脱此門士曰汝志如何何不學道珍奴曰陷于此地何從得師士曰吾爲汝師乎珍奴即拜扣士曰再來乃可遂去珍奴日夜望不至深自懊恨因書曰逢師許多時不說些兒箇安得仍前相對坐懊恨韶光空自過直到如今悶損我筆未竟士忽來見所書續其韻道無巧妙與你方兒一箇子後午前定息坐夾脊雙關崑崙過恁時得氣力思量我珍奴大喜士乃以太陰煉形太丹法與之珍奴自是神氣裕然若大開悟不知密有所傳尤多珍奴亦不告人臨别作歩蟾宫云坎離坤兊分子午須認自家宗祖地雷震動山頭雨要侁濯黃芽出土捉得金精牢閉固辯甲庚要生龍虎待他問汝甚人傳但說先生姓吕珍奴方悟是吕先生即佯狂丐于帀投荒地密修其訣逾三年尸解而去修行一事不問男女若猛勇心堅成道必矣, CK-KZ: 旨}
