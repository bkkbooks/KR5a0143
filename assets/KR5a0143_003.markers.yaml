  - {type: variant, offset: 15855, length: 0, content: '', CK-KZ: 昔黃帝參廣成子而授道老子感商容而授道尹眞人拜太上而授道祖天師感太上而授道許眞仙禮諶母而授道抱朴子眞人幼學道年至六十厯覽萬書知齊十哲慧過顏閔莫能自悟後遇鄭思遠眞人授之口訣方敢下手修煉大丹自上聖高眞祖師神仙皆以口口相傳心心相授今仙翁自云曩以至人未遇口訣難逢遂至寢食不安後至熙甯己酉𡻕以夙志不回初誠愈恪遂感眞人授以金丹藥物火候之訣正所謂指流知源語一悟百又契云著情於竹帛又恐泄天符若遂結舌喑絕道獲罪誅是不敢祕亦不敢泄也隱在諸丹經中但要眞師指示而已後序云此悟眞篇中所歌詠大丹藥物火候細微之旨無不備悉倘好事者夙有仙骨觀之則智慧自明可以尋文解義如此乃天之所賜非某之輒傳也然萬萬學人未聞一二也今道光又加註釋然而亦不敢漏露輕泄吾儕旣學道自當不恥下問若恥下問則去道遠矣若欲求道須勤下問切莫强猜}
