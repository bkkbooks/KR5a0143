  - {type: variant, offset: 7795, length: 0, content: '', CK-KZ: 悟眞篇者紫陽眞人成道之後作而授石杏林之文也若夫藥物火候運用抽添在於詩中盡其玄旨矣外有西江月詞一十二首贈白龍洞劉道人歌一篇讀參同契一章及歌頌樂府等續集於後名曰悟眞篇外集盡性至命了生死超陰陽悉備於此矣雖老君世尊復出傳道授人亦無過此書之妙也紫賢眞人辥道光再拜謹題}
