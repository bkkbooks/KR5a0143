  - {type: variant, offset: 2233, length: 357, content: 牛女情縁道合龜蛇類禀天然蟾烏遇朔合嬋娟二氣相資運轉本是乾坤妙用誰能達此淵源陰陽否隔却成愆怎得天長地遠道光曰牛郎織女一歲一交太陽太陰一月一合龜蛇以類蟠虬相扶皆陰陽二氣使之然也實爲大道之根本金丹大藥作用一般蓋眞一之氣杳然無形若不得二八陰陽之氣相交焉降格兆形於黍米哉既得丹餌之後不得陰陽符火絪緼焉能變化金液還丹哉參同契曰關關雎鳩在河之洲窈窕淑女君子好求雄不獨處雌不獨居玄哉玄武龜蛇蟠虬相扶以明牝牡竟當相須理之所在夫復何疑仙翁於此章再三致意深於道者以意會之子野曰牛女天之二星每遇七夕假鵲橋會合龜蛇地下之物亦能交媾日月遇朔合壁是皆一陰一陽相求之道作丹之妙若以孤陰寡陽而無配得不求乎上陽子曰牛女爲星宿蟾烏爲日月龜蛇甲類亦必陰陽二氣而後資之運轉今人乃孤陰寡陽深山兀坐以爲修道而欲長生何其大謬豈知陰陽否隔則不成造化而况修金丹之道乎, CK-KZ: ''}
