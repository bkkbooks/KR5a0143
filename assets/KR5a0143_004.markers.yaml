  - {type: variant, offset: 0, length: 0, content: '', CK-KZ: 反爲入室之大患乎所以大隱市廛者使人不可得而測度修出世間法者要人不得而知行藏故老子曰迎之不見其首隨之不見其後又曰惟不可識故强爲之容明達到此回思愚夫俗子欲以機鋒巧詐剽識淫蕩而求道者遠之又遠矣蓋仙翁惟恐後學不悟故於六十四首詩中字字明心言言貫性叮嚀反覆泄盡天機直願溥度羣生同登仙境可謂慈之至者也大修行人至此可不三復其詩以求成道之勳業乎重刊道藏輯要悟眞篇}
