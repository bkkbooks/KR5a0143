  - {type: variant, offset: 5228, length: 0, content: '', CK-KZ: 牛女情緣道合龜蛇類稟天然蟾烏遇朔合嬋娟二氣相資運轉本是乾坤妙用誰能達此淵源陰陽否隔卻成愆怎得天長地遠道光曰牛郎織女一𡻕一交太陽太陰一月一合龜蛇以類蟠虯相扶皆陰陽二氣使之然也實爲大道之根本金丹大藥作用一般葢眞一之炁杳然無形若不得二八陰陽之氣相交焉能降格兆形於黍米哉旣得丹餌之後不得陰陽符火絪縕焉能變化金液還丹哉參同契曰關關雎鳩在河之洲𥥆窕淑女君子好逑雄不獨處雌不孤居玄武龜蛇蟠虯相扶以明牝牡竟當相須理之所在夫復何疑顚倒修之宇宙在乎手眞一子曰孤陰不自產寡陽不自成須假牝牡合氣方能有胎仙之道也天地所以能長且久者陽交陰合自然之道也天不降地不騰四時不序萬物不生仙翁於此章再三致意深於道者以意會之子野曰牛女天河邊之二星每遇七夕假鵲橋會合龜蛇地下之物亦能交媾日月遇朔合璧是皆一陰一陽相求之道作丹之妙若以孤陰寡陽而無配得不乖乎上陽子曰牛女爲星宿蟾烏爲日月龜蛇甲類亦必陰陽二氣而後資之運轉今人乃孤陰寡陽深山兀坐以爲修道而欲長生何其大謬豈知陰陽否隔則不成造化而况修金丹之道乎}
