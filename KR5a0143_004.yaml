front:
  text: 紫陽真人悟真篇三注卷之五律五
  hash: sha256:df15467c8a6c281982f3c256c0f21e9219fe3966592fb4fa7dc92429c16d9716
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0143_HFL_004-001a, image: hfl/0064/0064-103.png}
body:
  text: 紫賢薛道光子野陸墅上陽子陳致虛注五言一首以象太一含真氣之妙女子著青衣郎君披素練見之不可用用之不可見恍惚裏相逢窈冥中有變一霎火焰飛真人自出現道光曰女子乃龍之弦氣號曰木姬生於青龍故云著青衣也郎君乃虎之弦氣號曰金郎生於白虎故云披素練也有質可見者乃後天生滓之類故不可用唯混元真一之氣生於天地之先居於恍惚之中出於杳冥之內絪緼磅礴通靈變化無中生有也火功一正真人出現此道妙矣非遇真師親授口訣其孰能與於此哉子野曰女子著青衣木汞也郎君披素練水金也陰陽相合彼此以形質未露之氣交於杳冥恍惚中庶乎可用倘形質既兆則為後天不可用矣上陽子曰此詩八句括盡一部丹經之妙用首句是震家事為木汞屬我二句是兊宫事謂鉛屬他三句則生人物矣四句乃以煉丹五句為入室下工六句乃防危杜險七句即丹成九轉八句謂行滿三千仙師布流此詩者唯欲指出先天混元真一之氣即大一所含之初氣學者可不求師乎西江月十二首以象十二月仙師曰西者金之方江者水之體月者丹之用內藥還同外藥內通外亦須通丹頭和合類相同溫養兩般作用內有天然真火爐中赫赫長紅外爐增减要勤功妙絶無過真種道光曰夷門破迷歌云道在內來安爐立鼎却在外道在外來坎離鉛汞却在內此明內外二藥也外藥者金丹是也造化在二八爐中不出半箇時立得成熟內藥者金液還丹是也造化在自己身中須待十箇月足方能脫胎成聖二藥作用雖略相同用功火候實相遠矣吾儕下工外丹和合丹頭之際分毫差忒大藥不就內藥和合丹頭之際最慎防危慮險內藥雖有天然真火在土釜之中赫然長紅亦須外爐勤功加减然內外真火變化無窮者實藉真鉛之妙此物偏能擒汞不使飛走近葉文叔不達此理却言內藥以真火烹煉外藥須假凡火增减呵呵蓋未得師指以管見窺天殊不知二藥內外雖異其用實一道也所以有內外者人之一身禀天地秀氣而有生託陰陽鑄成於幻相故一形之中以精氣神為主神生於氣氣生於精精生於神修丹之士若執此身內而修無過煉精氣神三物而已然此三者皆後天地所生純陰無陽以此修持安能出乎天地之外耶鍾離翁云涕唾精津氣血液七般物色總皆陰又曰獨修一物是孤陰聖人知己之真精後天地生而屬陰難擒易失是以採先天之一氣以真陰真陽二八同類之物擒在一時煉成一粒名曰至陽之丹號曰真鉛此造化却在外故曰外藥也却以此陽丹擒自己陰汞猶猫捕鼠耳陽丹是天地之母氣己汞乃天地之子氣以母氣伏子氣豈非同類乎其造化在內故曰內藥便假陰陽符火運用抽添十月功足形化為氣氣化為神神與道合升入無形變化不測故能出乎天地之外立乎造化之表提挈天地而陶鑄陰陽却不為陰陽陶鑄者是先天一氣使之然也真妙如此之絶故謂妙絶無過真種安可用後天地生凡鉛凡汞凡砂凡火非類滓質之物而為外藥耶學道之士研窮本始精究邪正毋惑誑邪詐裝高道以誤後來有如此者永墮三塗子野曰內丹之道與外藥爐火之事頗同大槩汞非鉛則不能伏知外事者內亦易知上陽子曰修行之人先須洞曉內外兩箇陰陽作用之真則入室下工成功易矣內藥是一己自有外藥則一身所出內藥則自己身中外藥則一身所出內藥不離自己身中外藥不離己相之中內藥只了性外藥兼了命內藥是精外藥是氣精氣不離故云真種性命雙修方證天仙此道至神至聖憂君分薄難消調和鉛汞不終朝早睹玄珠形兆志士若能修煉何妨在市居朝工夫容易藥非遙說破人須失笑道光曰金丹入口立躋聖地豈非至神至聖乎煅煉只半箇時豈非至簡至易乎家家自有不拘市朝豈非至近乎以其至近是故說破令人失笑也得之者只恐無功無德忘師背道不足以勝其妙子野曰金丹之事為其至靈故稱神聖其所以為靈者如立竿見影呼谷傳聲之謂非其他虛幻渺茫之術是此金丹唯鉛與汞鉛從他出汞向己生才辦肯心玄珠有象工夫容易何必名山大澤以煅煉哉上陽子曰還丹之道功在降龍伏虎盜奪天地造化是為神妙哉寂然不動感而遂通是為靈聖聞而信受勤行者大根上器也聞而失笑誹謗者無分薄福也鉛汞交而玄珠兆是名金丹此丹朝市家居日用夜作本自具足無所拘執世之愚人乃謂修行者必居深山必遠市朝必出妻棄子必孤坐無為方為修道彼豈知真陰真陽之用哉白虎首經至寶華池神水真金故知上善利源深不比尋常藥品若要修成九轉先須煉己持心依時採取定浮沉進火雖防危甚道光曰首者初也首經即白虎初弦之氣却非採戰閨丹之術若說三峰二十四品採陰之法是即謗毁大道九祖永沉下鬼自身見世惡報者道不可毁猶天之不可階而升也且夫真一之氣在天曰真一之水在虎曰初弦之氣若煉在華池名曰神水此乃真金之至寶皆不離真一之精流歷諸處故曰種種之異名以其能成就造化經曰上善若水蓋真一之水生於天地之先故曰上善源流甚深却不比尋常後天地生滓質之物九轉為九年在十月胎圓之後作用即達磨面壁九年之功若欲修九轉之妙者先須煉己以定浮沉以分賓主依時採取守雌不雄方免危殆連火十月自然形化為氣氣化為神抱元守一九載功成形神俱妙與道合真聖人强名曰九轉金液大還丹也子野曰男子二八而真精通女子二七而天癸降當其初降之時是首經耶不是首經耶咦路逢俠士須呈劍琴遇知音始可彈神水即首經也老子曰上善若水善利萬物真人以首經神水為喻言其利生之功非其他圓散之外藥九轉乃火數周之丹熟之時欲得九轉丹成持心煉己為要上陽子曰白虎為難制之物倘用之而得其道可無傷人之理為難得之物倘求之不失其時必有天仙之分只此白虎首經强名先天一氣仙師太忒漏盡薛陸注之太詳世之愚人若指為採戰之說或謂閨丹之術者則禍及於身學者若知三日月出庚之㫖方許求華池神水之用還丹之道修之則易煉己最難故仙師戒人先煉己即純陽云還丹在人先須煉己待時何也蓋火為最靈之物人所不能測度者火却先知猶燈蕊焉凡火尚靈况真火即己汞必先煉此真火降此真龍使無奔走從我驅用然後可以制伏白虎而得至寶之真金聖師用心至此唯恐後人不能煉己則時至臨爐頃刻之工不得一粒至寶反至危困修行之人先當究竟煉己之功也牛女情緣道合龜蛇類禀天然蟾烏遇朔合嬋娟二氣相資運轉本是乾坤妙用誰能達此淵源陰陽否隔却成愆怎得天長地遠道光曰牛郎織女一歲一交太陽太陰一月一合龜蛇以類蟠虬相扶皆陰陽二氣使之然也實為大道之根本金丹大藥作用一般蓋真一之氣杳然無形若不得二八陰陽之氣相交焉降格兆形於黍米哉既得丹餌之後不得陰陽符火絪緼焉能變化金液還丹哉參同契曰關關雎鳩在河之洲窈窕淑女君子好求雄不獨處雌不獨居玄哉玄武龜蛇蟠虬相扶以明牝牡竟當相須理之所在夫復何疑仙翁於此章再三致意深於道者以意會之子野曰牛女天之二星每遇七夕假鵲橋會合龜蛇地下之物亦能交媾日月遇朔合壁是皆一陰一陽相求之道作丹之妙若以孤陰寡陽而無配得不求乎上陽子曰牛女為星宿蟾烏為日月龜蛇甲類亦必陰陽二氣而後資之運轉今人乃孤陰寡陽深山兀坐以為修道而欲長生何其大謬豈知陰陽否隔則不成造化而况修金丹之道乎若要真鉛留汞親中不離家臣木金間隔會無因須仗媒人勾引木性愛金順義金情戀木慈仁相吞相啖却相親始覺男兒有孕道光曰鉛為金在外汞為木在內二物間隔須仗黃婆制造成丹吞入腹中與己汞合而其金情正剛烈木性柔順慈悲情性自愛自戀相吞相啖結為夫婦以産嬰兒在我腹中故云有孕此道妙矣倘非慈悲利物濟人陰德之士則萬生難遇也子野曰汞出自家非鉛不伏鉛生坤宫所以間隔欲其鉛汞相會非媒不可媒者合陰陽之用物之生乎一氣者家親雖彼此間隔而互相慕戀不可廢棄所以木之性不得不愛金金之情不得不戀木何哉為其同出乎一氣故也非洞曉陰陽深達造化其孰能與於此哉上陽子曰真鉛在造化窟中而生真鉛居造化身中而住不能持心煉己則汞走不能依時臨爐則鉛飛家臣者即己汞若煉之熟則能隨我之意而役用之木雖愛金順義非財則不得其歡心金雖戀木而多情非媒則不能以自達媒既通好財已結歡自相吞啖而男子懷胎也若不懷之以德惠人以仁則臨事焉能隨我之用哉二八誰家姹女九三何處郎君自稱木液與金精遇土却成三姓更假丁公煅煉夫妻始結歡情河車不敢暫留停運入崑崙峰頂道光曰姹女木液曰汞郎君即金精曰鉛此言鉛汞二物在土釜中須憑火功內煉外煅始結歡情是以陰符陽火不得暫停諸般氣候妙在一心連自崑崙頂注入溫養以成還丹子野曰汞屬陰故云二八姹女鉛屬陽故云九三郎君汞乃木之液鉛乃金之精得土為媒三姓交媾加以丁火煉之則鉛汞融結夫歡婦合火性炎上丹為火氣下蒸則河車自然有路飛上泥丸也上陽子曰姹女即離宫之汞郎君乃坎中之鉛土乃合二為一之物金木得土方能媾結河車運入于崑崙頂矣七返朱砂返本九還金液還真休將寅子數坤申但要五行成準本是水銀一味周流遍歷諸辰陰陽數足自通神出入豈離玄牝道光曰九還七返者不離天地五行生成之數世人以寅子數至坤申為九還七返者謬也返者返本還者還元水銀為汞汞即真一之精一變為水在北二變為砂在南三變為汞在東四變為金在西五變為丹在中此丹非天地不生非日月不産非四時不全非五行不就非總數不成是以遍歷諸辰陰陽數足自然變化通神也子野曰火乃七數金乃九數金火相胥作丹之要金非火不還火非金不返龍虎上經云丹術著明莫大乎金火此之謂也水中金故稱水銀內丹之成不出此一味爾得其妙則自然經歷諸辰時至氣化要知欲得之妙非藉玄牝不可得也上陽子曰朱砂為汞金液為鉛金來歸性是曰還丹本來只是先天一氣生於造化泉窟故號水銀非此一味至寶之物何以結丹又非玄牝為之根本何由出入而變化哉雄裏內含雌質負陰抱却陽精兩般合和藥方成點化魄靈魂聖信道金丹一粒蛇吞立變龍形雞餐亦乃化鸞鵬飛入真陽清境道光曰雄裏雌是龍之弦氣陰抱陽乃虎之弦氣二物交合靈丹自結吞入腹中點化陽魂以消陰魄一粒如黍雞餐蛇吸亦化龍鵬藥之神聖如此子野曰陽中有陰陰中有陽陰陽相交魂靈胎聖上陽子曰我雖外雄其中唯雌我雖外白其內唯黑彼之陰中反抱陽精以陽點陰大藥方成萬物得此靈藥皆能變化而況於至人乎天地才經否泰朝昏好識屯蒙輻來凑轂水朝宗妙在抽添運用得一萬般皆畢休分南北西東損之又損慎前功命寶不宜輕弄道光曰進火之始用工於屯蒙休工於既未日夕搬運符火入于鼎中如車之輪輻輳於轂若百川水朝宗於海運用抽添如此者真一之精也一氣生陰陽陰陽生四象四象生五行五行生萬物俱是真一之氣變也故真一之精為天地父母陰陽之宗祖四象之元五行之根萬物之基得此之一則萬事畢矣損之又損方能盡得一之妙蓋一之有象運陰陽之火以形之也既得吞歸五內如前運陰符陽火以慎前功慮險防危不可輕動恐失命寶玄珠子野曰陰陽既合乃行火之候輻輳轂者乃得藥之功斯時混沌復為一太極不必分南北西東之限但當照顧關防念頭差動慎其前功倘懷一時之興濃則忘平日之辛苦而廢大事所以道不宜輕弄上陽子曰大修行之人當思學道煉丹之難只此一粒之丹甚不易得費盡萬苦千辛方能得之既得之後僥幸令此命寶更宜深居間處溫養珍調損之又損者念欲灰而忘欲奮功欲勤而景欲忘其未得丹之時行真箇神仙之行若已得丹之後懷全無所得之心則一切事物不關心君而不無險危直至功成火足而怠也冬至一陽來復三旬增一陽爻月中復卦朔晨潮望罷乾終姤兆日又别為寒暑陽生復起中宵午時姤象一陰朝煉藥須知昏曉道光曰冬至一陽生為復卦三十日又增一陽為臨卦為泰為大壯為夬至四月六陽為純乾乃陽火之候陽極則陰生夏至一陰生為姤卦三十日增一陰為遁卦為否為觀為剝至十月六陰為純坤乃陰符之候陰極則陽生周而復始此一年之火候也聖人移一年火候在一月之中朔旦復卦兩日半增一陽至十五日為純乾十六日一陰生為姤又將一年之候移於一日之中分為寒暑陰陽溫凉四時之氣故以中夜子時一陽生為復卦午時一陰生為姤卦陽火陰符一依天地陰陽升降之道子野曰冬至初陽來復喻身中藥生之時此時於一月終見此氣候所以云三旬增一陽爻者月中之復卦也自復至乾乾滿而姤姤即藥過之時金逢望遠之候日又别為寒暑言一日之內煉藥氣候半夜子時為復日中午時為姤學者煉藥須要明其心中一陽之時天地一陽之時毫髮無差金丹可望上陽子曰冬至潮候乃天地之造化鉛見癸生乃人身之造化天地一陽復而萬物兆人身一陽生而真鉛現此時不採不煉則過時溷濁藥物不真既得一粒之丹與自己真汞既濟而成乾乃行陽火姤巽承領陰符日運己汞已固陽精故曰姤象一陰朝這裏又須口授也不辨五行四象那分朱汞鉛銀修丹火候未曾聞早便稱呼居隱不肯自思己錯更將錯路教人誤他永劫在迷津似恁欺心安忍道光曰丹經萬卷妙在參同又鼎器歌金丹之就舉世學人莫能曉解偶或愚師指示傍門非類便有脫漏之想未得吐故納新之方便有飛雲走霧之興自高自是模範於人己既不知悔悟誤他亦溺迷津虧心失行多招惡報況又謗毁前文詐生議論安忍此哉子野曰語云中人以上可以語上也中人以下不可以語上也上陽子曰鉛汞砂銀土為還丹之五行乾坤坎離為造化之四象火之為物最異最靈炊薪笑而占客來宵燈蕊而卜財喜凡火尚猶如此真火尤為靈通故有生物生仙功奪造化却緣愚子未遇真師不知世有還丹之道但以空無狂蕩鋒辨矯詐瞽誘時人錯到了處不肯回思失行不以罪福關心僕自聞師訓後凡見此輩即欲提省使歸正道焉知淺識之徒僻而難誨噫莊仙云其人天且劓者真言也德行修逾八百陰功積滿三千均齊物我與親冤始合神仙本願虎兕刀兵不害無常火宅難牽寶符降後去朝天穩駕鸞車鳳輦道光曰九載抱一行滿功成物我俱忘何畏乎刀兵虎兕天降寶符身飛玉闕此大丈夫功成名遂之時也子野曰始因有作令入無為無為境界真仙所居上陽子曰修行之人勤修德行廣積陰功任他魔障百端惟以功行為務存心如此雖有宿冤自然消散豈有刀兵虎兕之害哉功成之日伺詔飛升若張天師許旌陽葛仙翁皆道成之後白日升天令人乃謂神仙因宿世布種積劫修來非人可學又苦之甚彼豈知葛仙翁六十歲後方得聞道其勤謹有不可迷者而後道成噫老子云古之善為士者微妙玄通深不可識妙矣哉深不可識者煉大丹之時行有為之道唯其深不可識故得行逾八百功滿三千也又西江月一首以象閏月也丹是色身至寶煉成變化無窮更能性上究真宗决了無生妙用不待他身後世見前獲佛神通自從龍女著斯功爾後誰能繼踵道光曰此道正是我達磨祖師西來底意祖祖相傳皆此道也故六祖出曹溪一派馬祖指為西江水無非此意但後之人無心行道唯以口談佛祖無可奈何柱杖棒喝百般譬喻使上根者行其道中器者悟其性下根者記其言道人所適蓋欲世人先存其性然後修命存性即玉液煉己之功修命即金液還丹之道愚者却謂我教禪宗一言之下頓悟成佛此乃誑惑迷愚安有是理哉要知金丹即我教中最上一乘之妙子野曰丹是色身至寶只斯一語已盡大丹之㫖何用多為上陽子曰如來妙色身從凡世色身中來是以金丹至寶不在深山窮谷當於世間法中求之此丹一成變化無窮先要自性究達方可為佛子巳上事故道光云修性即煉己修命即還丹此非時人修來生福直要今生即成佛果昔世尊靈山說法五千人退席唯一龍女於世尊前獻一寶珠證佛成道也續絶句五首以象鉛汞砂銀土之五行也饒君了悟真如性未免拋身却入身何事更兼修大藥頓超無漏作真人道光曰我如來法門悟性為先然非上乘之妙義金丹之道得藥為上然必煉性為先若以悟性為偏萬無是理若不煉性而求藥恐致險危子野曰易云窮理盡性以致於命是謂性命同修是謂一陰一陽之道若止悟性未能了命是謂偏陰偏陽之疾而有拋身入身之患矣上陽子曰世人不知仙師末後多舉釋氏之說者要人必須性命兼修後人反謗其成道之後終須參佛何其誑哉彼了真如性體而不修丹者不能成佛也故首序云閉息一法與坐禪頗同若勤而行之可以入定出神奈何精神屬陰宅舍難固不免長用遷徙之法既未得金汞返還之道又豈能回陽换骨白日而升天哉故拋身入身者難免無漏修命之道直入無形大藥者修命也性命雙修形神俱妙投胎奪舍及移居舊住名為四果徒若會降龍並伏虎真金起屋几時枯道光曰投胎奪舍是執空之徒降龍伏虎是還丹之妙子野曰金丹之道一得永得身外有身隱顯莫測與投胎奪舍頑空之輩不同上陽子曰四果如須陀洹斯陀含阿羅漢阿那含是也投胎奪舍如五祖之投周氏胎者猶可望再世而修緣有道信為能不昧故也若則一失人身則萬劫輪回矣鑑形閉氣思神法初出艱難後坦塗倏忽縱能遊萬國奈何屋舊却移居道光曰凡此數事皆道教之傍門爾依此修行不能見如來子野曰此言出陰神之法有屋舊移居之苦與陽神金丹之道不同上陽子曰閉氣養息一陰而已饒經萬劫終落空亡此非道也洞賓傳載一日洞賓化作一道人遊廬山開先寺見僧法珍坐禪二七年頗有戒行道人問曰坐可了道乎珍曰然道人曰佛戒貪嗔癡為甚方其坐時謂無心及其遇物不能暫忘偶著於愛則四種心紛然莫禦若欲端坐先煉其心既能煉心須伏其氣既能伏氣雖終日睡眠而道在其中豈專在坐乎珍尚未悟道人乃與珍歷雲堂見一僧方酣寢道人謂珍曰此僧平日何所為珍曰打坐積功以圓成佛道人曰吾偕子少坐于此試觀此僧坐功良久珍見睡僧頂門出一小赤蛇長三寸餘緣床自左足至地遍遊遇涕唾食之後循上尿器中飲而去乃出軒外度小溝繞花若駐玩狀復欲度一小溝以水溢而返道人當其來處以小刀插地迎之蛇見畏縮尋别徑至床右足循僧頂門而入睡僧遽驚覺問訊道人及珍曰吾適一夢與二子言之初夢從左門出逢齊供甚精食之又逢美酒飲之因褰裳度門外小江逢美女數十欲度小江水驟漲不能往遂回逢一賊欲見殺走從捷徑至右門而入遂覺道人與珍大笑而去謂珍曰以床足為門以涕唾為供以溺為醖以溝為江以花木為美女以刃為賊人之夢寢幻妄如此人以坐而求道成佛可乎珍曰為蛇者何道人曰此僧性每多嗔熏染變化已成蛇相他日瞑目即受生于蛇矣可不懼哉吾吕公也見子精誠故來教子珍遂隨往不知所終世之兀坐修佛者視此豈不愧乎釋氏教人修極樂只緣極樂是金方大都色相唯兹實餘二非真謾度量道光曰道無彼我唯一而已子野曰金者萬物之寶煅煉愈剛曠劫不壞釋稱大覺金仙者即金丹之道也上陽子曰極樂者無去無來不生不滅直須攪長河為酥酪傾醍醐以灌頂即釋氏之金丹也經云唯有一乘法餘二即非真仙師指色相中修行者唯此金液還丹之道餘則無他可成佛也俗語常言合聖道宜向其中細尋討若將日用顛倒求大地塵沙盡成寶道光曰真鉛真汞不離日用之間顛倒修之大地俱成至寶也子野曰顛倒之機前卷悉以露盡石中豈無玉還他識寶人上陽子曰日用常行是道先哲云日用與夜作一般大修行人須向其中細細尋思討論實得真師指其造化方知塵沙可以成寶也紫陽真人悟真篇三注卷之五紫陽真人後序切以人之生也皆緣妄情而有其身有其身則有患若無其身患從何有夫欲免夫患者莫若體夫至道欲體夫至道莫若明夫本心故心者道之體也道者心之用也人能察心觀性則圓明之體自現無為之用自成不假施功頓超彼岸此非心鏡朗然神珠廓明則何以使諸相頓離纖塵不染心源自在决定無生者哉然其明心體道之士身不能纍其性境不能亂其真則刀兵烏能傷虎兕烏能害巨焚大浸烏足為虞達人心若明鏡鑑而不納隨機應物和而不倡故能勝物而無傷也此所謂無上至真之妙道也原其道本無名聖人强名道本無言聖人强言耳然則名言若寂則時流無以識其體而歸其真是以聖人設教立言以顯其道故道因言而後顯言因道而返忘奈何此道至妙至微世人根性迷鈍執其有身而惡死悅生故卒難了悟黃老悲其貪著乃以修生之術順其所欲漸次導之以修生之要在金丹金丹之要在神水華池故道德陰符之教得以盛行於世有蓋人悅其生也然其言隱而理奧學者雖諷誦其文皆莫曉其義若不遇至人授之口訣縱揣量百種終莫能著其功而成其事豈非學者紛如牛毛而達者乃如麟角也伯端向己酉歲於成都遇師傳授丹法當年且主公傾背自後三傳與人三遭禍患皆不逾半旬近六憶師之所戒云異日有與汝解韁脫鎖者當宜授之餘不許爾後欲解名籍而患此道人不知信遂撰此悟真篇叙丹藥本末既成而求學者凑然而來觀而意勤心不忍怪乃擇而授之然而所授者皆非有巨勢强力能持危拯溺慷慨特達能仁明道之士初再罹禍患心猶未知竟至於三乃省前過故知大丹之法至簡至易雖愚昧小人得而行之則立超聖地是以天意祕惜不許輕傳於非人也而伯端不遵師語屢泄天機以其有身故每膺譴患此天之深戒如此之神且速敢不恐懼剋責自今以往當鉗口結舌雖鼎鑊居前刀劍加項亦無復敢言矣此悟真篇中所歌詠大丹藥物火候細微之㫖無不備悉好事者夙有仙骨觀之則智慮自明可以尋文解義豈須伯端區區之口授之矣如此乃天之所賜非伯端之輒傳也其如篇末歌頌談見性之法即上所謂無為妙覺之道也然無為之道齊物為心雖顯祕要終無過咎奈何凡夫緣業有厚薄性根有利鈍縱聞一音紛成異見故釋迦文殊所演法寶無非一乘而聽學者量隨會解自然成三乘之差此後若有根性猛利之士見聞此篇則知伯端得達磨六祖最上一乘之妙㫖可因一言而悟萬法也如其習氣尚餘則歸中小之見亦非伯端之咎矣時元豐改元戊午歲月戊寅日天台張伯端平叔再序
